  <script type="text/babel">
    const { useState, useEffect, useMemo, useRef } = React;

    // --- FIREBASE INITIALIZATION ---
    let db = null, auth = null, appId = "opf-unified-exam-2026", isFirebaseReady = false;

          isFirebaseReady = true;
        }
      } catch (e) { console.warn("Local Storage mode fallback."); }
    }

    // --- QUESTION DATABASE ---
    const CATEGORIES = {
      exam2026: {
        id: "exam2026", title: "大項目カテゴリー1（2026年統一試験問題）", icon: "BookOpen",
        subcategories: {
          oplus: {
            id: "oplus2026", title: "基礎：O-PLUS 公開問題", type: "sei",
            questions: [
              { id: "o26_1", type: "tf", text: "リアルワールドデータを用いた入院患者 55,000 例の TPN 調査では、脂肪を含む静脈栄養管理が多く行われている現状が明らかになった。", answer: false, explanation: "脂肪はほとんど投与されていなかった。" },
              { id: "o26_2", type: "tf", text: "低栄養患者に対する栄養サポート実施の効果を検証したスイスのデータベース研究において、栄養サポート実施群では非実施群と比べて院内30日死亡率・再入院率が減少していた。", answer: true },
              { id: "o26_3", type: "tf", text: "中間的静脈栄養IPN: Intermediate Parenteral Nutrition とは、PPNとTPNの適応期間の中間にあたる1〜2週間程度の静脈栄養管理を指す。", answer: true },
              { id: "o26_4", type: "tf", text: "IPN を検討すべき症例として、腸管安静を必要とする病態、嚥下障害のある病態、通過障害のある病態、などがあげられる。", answer: true },
              { id: "o26_5", type: "tf", text: "静脈経腸栄養ガイドライン(第3版)では、血栓性静脈炎予防の観点から PPN 製剤と脂肪乳剤の同時投与は避けるべきであるとされている。", answer: false, explanation: "PPN製剤と脂肪乳剤を同時に投与することにより浸透圧を下げることができるため、血栓性静脈炎の予防に有用であると記載されている。" },
              { id: "o26_6", type: "tf", text: "キドパレンの臨床第三相試験で、キドパレン(本剤) 群の6割以上がステージ G5D (透析期の患者)であった。", answer: true },
              { id: "o26_7", type: "tf", text: "透析患者の原疾患の第一位は糖尿病性腎症で、死亡原因の第一位は感染症である。", answer: true },
              { id: "o26_8", type: "tf", text: "「急性または慢性腎臓病の入院患者における臨床栄養に関する ESPEN 実践ガイドライン」の中で、「腎機能異常は、腎臓内科や内科病棟、外科病棟、集中治療(ICU)などさまざまな臨床場面で入院患者の間に広くみられる」という記載がある。", answer: true },
              { id: "o26_9", type: "tf", text: "CKD の患者さんがAKI を発症する事はほとんどない。", answer: false, explanation: "CKDを基礎に有する者はAKI発症のリスクが高く、たとえ腎機能が前値に回復した場合でもCKDの進行が速まるリスクが上がる。" },
              { id: "o26_10", type: "tf", text: "RRT(腎代替療法)を受けている患者では、水溶性ビタミン(ビタミンB1、B6、C、葉酸)が透析により失われるため、補充を考慮する。", answer: true },
              { id: "o26_11", type: "tf", text: "小児の発育段階はいくつかの区分に分かれており、新生児期とは「生まれてから1歳まで」の間を指す。", answer: false, explanation: "新生児期は生後28日まで。生後29日から1歳は乳児期とされる。" },
              { id: "o26_12", type: "tf", text: "医療事故の再発防止に向けた提言第 6 号に記載されている、経鼻胃管留置位置確認方法の一覧表には X線/X線造影のデメリットは特に記載されていない。", answer: false, explanation: "「誤読の可能性がある」旨がデメリットとして記載されている。" },
              { id: "o26_13", type: "tf", text: "患者によっては腎臓や回腸が胃に覆いかぶさってタムガイドの赤色光を遮ってしまい、腹壁で赤色光を確認できない可能性がある。", answer: false, explanation: "腎臓・肝臓、回腸⇒横行結腸。" },
              { id: "o26_14", type: "tf", text: "ICU 入室患者では嚥下機能の低下や意識障害によって咳嗽反射が無い場合も多く、一般的に経鼻胃管の挿入が難しいと考えられる。", answer: true },
              { id: "o26_15", type: "tf", text: "関西医科大学小児外科教室で、タムガイドとX線検査による経鼻胃管留置位置確認に関して検討した結果、1例を除いてタムガイドとX線検査の結果が一致していた。", answer: true },
              { id: "o26_16", type: "tf", text: "「リアルワールドデータ研究からみるアミノ酸処方量と予後の関連」で、静脈栄養管理におけるアミノ酸投与推奨量は、国内のガイドラインでは 0.8〜1.0g/kg/日、米国のガイドラインでは0.8〜1.5g/kg/日とされている。", answer: true },
              { id: "o26_17", type: "tf", text: "内科系静脈栄養患者を対象としたリアルワールドデータの調査対象は、絶食期間が10日を超える入院患者(年齢≥18歳)で、絶食開始後4〜10日目の経静脈的平均アミノ酸処方量を調査・検討している。", answer: true },
              { id: "o26_18", type: "tf", text: "内科系静脈栄養患者を対象としたリアルワールドデータの主要評価項目は院内死亡で、絶食開始後4〜10日目の経静脈的平均アミノ酸処方量の減少と、院内死亡の増加との関連が認められた。", answer: true },
              { id: "o26_19", type: "tf", text: "内科系静脈栄養患者を対象としたリアルワールドデータの副次評価項目の一つに在院日数があり、リファレンスである Adequate 群に比べて、Moderate 群は1.2日、Low 群は1.5日、Very low 群は2.9日 在院日数が長いという結果であった。", answer: true },
              { id: "o26_20", type: "tf", text: "EFFORT試験：低栄養リスクのある外科の入院患者を対象とした研究である。", answer: false, explanation: "内科の入院患者である。" },
              { id: "o26_21", type: "tf", text: "EFFORT試験：栄養介入の約40%は静脈栄養によるサポートであった。", answer: false, explanation: "約90%は食事やONSなどの経口栄養であった。" },
              { id: "o26_22", type: "tf", text: "EFFORT試験：個別化された栄養サポートが30日以内の全死亡率や身体機能の低下のリスクを減少させることが示された。", answer: true },
              { id: "o26_23", type: "tf", text: "EFFORT試験：平均在院日数は約9日で、急性期の短期間の栄養介入の効果をみた試験と言える。", answer: true },
              { id: "o26_24", type: "tf", text: "誤嚥性肺炎リアルワールドデータ研究：65歳以上の誤嚥性肺炎入院患者で、7日以上絶食となっている患者が対象となっている。", answer: true },
              { id: "o26_25", type: "tf", text: "誤嚥性肺炎リアルワールドデータ研究：経静脈的なエネルギー・アミノ酸の処方量の増加が院内死亡の低下と関連していた。", answer: false, explanation: "エネルギー処方量の増加は院内死亡率に影響を与えなかった。" },
              { id: "o26_26", type: "tf", text: "誤嚥性肺炎リアルワールドデータ研究：本研究の在院日数の中央値は30日を超えていた。", answer: true },
              { id: "o26_27", type: "tf", text: "誤嚥性肺炎リアルワールドデータ研究：アミノ酸の処方量が0.6g/kg/日を超える患者は、アミノ酸が処方されていない患者と比べて入院期間が短縮していた。", answer: true },
              { id: "o26_28", type: "tf", text: "JSPENで2014年に行われたアンケート結果から、経腸栄養実施中に経験する消化器合併症として下痢をあげた施設が80%以上に及んだ。", answer: true },
              { id: "o26_29", type: "tf", text: "経腸栄養関連下痢対策のためのアルゴリズムにおいて、経腸栄養実施中に下痢を認めたらただちに投与速度を下げることが示されている。", answer: false, explanation: "下痢を認めたら水様性下痢の頻度や発熱・白血球数/CRPを確認し、その後の方策を考えるフローが示されている。" },
              { id: "o26_30", type: "tf", text: "半固形化栄養法は消化器合併症対策として活用されており、メタ解析においても下痢の低減に有用であることが示された。", answer: false, explanation: "胃食道逆流の低減等に有用であることが示されており、下痢に対する有用性は示されていない。" },
              { id: "o26_31", type: "tf", text: "1.6kcal/mLの経腸栄養剤(イノラス)の水分比率は80%である。", answer: false, explanation: "1.6kcal/mL 経腸栄養剤(イノラス)の水分比率は75%である。" },
              { id: "o26_32", type: "tf", text: "腸内細菌叢に負の影響を与える因子としては薬剤の影響が大きく、PPIは特にその影響が大きいことが示されている。", answer: true },
              { id: "o26_33", type: "tf", text: "ディスバイオシスの影響から下痢に至る経路、便秘に至る経路いずれも想定されている。", answer: true },
              { id: "o26_34", type: "tf", text: "水溶性食物繊維は蠕動運動を促進することで便秘に役割を果たし、不溶性食物繊維は短鎖脂肪酸を産生することで下痢に対する効果を示す。", answer: false, explanation: "水溶性食物繊維は主に発酵性が高く短鎖脂肪酸を産生し下痢に効果を示し、不溶性食物繊維は便の形成や排便促進に役立ち便秘に効果を示す。" },
              { id: "o26_35", type: "tf", text: "腸内細菌の種類は1000種類以上であり、細菌数として100兆個程度とされている。", answer: true },
              { id: "o26_36", type: "tf", text: "がん悪液質の診断基準の一つとして、「過去6か月間で5%を超える体重減少」が提唱されている。", answer: true },
              { id: "o26_37", type: "tf", text: "がん悪液質の有病率を調査した海外の研究では、「過去6ヶ月で5%を超える体重減少」で定義した場合、膵癌＞胃・食道癌＞頭頸部癌の順に悪液質の有病率が高い事が示されている。", answer: true },
              { id: "o26_38", type: "tf", text: "日本肺癌学会のデータベース研究では、がん悪液質と診断された群は、がん悪液質でない群と比べて抗がん剤の奏効率が低く、生命予後が不良である事が示されている。", answer: true },
              { id: "o26_39", type: "tf", text: "がん悪液質は「通常の栄養サポートでは完全に回復することができず、進行性の機能障害に至る」とされ、栄養療法を実施する意義はないとされている。", answer: false, explanation: "栄養療法のみでは回復できないという意味であり、悪液質の症状に応じたマルチモーダル(多面的)な介入が推奨されている。" },
              { id: "o26_40", type: "tf", text: "ESMOガイドラインでは、予測される予後が数ヵ月未満(3-6か月未満)の患者では、栄養療法の侵襲性を低下させることが推奨され、栄養カウンセリングおよび ONS(経口的栄養補助)が望ましいと記載されている。", answer: true },
              { id: "o26_41", type: "tf", text: "ESMOガイドラインでは「がん悪液質」は、低栄養診断となるGLIM基準および全身性炎症の存在に基づく疾患関連低栄養として定義することが推奨されている。", answer: true },
              { id: "o26_42", type: "tf", text: "ハイネックスゼリーの粘度の参考とした、胃食道逆流の抑制が期待できる粘度(6,000〜10,000mPa s)はB型粘度計6回転/分で試験をしている。", answer: false, explanation: "B型粘度計 12回転/分である。" },
              { id: "o26_43", type: "tf", text: "ハイネックスゼリーとイノソリッド配合経腸用半固形剤の粘度は同等である。", answer: true },
              { id: "o26_44", type: "tf", text: "コラーゲンペプチド (CP) の機能性リーフレット (08896)は、ハイネックスゼリーの報告として紹介できる。", answer: false, explanation: "栄養素の機能性の情報提供であり、ハイネックスシリーズの報告ではない。" },
              { id: "o26_45", type: "tf", text: "ハイネックスゼリーとイノソリッド配合経腸用半固形剤の1袋あたりの食塩相当量は同量(1日標準量において食塩相当量が3〜5g)である。", answer: false, explanation: "1袋あたり、ラコール半固形0.57g、イノソリッド1g、ハイネックスゼリー1.35gである。" },
              { id: "o26_46", type: "tf", text: "ハイネックスゼリーとイノソリッド配合経腸用半固形剤の900kcalあたりのカリウムの量は、ラコール NF 配合経腸用半固形剤の1600kcalあたりと同量である。", answer: false, explanation: "ラコール NF 配合経腸用半固形剤の1200kcalあたりと同量(1656mg)である。" },
              { id: "o26_47", type: "tf", text: "ハイネックスゼリーとイノソリッド配合経腸用半固形剤の900kcalあたりのカリウムの量は、「慢性腎臓病に対する食事療法基準 2014年版」 ステージ4のカリウム量より多い。", answer: true },
              { id: "o26_48", type: "tf", text: "清潔間欠自己導尿 (CIC) の目的の1つとして、カテーテル留置からの解放により患者の活動性・QOLを向上させることがあげられる。", answer: true },
              { id: "o26_49", type: "tf", text: "在宅 CIC患者は増加しており、(親水性と非親水性では) 親水性カテーテルのみ算定患者数は増加している。", answer: false, explanation: "すべてのカテーテルで算定患者数は増加している。" },
              { id: "o26_50", type: "tf", text: "再利用型カテーテルでは、カテーテルと保存用ケースがセットになっており、ケースの消毒液は導尿時に毎回交換する。", answer: false, explanation: "消毒液は1日1回交換する。" },
              { id: "o26_51", type: "tf", text: "令和2年診療報酬改定により、特殊カテーテル加算は、親水性コーティングを有するものは1700点・1900点・2100点と、本数にあわせて3段階の点数を算定できるようになった。", answer: true },
              { id: "o26_52", type: "tf", text: "各カテーテルのコストシミュレーションにより、施設の差益を考えると、単価の高い親水性カテーテルを使うことで施設の差益は減る。", answer: false, explanation: "施設の差益は収入と支出の差を考えるため、親水性カテーテルを使うことで必ずしも減るとはいえない。" },
              { id: "o26_53", type: "tf", text: "再利用型カテーテルと親水性カテーথের併用メソッド提案は、例としては、1日の導尿回数が多い方、外出時に導尿を行う方、などに提案を行う。", answer: true },
              { id: "o26_54", type: "tf", text: "サルコペニアは「筋肉」の「減少」を意味するギリシア語が語源となっており、加齢以外にも様々な原因で発症する事が示されている。", answer: true },
              { id: "o26_55", type: "tf", text: "がん患者の場合、CTで第3腰椎部(L3)の筋肉の面積を計測して、身長の2乗で補正し、SMI(骨格筋指数)を算出している研究が多い。", answer: true },
              { id: "o26_56", type: "tf", text: "東大病院の消化器がん・泌尿器がん患者の研究では、Fujiwara基準に基づくサルコペニアの有病率は17.8%であり、他の診断基準を使うよりも予後の予測能力が高い事が示された。", answer: true },
              { id: "o26_57", type: "tf", text: "プレハビリテーションとは術前から栄養・運動、心理的なサポートを実施し、患者さんの身体機能や筋肉量を維持する取り組みで貯筋活動ともいえる。", answer: true },
              { id: "o26_58", type: "tf", text: "腹部外科手術を対象にした最近のメタ解析では、プレハビリテーションとして運動だけでなく、栄養も取り入れた方が身体機能の向上と術後合併症の軽減が期待できる事が示されている。", answer: true },
              { id: "o26_59", type: "tf", text: "日本食道学会のアンケート調査によると、NAC (術前補助化学療法)中のプレハビリテーション導入率は89%である事が示されている。", answer: false, explanation: "89%が誤り。導入率は39%であった。" },
              { id: "o26_60", type: "tf", text: "排尿障害で多いものとして 前立腺肥大症、過活動膀胱、夜間頻尿が挙げられる。", answer: true },
              { id: "o26_61", type: "tf", text: "18歳以上を対象とした日本の国民健康調査を用いた横断研究によると、過活動膀胱の有無とフレイルの増加に関連性は無かった。", answer: false, explanation: "過活動膀胱ありではフレイルが増加し、フレイルありでは過活動膀胱が増加する。" },
              { id: "o26_62", type: "tf", text: "夜間頻尿の治療はフレイル、さらには要介護を防ぐうえで非常に重要である。", answer: true },
              { id: "o26_63", type: "tf", text: "前立腺肥大症と過活動膀胱を合併しているケースは多い。", answer: true },
              { id: "o26_64", type: "tf", text: "排尿障害を有する患者への投薬治療において、αブロッカー、抗コリン薬、β3作動薬のいずれも、尿閉を起こしやすいため注意が必要である。", answer: false, explanation: "αブロッカーは排尿を促進するため尿閉を起こしやすい薬剤には該当しない。抗コリン薬などで尿閉に注意が必要である。" },
              { id: "o26_65", type: "tf", text: "夜間頻尿診療ガイドライン [第2版] によると、夜間頻尿患者に対して残尿測定は必須だと位置づけられている。", answer: true },
              { id: "o26_66", type: "tf", text: "ESPENのICUガイドライン(2023年)では、経口・経腸栄養が実施困難・禁忌の場合、3日から7日以内に静脈栄養を実施する事が推奨されている。", answer: true },
              { id: "o26_67", type: "tf", text: "ICUの研究で、安静時エネルギー消費量(REE)に対して投与エネルギー量が多すぎても少なすぎても予後が不良であり、エネルギー充足率が30%と少なすぎる栄養管理が最も生存率が低い結果であった。", answer: true },
              { id: "o26_68", type: "tf", text: "アメリカ、日本、共に集中治療領域のガイドラインでは、経腸栄養が不十分な重症患者に対して静脈栄養を追加する事が推奨されている。", answer: false, explanation: "日本版ガイドラインでは静脈栄養を追加すべきではないと推奨されているなど異なる。" },
              { id: "o26_69", type: "tf", text: "低栄養リスクが高く、経腸栄養の認容性が低い腹部手術患者において、術後3日以内の早期SPNは院内感染(8.7%vs18.4%)を有意に低下させた。", answer: true },
              { id: "o26_70", type: "tf", text: "蘇生会総合病院、土師先生が運用している栄養管理バンドルでは、「補完的早期静脈栄養」や「早期高蛋白投与(1.2g/kg以上)」といった実施項目が盛り込まれている。", answer: true },
              { id: "o26_71", type: "tf", text: "マスク換気による胃の膨満が術野を妨げるため、特に腹腔鏡、ロボット手術では胃減圧が必要である。", answer: true },
              { id: "o26_72", type: "tf", text: "消化器外科術後に胃管を留置する事で、胃内容物を体外へ誘導し、嘔吐の軽減、誤嚥の予防、縫合部への負担軽減が期待できる。", answer: true },
              { id: "o26_73", type: "tf", text: "ERASでは、食道、胃、大腸いずれのガイドラインでも、術後のルーチンな(予防的な)胃管挿入は推奨されていない。", answer: true },
              { id: "o26_74", type: "tf", text: "ED チューブは、胃内のみの留置を目的としている。", answer: false, explanation: "胃・十二指腸・空腸への留置が可能である。" },
              { id: "o26_75", type: "tf", text: "タムガイド使用時にEDチューブを使用する場合、ファイバー先端は、オリーブ先端まで挿入するのが望ましい。", answer: false, explanation: "オリーブとチューブの境目から1〜2cm離して固定することを推奨している。" },
              { id: "o26_76", type: "tf", text: "J034-2(経鼻栄養・薬剤投与用チューブ挿入術: 180点)の算定には、必ずX線透視による確認が必要であり、タムガイドのみでの確認では算定できない。", answer: false, explanation: "X線が使用できない環境下で、タムガイドを使用して確認した場合でも算定可能。" },
              { id: "o26_77", type: "tf", text: "MET光ガイドカテーテルシステムと併用可能な栄養チューブは、ニューエンテラルフィーディングチューブ(カーディナルヘルス社製) 10Frのみである。", answer: false, explanation: "10Frではなく12Frである。" },
              { id: "o26_78", type: "tf", text: "浜松医療センターの研究：誤嚥性肺炎入院患者で5日以上絶食管理された高齢患者が対象となっている。", answer: true },
              { id: "o26_79", type: "tf", text: "浜松医療センターの研究：アミノ酸投与群 (AA群)は、栄養状態が悪いにもかかわらず予後が良かった。", answer: true },
              { id: "o26_80", type: "tf", text: "浜松医療センターの研究：アミノ酸投与群 (AA群)では、入院後5日目で約 0.7g/kg のアミノ酸投与が出来ていた。", answer: true },
              { id: "o26_81", type: "tf", text: "浜松医療センターの研究：年齢、性別、BMI、アルブミン、肺炎重症度などを調整した多変量解析でも、アミノ酸投与は独立した予後改善因子として有意だった。", answer: true },
              { id: "o26_82", type: "tf", text: "浜松医療センターの研究：エネルギー摂取量(>10 kcal/kg/day)を含めた解析でも、アミノ酸投与は有意な予後改善因子であった。", answer: true },
              { id: "o26_83", type: "tf", text: "誤嚥性肺炎リアルワールド第2報：入院後7日以上絶食となっている誤嚥性肺炎入院患者が対象で、アミノ酸の投与量が多いほど、エネルギー投与量と同様に院内死亡率の低下に強く関連していた。", answer: false, explanation: "エネルギー投与量と院内死亡との間に有意な関連はなかった。" },
              { id: "o26_84", type: "tf", text: "誤嚥性肺炎リアルワールド第2報：0.6g/kg/日以上の十分なアミノ酸投与が投与された患者は全体の50%であった。", answer: false, explanation: "全体の10%であった。" },
              { id: "o26_85", type: "tf", text: "高齢者の7〜8割程度に、口腔乾燥を誘発する可能性のある薬剤が処方されている。", answer: true },
              { id: "o26_86", type: "tf", text: "口腔乾燥症の原因は1つではなく、複数にわたることが多い。", answer: true },
              { id: "o26_87", type: "tf", text: "口腔乾燥症状緩和のためには、唾液腺マッサージや保湿剤の使用といったセルフケアも有用である。", answer: true },
              { id: "o26_88", type: "tf", text: "オラネジンは、約50年ぶりの消毒剤として2015年に発売され、スポルディング分類では、高水準消毒薬に分類される。", answer: false, explanation: "低水準消毒薬に該当する。" },
              { id: "o26_89", type: "tf", text: "オラネジンは、日本外科感染症学会が作成・改訂して発表した「消化器外科 SSI 予防のための周術期管理ガイドライン2025」に新たに掲載された。", answer: true },
              { id: "o26_90", type: "tf", text: "術野消毒に関するクリニカルクエスチョンでは、ポビドンヨードアルコールと併記でオラネジンが記載された。", answer: false, explanation: "ポビドンヨードではなく、アルコール含有クロルヘキシジン。" },
              { id: "o26_91", type: "tf", text: "オラネジンの使用推奨度は、「使用することを提案する」で、これは弱く推奨するを意味している。", answer: true },
              { id: "o26_92", type: "tf", text: "経腸栄養困難、投与量不十分例への早期補完的静脈栄養(SPN)は、SSI予防に有用か?というクリニカルクエスチョンに対して、早期SPNは、「行うことを提案する」と記載されている。", answer: false, explanation: "早期SPNはSSI予防効果に対する明確な推奨はできないと記載されている。" },
              { id: "o26_93", type: "tf", text: "消化器外科 SSI 予防のための周術期管理ガイドライン 2025では、手術決定時から周術期口腔機能管理を開始することが推奨されている。", answer: true },
              { id: "o26_94", type: "tf", text: "2025年のガイドラインで、周術期口腔機能管理は弱い推奨を意味する「行うことを提案する」であり、2018年版から推奨の強さは変わっていない。", answer: false, explanation: "2018年は「評価は困難である」であり推奨度は変化している。" },
              { id: "o26_95", type: "tf", text: "周術期口腔機能管理による SSI 予防のメカニズムは、多くのランダム化比較試験 (RCT)によって既に詳細に解明されている。", answer: false, explanation: "関連する文献は後ろ向きの解析であり、詳細は未確定である。" },
              { id: "o26_96", type: "tf", text: "ICD-11(国際疾病分類)に成人低栄養の新コード: 「5B72」が追加された。", answer: true },
              { id: "o26_97", type: "tf", text: "成人低栄養の新コードが追加される前は、低栄養は主に「飢餓や災害に関連する栄養不足」や「BMI<18.5の成人」に限定されており、疾患や炎症による低栄養を十分に反映できていないという課題があった。", answer: true },
              { id: "o26_98", type: "tf", text: "「成人低栄養」はGLIM基準による診断がモデルとなっており、低栄養の原因に応じてサブコードが設定される予定である。", answer: true },
              { id: "o26_99", type: "tf", text: "日本の実態調査によると、GLIM基準に低栄養診断が「未実施」または「データ欠損」が全体の約48%であった。ただし、「未実施・データ欠損群」の30日死亡率は正常栄養群と同等であった。", answer: false, explanation: "評価自体が「未実施」または「データ欠損」の患者も死亡率が高い。" },
              { id: "o26_100", type: "tf", text: "2023年に日本排尿機能学会がインターネットで行った疫学調査によると、20代以上のLUTS (下部尿路症状)の有病率は70%以上と高く、中でも蓄尿症状の有病率が高かった。", answer: true },
              { id: "o26_101", type: "tf", text: "LUTS(下部尿路症状)治療のために医療機関を受診する女性患者の割合は、2002年と比べて2023年では増加している。", answer: false, explanation: "2002年では9.0%、2023年でも2.5%と、いずれも低い受診率のままである。" },
              { id: "o26_102", type: "tf", text: "過活動膀胱診療ガイドライン [第3版]において、残尿測定を行うことが明記されており、100mL未満の場合は一般医家での診療を行うとされている。", answer: true },
              { id: "o26_103", type: "tf", text: "診療報酬の D216-2 残尿測定検査では、超音波検査によるもの45点、導尿によるもの55点を月に2回まで算定可能である。", answer: false, explanation: "超音波検査によるものは55点、導尿によるものは45点。" },
              { id: "o26_104", type: "tf", text: "重症患者、ICU患者のICU入室後1日〜2日など早期には十分なエネルギー投与が必要であり、mREE≥100%を目安に投与する。", answer: false, explanation: "早期にはREE≦70%を目安にエネルギー投与を行う。" },
              { id: "o26_105", type: "tf", text: "重症患者に対するエネルギー投与が十分でない状態が継続し、負債累積として積みあがっていくと合併症が増えるというデータがある。", answer: true },
              { id: "o26_106", type: "tf", text: "ICUの早期経腸栄養は腸管機能に関わらず十分に実施ができる。", answer: false, explanation: "腸管機能により、投与速度・投与量が制限される。" },
              { id: "o26_107", type: "tf", text: "日本版重症患者の栄養療法ガイドライン2024において、重症患者の腸管不耐を評価する方法に胃残量、胃残渣の性状、腹部理学所見などを組み合わせる方法が示されている。", answer: true },
              { id: "o26_108", type: "tf", text: "消化管がん術後栄養管理法の変遷解析において、「静脈栄養」による栄養管理割合は術後1日目は年々増加しているが、「糖・電解質輸液」による管理割合は術後1日目も3日目も年々減少している。", answer: false, explanation: "「静脈栄養」と「糖・電解質輸液」が逆になっている。" },
              { id: "o26_109", type: "tf", text: "手術部位別の術後栄養管理の解析において、食道手術患者においては他の部位よりも経口摂取による栄養摂取が少なく、経腸栄養のみや経腸栄養と静脈栄養の組み合わせは他の部位よりも多い。", answer: true },
              { id: "o26_110", type: "tf", text: "手術部位別の術後栄養管理の解析において、術後7日間絶食を要する患者へのアミノ酸投与量中央値は、どの部位の患者でも 0.8g/kg に届いていない。", answer: true },
              { id: "o26_111", type: "tf", text: "アルコール非含有ポビドンヨードと 1.5%オラネキシジンとの比較を 2報で解析すると、RR: 0.46であり、1.5%オラネキシジンがSSI 発生を有意に予防している。", answer: true },
              { id: "o26_112", type: "tf", text: "ネットワークアナリシスの結果、アルコール含有クロルヘキシジン、および 1.5%オラネキシジンが、アルコール非含有ポビドンヨードと比較して有意にSSI を減少させていた。", answer: true },
              { id: "o26_113", type: "tf", text: "オラネジンとクロルヘキシジンアルコールを直接比較したRCTが実施されており、オラネジンが有意にSSI を減少させる結果となった。", answer: false, explanation: "オラネキシジンはクロルヘキシジンアルコールに対して優越性を示さず、SSI予防効果は同等。" },
              { id: "o26_114", type: "tf", text: "令和8年度 (2026年度)の診療報酬改定では、残薬対策に関する要件が医科や在宅医療の複数項目に組み込まれた。", answer: true },
              { id: "o26_115", type: "tf", text: "経腸栄養剤を開封して飲んで残った液体は、診療報酬上の「残薬」として扱われる。", answer: false, explanation: "残薬は「未開封で残っている医薬品」であり、飲み残しの液体は該当しない。" },
              { id: "o26_116", type: "tf", text: "「調剤時残薬調整加算」は、従来の「重複投薬・相互作用等防止加算」に含まれていた残薬調整部分を分離し、新設された加算である。", answer: true },
              { id: "o26_117", type: "tf", text: "訪問診療薬剤師同時指導料は、医師と薬剤師が別々の日に訪問して指導した場合に算定できる。", answer: false, explanation: "同時訪問が要件であり、別日では算定不可。" },
              { id: "o26_118", type: "tf", text: "訪問看護の診療報酬の中では、服薬状況 (残薬含む)を確認することが求められる方向性が示されている。", answer: true },
              { id: "o26_119", type: "tf", text: "地域支援体制加算の実施要件には、新たに残薬対策関連の要件が多数追加された。", answer: true },
              { id: "o26_120", type: "tf", text: "残薬対策に取り組むことは、薬局が地域支援体制加算を取得・維持する上で大きな影響はない。", answer: false, explanation: "加算取得の必要要件に含まれるため重要である。" },
              { id: "o26_121", type: "tf", text: "胃切除後1年間で10%以上の体重減少があると、累積生存率は有意に低下する事が示されている。", answer: true },
              { id: "o26_122", type: "tf", text: "胃切除後の体重減少の80%以上は、最初の3か月で起こる事が示されている。", answer: true },
              { id: "o26_123", type: "tf", text: "術後1か月間で15%を超える体重減少は、TS-1の服薬継続率の低下につながる事が示されている。", answer: true },
              { id: "o26_124", type: "tf", text: "胃切除後の体重減少に対するONSと通常食を比較した試験では、主要評価項目である「1年後の体重減少」を有意に抑制する結果となった。", answer: false, explanation: "主要評価項目である1年後の体重減少は有意に抑制する事が出来なかった。" },
              { id: "o26_125", type: "tf", text: "胃切除後の試験では、術後3か月間ONSを1日200Kcal 以上服用すれば、術後1年の体重減少を有意に抑制できる事が示された。", answer: true },
              { id: "o26_126", type: "tf", text: "胃がん手術後の栄養サポートにおいて、イノラスの服薬遵守状況を見た試験では、200kcal/日以上の平均摂取量を達成した患者の割合は66.7%であった。", answer: true },
              { id: "o26_127", type: "tf", text: "大塚製薬の神経内科におけるこれまでの展開製品の例として、プレタール、イーケプラ、ニュープロパッチ、アジョビなどが挙げられる。", answer: true },
              { id: "o26_128", type: "tf", text: "神経内科疾患では経静脈栄養での管理を主体として、経腸栄養での管理も行われる。", answer: false, explanation: "消化管が機能していることが多く、経腸栄養主体で管理される。" },
              { id: "o26_129", type: "tf", text: "筋萎縮性側索硬化症(ALS) は黒質ドーパミンが障害される疾患で、10年〜20年の慢性的な経過をたどるのが一般的である。", answer: false, explanation: "上位・下位運動ニューロンが障害される疾患で、急性進行型の疾患である。" },
              { id: "o26_130", type: "tf", text: "ALS診療ガイドライン2023において、“病前体重の10%以上の体重減少”が認められる場合に胃瘻造設を検討する旨が記載されている。", answer: true },
              { id: "o26_131", type: "tf", text: "GLIM基準の炎症評価のガイダンスにおいて、慢性疾患の代表例として、「がん」「心不全」 「COPD」 「CKD」などがある。", answer: true },
              { id: "o26_132", type: "tf", text: "がん患者において、GLIM基準による低栄養は、死亡リスクや術後合併症のリスクが約2倍になることが示されている。", answer: true },
              { id: "o26_133", type: "tf", text: "脳卒中回復期の高齢患者を対象にした観察研究で、体重 1kg を得るために約 9600kcalの上乗せが必要であることが示されている。", answer: true },

              { id: "o26_136", type: "tf", text: "誤嚥性肺炎で「とりあえず安静」等の対応により引き起こされる医原性サルコペニアを予防する事が、サルコペニアによる摂食嚥下障害の予防に重要である。", answer: true },
              { id: "o26_137", type: "tf", text: "調剤基本料とは、薬剤師が患者の服薬状況の把握、薬歴の管理、服薬指導、情報提供など「対人業務」を行った際に算定される調剤報酬である。", answer: false, explanation: "「薬学管理料」の説明である。調剤基本料は処方箋1回の受付ごとに算定する基本的な報酬。" },
              { id: "o26_138", type: "tf", text: "かかりつけ薬剤師が残薬対策を実施した場合の加算、「フォローアップ加算」「訪問加算」が新設された。", answer: true },
              { id: "o26_139", type: "tf", text: "新設された「調剤時残薬調整加算」は、薬剤師の対応により、残薬が確認された患者の7日以上の調剤日数の変更が行われた場合に算定可能である。", answer: true },
              { id: "o26_140", type: "tf", text: "「訪問薬剤管理医師同時指導料」は、医師および薬剤師による患家や介護施設への同時訪問に対する評価として新設された。", answer: false, explanation: "単一建物診療患者が1人の場合であり、介護施設への同時訪問では算定できない。" },

            ]

              { id: "lg26_14", type: "tf", text: "広告募集案内(趣意書)で確認するべき項目のうち、スペース毎の料金・募集数、発行部数、作成諸費用明細は特に重要である。", answer: true },
              { id: "lg26_15", type: "tf", text: "お世話になっている民間病院の先生に、海外の結婚式のお土産を買ってきてお渡しした。", answer: false, explanation: "医療担当者個人・医療施設への物品の提供は不可。" },
              { id: "lg26_16", type: "tf", text: "新年会兼院長誕生日会に、実費相当額の参加費を支払い出席した。", answer: false, explanation: "誕生日会等は社会的儀礼に該当せず、参加費が同額でも不可。" },
              { id: "lg26_17", type: "tf", text: "災害のお見舞いに、水や食料品等の援助物資を提供した。(災害後2ヵ月程度の期間内)。", answer: true },
              { id: "lg26_18", type: "tf", text: "お世話になっている民間病院の院長のお父さま(前院長)が亡くなられ、通夜に参列し香典を持参した。", answer: false, explanation: "香典等の物品の提供は不可。" },
              { id: "lg26_19", type: "tf", text: "講演会等の役割者への慰労会を、講演会当日実施できなかったため、翌日改めて実施した。", answer: false, explanation: "当日以外の慰労目的の飲食提供は不可。" },
              { id: "lg26_20", type: "tf", text: "講演会後の役割者慰労会の2万円金額基準に、消費税とサービス料は含まれない。", answer: false, explanation: "消費税は含まないが、サービス料は含まれる。" },
              { id: "lg26_21", type: "tf", text: "役割者慰労会で、一人あたりの金額が2万円を超えたので私費で支払った。", answer: false, explanation: "私費であっても設定金額を超えれば規約違反。" },
              { id: "lg26_22", type: "tf", text: "シリンジを安全に使用してもらうためのシールを、MR自身の判断で会社にて作成し、医療機関に提供した。", answer: false, explanation: "MR自身の判断で提供してはいけない。会社全体で判断する必要がある。" },
              { id: "lg26_23", type: "tf", text: "抗がん剤の調製用に遮光カバーを依頼され、当社TPN製品が採用されているので提供した。", answer: false, explanation: "TPN製品の専用品としてのみ提供でき、他製品に使用するための理由では不可。" },
              { id: "lg26_24", type: "tf", text: "静脈留置針を固定するテープの提供を依頼され、末梢静脈用輸液使用に必要な物品と判断し経費で購入し提供した。", answer: false, explanation: "本来医療機関等が自ら備えるべき物品であり、提供不可。" },
              { id: "lg26_25", type: "tf", text: "少額・適正な物品の単価は、市価で5千円程度までを目安とする。", answer: false, explanation: "市価で3千円程度までを目安とする。" },
              { id: "lg26_26", type: "tf", text: "病態に合わせて適正に使用していただくため、本社企画として関連する病態の医学図書(定価1万円)を提供した。", answer: true },
              { id: "lg26_27", type: "tf", text: "医師から当社医薬品が記載されている医学図書(3千円)を1冊提供してほしいと依頼され、謹呈本として提供した。", answer: false, explanation: "特定の図書を指定されており、単なる費用負担となるため不可。" },
              { id: "lg26_28", type: "tf", text: "オーエスワンゼリーのサンプリングのため、医療担当者に訪問毎に試供品シールを貼って提供した。", answer: false, explanation: "反復提供はできず、支店等で試供品シールを貼ることも不可。" },
              { id: "lg26_29", type: "tf", text: "公民館で試用医薬品の展示をする場合は、現地の薬務課等に問い合わせをしてルール等を確認した方が良い。", answer: true },
              { id: "lg26_30", type: "tf", text: "ホテル等での展示にあたっては、医療用医薬品・医療機器・化粧品・食品は区別して展示する。", answer: true },
              { id: "lg26_31", type: "tf", text: "臨床試用医薬品の提供依頼があり、卸売業者経熟で届けてもらった。", answer: false, explanation: "卸売業者を経由する提供は認められない。" },
              { id: "lg26_32", type: "tf", text: "クリニックの医師から、門前調剤薬局に臨床試用医薬品を持参しておくよう依頼があり、持参した。", answer: false, explanation: "必ず対象クリニックで試用されなければならず、調剤薬局への提供は不可。" },
              { id: "lg26_33", type: "tf", text: "臨床試用医薬品の試用中または仮採用中の病院に対して、症例報告を依頼した。", answer: false, explanation: "採用先でないと依頼できない。厚労省からの指示がある全症例調査は例外。" },
              { id: "lg26_34", type: "tf", text: "特定使用成績調査の会合に、未採用医療機関の医療担当者の出席を要請した。", answer: false, explanation: "採用を目的とした行為と誤解されるおそれがあるため要請できない。" },
              { id: "lg26_35", type: "tf", text: "特定使用成績調査の実施要綱等の説明を行う会合を開催し、会合出席者全員に謝礼を支払った。", answer: false, explanation: "謝礼は受委託契約に基づき医療機関に支払われるため、別途支払うことは不可。" },
              { id: "lg26_36", type: "tf", text: "担当病院で臨床試験が実施されるため、研究員と一緒に医療担当者と面談をした。", answer: false, explanation: "MRは臨床研究等に関与できず、一緒に説明することはできない。" },
              { id: "lg26_37", type: "tf", text: "アンケート実施にあたって、タイトルには「アンケート」と表示し、実施責任者はMRの氏名を記載した。", answer: false, explanation: "実施責任者は部門長とすること。" },
              { id: "lg26_38", type: "tf", text: "アンケート実施にあたって、他社の誹謗・中傷にあたる表現は避けるべきである。", answer: true },
              { id: "lg26_39", type: "tf", text: "「地域連携のテーマ(医療関連)」で共催講演会を行い、一般参加者には弁当等は提供せず、コーヒーを提供した。", answer: true },
              { id: "lg26_40", type: "tf", text: "10施設の医師10名が出席し、全員でディスカッションする形式の会合を、自社医薬品の講演会として実施した。", answer: false, explanation: "聴講者がいない、又は演者と聴講者の区別ができないディスカッション形式は自社医薬品の講演会として不可。" },
              { id: "lg26_41", type: "tf", text: "製品概要の録画を映写し、これを自社医薬品テーマの講演会とみなして一般参加者に旅費負担し懇親会を実施した。", answer: false, explanation: "録画を映写するだけでは講演会の要件を満たさず、懇親会等も不可。" },
              { id: "lg26_42", type: "tf", text: "研究会と共催で自社医薬品関連テーマの講演会を開催し、その前後に行われる世話人会等への出席者に旅費を提供した。", answer: true },
              { id: "lg26_43", type: "tf", text: "OPCが自社製品関連テーマとして準備していた講演会を代わりに実施し、一般参加者に対して弁当等を提供した。", answer: false, explanation: "OPFにとっては自社医薬品に関連しないテーマとなるため、弁当等は提供不可。" },
              { id: "lg26_44", type: "tf", text: "医師会が会場・テーマ等を全て決めており懇親会も予定されている会合で、費用負担の依頼を受け共催で実施した。", answer: false, explanation: "事前に企画していないため、依頼に応じることはできない。" },
              { id: "lg26_45", type: "tf", text: "主催講演会において、特別講演演者であるみなし公務員の先生に随行し、移動中に弁当を提供した。", answer: false, explanation: "国家公務員等への随行は禁止。" },
              { id: "lg26_46", type: "tf", text: "世話人会等の議事録記載にあたっては、代表世話人や当番世話人の発言を箇条書きにすればよい。", answer: false, explanation: "発言した参加者全員分のコメントや発言要旨を記載する必要がある。" },
              { id: "lg26_47", type: "tf", text: "病院職員対象のIT関連勉強会において、当社ICT担当者も演者の依頼を快諾し実施した。", answer: false, explanation: "本来病院が職員のために行うべき勉強会であり、不当な景品類の提供にあたる。" },
              { id: "lg26_48", type: "tf", text: "院内の親睦行事への参加を要請される場合、参加費が実費相当等であることなど4点の留意点をお願いしている。", answer: true },
              { id: "lg26_49", type: "tf", text: "新年会で参加者全員に3千円程度の物品を持ってくるよう依頼があったので、持参し参加した。", answer: true },
              { id: "lg26_50", type: "tf", text: "事業企画申請の記載項目に「テーマ」が追加されたのは、「自社製品関連」か「非自社製品関連」か意識してもらうためである。", answer: true },
              { id: "lg26_51", type: "tf", text: "担当施設の医師が他支店実施の講演会で講演した。講師謝礼を支払請求する際、他支店実施であるため事業企画申請Noを記載しなかった。", answer: false, explanation: "事業企画申請Noの記載は必須。" },
              { id: "lg26_52", type: "tf", text: "事業企画申請承認後、Web予定だった役割者が会場でリアル参加となり旅費が追加になったが、そのまま実施した。", answer: false, explanation: "速やかに取戻申請し、旅費を追加すること。" },
              { id: "lg26_53", type: "tf", text: "主催講演会で、一般演題演者を支店学術部員に実施してもらうことになり、費用はかからないが役割者登録をした。", answer: true },
              { id: "lg26_54", type: "tf", text: "事業企画申請作成中に、イントラマート画面で招聘状等書類をプレビュー画面で事前確認できる。", answer: true },
              { id: "lg26_55", type: "tf", text: "事業企画申請の個人情報管理責任者は、MRを選任して記載した。", answer: false, explanation: "リーダー又は支店長が担うこと。" },
              { id: "lg26_56", type: "tf", text: "アクトリーンとリリアムシリーズのトレーニング実施の場合は、事業企画申請は不要である。", answer: false, explanation: "アクトリーン等でもトレーニングの事業企画申請は必ず必要。" },
              { id: "lg26_57", type: "tf", text: "全国学会でタムガイドをメインで展示し他製品も展示する予定だが、展示事前申請ではメインのタムガイドのみ記載した。", answer: false, explanation: "実際に展示する全製品の製品名を記載すること。" },
              { id: "lg26_58", type: "tf", text: "病院職員にとって、MR等製薬企業の社員は利害関係者に該当する。", answer: true },
              { id: "lg26_59", type: "tf", text: "病院職員にとって、病院で受診する患者は利害関係者に該当する。", answer: false, explanation: "患者は倫理規程上の利害関係者ではない。" },
              { id: "lg26_60", type: "tf", text: "自社製品に関する講演会に講師として出席した病院医師(みなし公務員)が、終了後、多数が出席する懇親パーティーに出席した。", answer: true },
              { id: "lg26_61", type: "tf", text: "国立病院機構の病院職員はみなし公務員であり、贈収賄罪は公務員と同じように適用される。", answer: true },
              { id: "lg26_62", type: "tf", text: "主催の講演会において、みなし公務員(国立大学法人)の先生に、特別講演演者を依頼した。", answer: true },
              { id: "lg26_63", type: "tf", text: "国立病院機構の先生に、社内研修会の講師を依頼し、役職が部長なので謝礼として3万円を支払った。", answer: false, explanation: "営利企業の社員だけへの社内研修会での講師依頼は不可。" },
              { id: "lg26_64", type: "tf", text: "JCHOの先生に、交通費としてタクシーチケットを提供した。", answer: false, explanation: "JCHOや国立病院機構ではタクシーチケット利用を禁止している。" }
            ]
          },
          pms: {
            id: "pms2026", title: "基礎：2026年PMS", type: "bas",
            questions: [
              { id: "pm26_1", type: "tf", text: "医薬品医療機器等法第1条には、「品質、有効性及び安全性確保並びにこれらの使用による保健衛生上の危害の発生及び拡大防止のために必要な規制を行う」と薬害防止の理念が明記されている。", answer: true },
              { id: "pm26_2", type: "tf", text: "医薬品医療機器等法第1条の2〜6には、国や医薬関係者、医薬品等関連事業者等の責務が規定されており、国民にも役割がある。", answer: true },
              { id: "pm26_3", type: "tf", text: "製造販売後安全管理の方法が厚生労働省令で定める基準に適合しないときは、製造販売業の許可を与えないことができるとされている。", answer: true },
              { id: "pm26_4", type: "tf", text: "医薬品医療機器等法第17条に、医薬品等総括製造販売責任者等の設置について規定されている。", answer: true },
              { id: "pm26_5", type: "tf", text: "製造販売業三役とは、総括製造販売責任者、安全管理責任者、品質保証責任者をいう。", answer: true },
              { id: "pm26_6", type: "tf", text: "スモン事件は市販直後調査制度、ソリブジン事件は医薬品副作用被害救済制度、サリドマイド事件は副作用モニター制度と関連している。", answer: false, explanation: "スモン事件は医薬品副作用被害救済制度、ソリブジン事件は市販直後調査制度、サリドマイド事件は副作用モニター制度である。" },
              { id: "pm26_7", type: "tf", text: "スモン事件を契機として、承認審査制度の見直しが行われ、現在の新薬承認審査制度の基礎が作られた。", answer: false, explanation: "承認審査制度の見直しはサリドマイド事件が契機。スモン事件は被害救済制度の契機。" },
              { id: "pm26_8", type: "tf", text: "日本のPMSは、「再審査制度および安全性定期報告」、「再評価制度」および「副作用・感染症報告制度」の3つの制度で成り立っている。", answer: true },
              { id: "pm26_9", type: "tf", text: "PMSの目的のひとつは、収集・評価・分析された情報を、適切に医療関係者に伝達することである。", answer: true },
              { id: "pm26_10", type: "tf", text: "日本のPMSの3つの制度は、GVPとGQPの基準に基づいて実施されている。", answer: false, explanation: "GVPとGPSPの基準に基づいて実施されている。" },
              { id: "pm26_11", type: "tf", text: "日本のPMSは「再審査制度および安全性定期報告」、「市販直後調査制度」、「副作用・感染症報告制度」で成り立っている。", answer: false, explanation: "「再審査制度および安全性定期報告」、「再評価制度」、「副作用・感染症報告制度」である。" },
              { id: "pm26_12", type: "tf", text: "PMS は医薬品の製造販売後に行われる有効性、安全性の確保のための活動である。", answer: true },
              { id: "pm26_13", type: "tf", text: "製造販売業者の遵守事項として、製造販売しようとする製品の製造販売後安全管理を適正に行うことが求められている。", answer: true },
              { id: "pm26_14", type: "tf", text: "GVP 省令において、「医薬情報担当者」および「医療機器情報担当者」は法的に定義され、安全管理において重要な役割を担う。", answer: true },
              { id: "pm26_15", type: "tf", text: "GVP 省令第4条では、「安全管理統括部門」を設置し、その責任者として「安全管理責任者」を置いて安全確保業務を行わせなければならないと規定されている。", answer: true },
              { id: "pm26_16", type: "tf", text: "GVP 省令第5条では、第一種製造販売業者は製造販売後安全管理業務手順書を作成しなければならないと規定されている。", answer: true },
              { id: "pm26_17", type: "tf", text: "GVPおよびGQPは許可要件であり、PMDAにより適合性調査が行われる。", answer: false, explanation: "都道府県により適合性調査が行われる。" },
              { id: "pm26_18", type: "tf", text: "製造販売後安全管理業務手順書は、安全確保業務を行うその他の事務所(支店・営業所など)にも写しを備え付けることが義務づけられている。", answer: true },
              { id: "pm26_19", type: "tf", text: "GVP省令第10条には、新医薬品の販売開始後の6か月間に行われる市販直後調査について定められている。", answer: true },
              { id: "pm26_20", type: "tf", text: "GVP 省令第12条には、第一種製造販売業者は教育訓練計画を作成させ、保存させなければならないと規定されている。", answer: true },
              { id: "pm26_21", type: "tf", text: "副作用・感染症報告制度を構成する5つの制度には、「企業報告制度」、「WHO国際医薬品モニタリング制度」、「患者からの医薬品副作用報告制度」等が含まれる。", answer: true },
              { id: "pm26_22", type: "tf", text: "医療関係者は、副作用等の症例を知って危害の発生防止のため必要があると認めるときは厚生労働大臣に報告しなければならない。", answer: true },
              { id: "pm26_23", type: "tf", text: "感染症定期報告制度は、生物由来製品に関する最新の文献等から得られる知見に基づいて評価を行い、厚生労働大臣に報告を行う制度である。", answer: true },
              { id: "pm26_24", type: "tf", text: "WHO 国際医薬品モニタリング制度は、WHOと参加する各国との間で情報交換を行い、医薬品の安全確保に役立てる制度である。", answer: true },
              { id: "pm26_25", type: "tf", text: "企業報告制度は、有効性及び安全性に関する事項を知ったときは厚生労働大臣に報告しなければならないとされている。", answer: true },
              { id: "pm26_26", type: "tf", text: "企業報告制度で、感染症症例については、報告対象のすべての症例について 30 日以内に報告しなければならない。", answer: false, explanation: "15日以内に報告しなければならない。" },
              { id: "pm26_27", type: "tf", text: "患者からの医薬品副作用報告制度とは、副作用が疑われる症例の情報を患者またはその家族から直接収集する制度である。", answer: true },
              { id: "pm26_28", type: "tf", text: "GPSPは、製造販売後調査等に関する業務が適正に実施され、再審査および再評価申請資料の信頼性を確保することを目的とする。", answer: true },
              { id: "pm26_29", type: "tf", text: "再審査制度とは、1979年の薬事法改正により導入され、一定期間後に有効性および安全性の再確認を行う制度である。", answer: true },
              { id: "pm26_30", type: "tf", text: "再審査の手順において、提出された資料が GPSP に適合するかどうかについての書面調査または実地調査が実施される。", answer: true },
              { id: "pm26_31", type: "tf", text: "製造販売後調査等の種類には、使用成績調査、製造販売後データベース調査、製造販売後臨床試験があり、GPSPにおいて定義されている。", answer: true },
              { id: "pm26_32", type: "tf", text: "使用成績調査とは、医療機関から収集した情報を用いて、副作用による疾病等の発現状況ならびに有効性・安全性の検出または確認のために行う調査である。", answer: true },
              { id: "pm26_33", type: "tf", text: "一般使用成績調査とは、医薬品を使用する者の条件を定めることなく行う調査であり、使用成績比較調査に該当しないものをいう。", answer: true },
              { id: "pm26_34", type: "tf", text: "特定使用成績調査とは、小児、高齢者など医薬品を使用する者の条件を定めて行う調査であり、使用成績比較調査に該当しないものをいう。", answer: true },
              { id: "pm26_35", type: "tf", text: "使用成績比較調査とは、特定の医薬品を使用する者の情報と当該医薬品を使用しない者の情報とを比較することによって行う調査をいう。", answer: true },
              { id: "pm26_36", type: "tf", text: "製造販売後データベース調査とは、医療情報データベースを用い、情報の検出または確認のために行う調査のことである。", answer: true },
              { id: "pm26_37", type: "tf", text: "安全性定期報告は、指定日から2年間は半年ごと、それ以降は1年ごと、調査単位期間満了後から70日以内にPMDAに報告することとなっている。", answer: true },
              { id: "pm26_38", type: "tf", text: "GPSP上に MRに関する具体的な規定はないが、MRは調査票の配布・回収など、重要な役割を担う。", answer: true },
              { id: "pm26_39", type: "tf", text: "定期的ベネフィット・リスク評価報告(PBRER)は、各国の提携会社から情報を収集し、ベネフィット・リスクについて評価を行った結果をまとめた報告書である。", answer: true },
              { id: "pm26_40", type: "tf", text: "医薬品等の製造販売業者等は、適正な使用のために必要な情報を収集・検討し、医薬関係者に対し提供するよう努めなければならない。", answer: true },
              { id: "pm26_41", type: "tf", text: "情報伝達の手順は、OPF製造販売後安全管理業務手順書の「安全確保措置の実施に関する業務手順」に定められている。", answer: true },
              { id: "pm26_42", type: "tf", text: "OPFでは、情報伝達内容の教育訓練をO-PLUS 放送等で実施した後、MR等が医療機関等へ情報伝達を開始する手順となっている。", answer: true },
              { id: "pm26_43", type: "tf", text: "緊急安全性情報はイエローレターとも呼ばれ、緊急かつ重大な注意喚起等が必要な場合に製造販売業者が作成する。", answer: true },
              { id: "pm26_44", type: "tf", text: "電子添文の使用上の注意等の改訂は、通知によるもののほか、製造販売業者等が自主的に改訂を決定する場合もある。", answer: true },
              { id: "pm26_45", type: "tf", text: "RMPとは、医薬品の開発から市販後まで一貫したリスク管理をひとつの文書にまとめ、評価が行われるようにするものである。", answer: true },
              { id: "pm26_46", type: "tf", text: "処方箋医薬品の製造販売業者は、医薬品リスク管理計画書を備え付けるとともに、その他の事務所にも写しを備え付けることが規定されている。", answer: true },
              { id: "pm26_47", type: "tf", text: "安全性検討事項には、「重要な特定されたリスク」、「重要な潜在的リスク」、「重要な不足情報」の3つがある。", answer: true },
              { id: "pm26_48", type: "tf", text: "「重要な特定されたリスク」とは、医薬品との関連性が十分な根拠に基づいて示されている有害な事象のうち、重要なものである。", answer: true },
              { id: "pm26_49", type: "tf", text: "「重要な潜在的リスク」とは、医薬品との関連性が疑われる要因はあるが、臨床データ等からの確認が十分でない有害な事象のうち、重要なものである。", answer: true },
              { id: "pm26_50", type: "tf", text: "「重要な不足情報」とは、RMPを策定した時点では十分な情報が得られておらず、安全性を予測する上で不足している情報のうち、重要なものである。", answer: true },
              { id: "pm26_51", type: "tf", text: "「医薬品安全性監視計画」とは、リスクを最小に抑え、ベネフィット・リスクバランスを適切に維持するための活動の計画である。", answer: false, explanation: "リスク最小化計画の説明。「医薬品安全性監視計画」とは安全性検討事項を踏まえて実施する監視活動の計画である。" },
              { id: "pm26_52", type: "tf", text: "新たな安全性の懸念が判明したときは、速やかに安全性検討事項の内容を見直す。安全性検討事項を変更するときは、RMPの見直しも行う。", answer: true },
              { id: "pm26_53", type: "tf", text: "MR はRMPの最新情報の提供を迅速かつ適切に行うことで、市販直後からの安全対策の強化に寄与することが求められている。", answer: true },
              { id: "pm26_54", type: "tf", text: "医薬品の安全管理情報を入手したときは、情報入手後、原則1暦日以内に電子速報書システムに入力する。", answer: true },
              { id: "pm26_55", type: "tf", text: "優先して入手すべき6項目は、「有害事象名」、「重篤性」、「本剤との因果関係」、「患者識別情報」、「使用薬剤名(自社製品名)」、「転帰」である。", answer: true },
              { id: "pm26_56", type: "tf", text: "当該医薬品との因果関係が否定された場合は、その理由(例えば、病態の影響など)を確認することが必要である。", answer: true },
              { id: "pm26_57", type: "tf", text: "安全管理部で収集対象としている医療機器は、「ビスコクリア」、「局所洗浄用ノズル」、「専用アダプタ」、「加圧バッグ」、「タムガイド光源装置」および「タムガイドファイバー」である。", answer: true },
              { id: "pm26_58", type: "tf", text: "医療機器の安全管理情報には、「不具合情報」および「健康被害情報等」があり、健康被害情報は当該機器の「不具合」の有無とは関連しない。", answer: true },
              { id: "pm26_59", type: "tf", text: "医療機器の「不具合」の種類には、仕様上の問題、不良品、故障、電子添文等の不十分な記載、機器による有害事象がある。", answer: true },
              { id: "pm26_60", type: "tf", text: "医療機器により生じた健康被害情報等は、情報入手後、原則1暦日以内に電子速報書システムに入力する。", answer: false, explanation: "医療機器連絡票システムに入力する。" },
              { id: "pm26_61", type: "tf", text: "医療機器の調査最優先事項は、「不具合の状況」、「健康被害の事象名」、「重篤性」、「因果関係」、「患者情報」である。", answer: true },
              { id: "pm26_62", type: "tf", text: "コンビネーション製品で苦情・要望を入手したら、情報入手後7暦日以内に苦情要望管理システムに登録し、医薬品部分による有害事象は電子速報書システムに1暦日以内に登録する。", answer: true }
            ]
          },
          morningq: {
            id: "morningq2026", title: "MorningQ問題", type: "bas",
            questions: [
              { id: "mq_1", type: "mc", text: "【Q058-1】A医師会と共催で自社医薬品に関連する講演会を開催します。演者であるA医師会の医師から、講演用資料として自分が執筆した医学雑誌(定価5,500円)を参加者全員に配布して欲しい旨の要請がありました。この医学雑誌を配布してもよいでしょうか。", options: ["配布できる", "配布できない"], answer: 0, explanation: "当該医学雑誌は自社医薬品に関連する講演用の資料として使用するものであり、また、自社医薬品に関する情報媒体でもあるので、購入単価に関係なく参加者全員に提供することができます。" },
              { id: "mq_2", type: "mc", text: "【Q058-2】地域の中核病院であるA病院との共催で自社医薬品の講演会を企画しました。講演会の前にA病院の「院内研修会」が同じ会場で約1時間予定されていることがわかりました。「院内研修会」を含めた会場費を負担してもよいでしょうか。", options: ["負担できる", "負担できない"], answer: 1, explanation: "院内研修会に関わる費用は病院側が負担すべきものであり、メーカーが負担すると不当な景品類の提供にあたるおそれがあるため、負担できません。" },
              { id: "mq_3", type: "mc", text: "【Q058-3】自社医薬品のWeb講演会（発信会場:ホテル）の受信会場は全国47会場で、20時開始予定です。これに先立ち、19時から一部の受信会場では役割者（演者・座長）である治験医師による講演も行われます。演者・座長への謝礼を支払うことはできますか。", options: ["支払うことができる", "支払うことはできない"], answer: 0, explanation: "Web講演会の受信会場であっても、演者・座長等の役割者がいる場合、謝礼を支払うことができます。" },
              { id: "mq_4", type: "mc", text: "【Q059-1】A大学附属病院と共催で自社医薬品の講演会を開催することになりました。参加対象はA大学附属病院と2つの分院に所属する医師、薬剤師です。医薬品の購入は独立していますが、同一法人に属しています。このような共催講演会を実施することはできるでしょうか。", options: ["実施できる", "実施できない"], answer: 1, explanation: "A大学附属病院と2つの分院は、同一の法人に属していますので、単独の医療機関とみなされます。単独の医療機関を対象とした共催講演会は実施できません。" },
              { id: "mq_5", type: "mc", text: "【Q059-2】自社医薬品の講演会について、予め趣旨を反映した内容で事前収録を行い、当日に集合会場で講演内容を映写し、引き続いてインターネット通信を利用して同じ演者によるライブでの質疑応答を行う企画です。これを自社医薬品の講演会として懇親行事を含めて開催できますか。", options: ["開催できる", "開催できない"], answer: 0, explanation: "録画による講演の映写であっても、ライブ形式で質疑応答が予定されているため、口頭説明が基本、ライブ形式、双方向のやりとりを満たしているとみなし、開催できます。" },
              { id: "mq_6", type: "mc", text: "【Q060-1】Aクリニックから忘年会の案内状が届きました。会場は人気のビール園で参加費が2万円です。出席者はクリニック院長他職員など総勢25名です。一般的なパーティープランは3千円〜5千円程度です。このような忘年会に参加してもよいでしょうか。", options: ["参加できる", "参加できない"], answer: 1, explanation: "今回の参加費2万円は、実施場所、内容からみて実費相当額とは判断できないので参加できません。" },
              { id: "mq_7", type: "mc", text: "【Q060-2】A医院より忘年会の案内状をいただきました。Bホテルにて参加費2万円(二次会費込み)となっています。弊社は一次会のみ参加しようと考えていますが、参加費2万円を支払って参加してもよいでしょうか。", options: ["参加できる", "参加できない"], answer: 1, explanation: "出席しない二次会の費用負担は「実費相当額を超える参加費」とみなされます。一次会と二次会の費用を明記した案内状を新たに作成していただき、一次会の金額が実費相当と確認できれば一次会のみの参加費を支払って参加できます。" },
              { id: "mq_8", type: "mc", text: "【Q060-3】A医院からの忘年会（参加費1万円は実費相当額）の案内状に、MRは参加費に加えて3千円程度の品物を持参するよう記載がありました。少額な景品類と考え持参できるでしょうか。", options: ["持参できる", "持参できない"], answer: 1, explanation: "MRにのみ物品を要請されている場合は、不当な景品類の提供となり持参できません。参加者全員が平等に妥当な額の物品を持参する場合を除き、医療機関等主催の親睦会合での金品提供は制限されます。" },
              { id: "mq_9", type: "mc", text: "【Q061-1】医療機関主催の忘年会の案内状に、参加費(実費相当)に加え2千円程度の景品を提供するように書かれています。当社は別の予定があり参加できませんが、景品を提供することはできるでしょうか。", options: ["提供できる", "提供できない"], answer: 1, explanation: "医療機関の親睦会合に参加せずに景品を提供することはできません。名目のいかんを問わず金品を提供することは規約で制限されます。" },
              { id: "mq_10", type: "mc", text: "【Q061-2】Aクリニックより院内レクリエーション参加の案内がありました。案内状には、ボウリング大会(2千円)、その後に懇親会(5千円)と記載があります。参加費は医師・スタッフと同額であり、それぞれ実費相当額のようです。この行事に参加してもよいでしょうか。", options: ["参加できる", "参加できない"], answer: 0, explanation: "ボウリング、懇親会と複数のイベントが企画されていますが、参加費はそれぞれ実費相当額と判断できるため、当該行事への参加は規約で制限されません。" },
              { id: "mq_11", type: "mc", text: "【Q061-3】A病院から忘年会（会費1万円・実費相当）の案内がありました。例年、一次会のあと病院職員数名とメーカー数社で二次会に行き、二次会の費用は参加メーカーで均等に負担することになっています。この二次会に参加してもよいでしょうか。", options: ["参加できる", "参加できない"], answer: 1, explanation: "一次会の参加費が実費相当であると確認出来れば一次会には参加できますが、二次会の費用を参加メーカーで負担することはできません。" },
              { id: "mq_12", type: "mc", text: "【Q062-1】A学会地方会よりプログラム抄録への広告募集の依頼がありました。収支予算書では広告掲載料収入130万円、プログラム抄録作成費80万円となっています。この広告掲載に応じてもよいでしょうか。", options: ["応じてもよい", "応じるべきではない"], answer: 1, explanation: "印刷媒体の場合、広告料収入が媒体作成費用を大幅に上回る場合は、当業界の定める「相応の広告料」には当りませんので、広告掲載の依頼に応じるべきではありません。" },
              { id: "mq_13", type: "mc", text: "【Q062-2】A病院が地域住民と親睦をはかるため開催する納涼祭（盆踊り、花火、模擬店など）において、地域住民等に配布するパンフレットへの広告依頼がありました。応じてもよいでしょうか。", options: ["応じてもよい", "応じてはならない"], answer: 1, explanation: "遊び、サービスが中心である「まつり」のパンフレットは、本来医療機関が自らの費用で作成、使用するものですので、広告媒体として相応しくありません。" },
              { id: "mq_14", type: "mc", text: "【Q063-1】A地区医師会の設立30周年記念誌への広告掲載の案内がありました。広告掲載料は1ページ3万円、半ページ2万円です。作成部数200部、作成費用50万円ですが、募集総額、募集数は不明です。この広告掲載募集に応じてもよいでしょうか。", options: ["応じてもよい", "応じることはできない"], answer: 1, explanation: "広告スペースごとの料金・募集数を、広告掲載案内に記載していただき、相応の広告料の範囲内であるかどうか確認する必要があります。現状では応じることはできません。" },
              { id: "mq_15", type: "mc", text: "【Q063-2】市内のホテルで〇〇市医師会と共催で、複数施設の医療関係者を対象とした、自社医薬品に関連しない「地域包括ケアシステム」をテーマとした講演会を企画しています。このような共催講演会は開催できますか。", options: ["開催でき、茶菓・弁当等も提供可能", "開催できるが、茶菓・弁当・懇親行事等は提供不可", "自社医薬品に関連しないため開催できない"], answer: 1, explanation: "自社医薬品に関連しない医療関連テーマであっても共催の講演会は開催できます。ただし、会合費用以外の景品類である「懇親行事、一般参加者の旅費、贈呈品、茶菓・弁当等」は提供できません。" },
              { id: "mq_16", type: "mc", text: "【Q063-3】複数の病院の医療担当者約30名を対象に、自社医薬品に関連しないテーマの主催講演会を市内のホテルで開催します。講師謝礼、講師旅費、会場費に加え、茶菓・弁当を提供できますか。", options: ["すべて提供できる", "講師謝礼・旅費・会場費は支払えるが、茶菓・弁当は提供できない", "いずれも支払いや提供ができない"], answer: 1, explanation: "自社医薬品に関連しないテーマの主催講演会ですので、会合費用以外の景品類である茶菓・弁当の提供はできません。会合費用である「講師謝礼、講師旅費、会場費」は支払うことができます。" },
              { id: "mq_17", type: "mc", text: "【Q064-1】A病院の当直医師に医薬情報活動を行います。夕食時間帯となるため、医薬情報活動に伴う飲食提供として、3千5百円のうな重を持参してもよいでしょうか。", options: ["持参できる", "持参できない"], answer: 1, explanation: "5千円を超えない飲食提供が許容されるのは、院内で相応しい場所や時間を確保できない場合に、喫茶等での活動を許容するものです。夕食時間帯等であっても、医療機関内に弁当を持参したり出前を取ることはできません。" },
              { id: "mq_18", type: "mc", text: "【Q064-2】A卸の支店長が、Bクリニックの院長をゴルフ接待する際、当社C所長の同伴プレーを求めてきました。院長の費用はすべてA卸が負担し、C所長は自分の費用のみ負担します。同伴してもよいでしょうか。", options: ["同伴できる", "同伴すべきではない"], answer: 1, explanation: "院長から見た場合、ゴルフ接待自体を卸とメーカーの両者から提供を受けたと認識することが想定され、規約違反に問われるおそれがあります。自分の費用のみ負担するとしても同伴すべきではありません。" },
              { id: "mq_19", type: "mc", text: "【Q064-3】A学会におけるバナー広告の依頼を受けました。紙媒体は作成せず、学会員専用Web上のプログラムにてバナー広告を掲示するものです。広告期間5カ月、掲載料金10万円です。応募できますか。", options: ["応募できる", "応募できない"], answer: 0, explanation: "応募することができます。ただし、学会等におけるバナー広告については、その広告料が、社会通念を大幅に超えるものでない相応の対価であることを確認する必要があります。" },
              { id: "mq_20", type: "mc", text: "【Q065-1】災害が発生し担当先の多くの医療機関が被災しました。そこで担当先の医療機関等で散乱物の後片付け等、支援活動を行いたいのですが、過大な労務提供として規約違反に問われることはないでしょうか。", options: ["規約違反に問われることはない", "規約違反になるため実施できない"], answer: 0, explanation: "災害復旧のための労務提供は、義援金、見舞金、水等の援助物資と同様、医療用医薬品の取引に付随しないものとして扱うため、規約上の制限を受けません。" },
              { id: "mq_21", type: "mc", text: "【Q065-2】A大学病院の機関誌（200部発行予定）への広告依頼がありました。広告料募集総額は90万円、媒体作成諸費用は100万円（印刷費90万＋郵送料10万）です。このような広告に応募できるでしょうか。", options: ["応募できる", "応募できない"], answer: 0, explanation: "広告料の総額が媒体作成費用の範囲内であり、個人費用の指標を満たしているなど相応の広告料であると判断できれば応募できます。" },
              { id: "mq_22", type: "mc", text: "【Q066-1】旭川医科大学病院の先生の身分はどれに該当しますか？", options: ["公務員", "みなし公務員", "民間人"], answer: 1, explanation: "開設者は「国立大学法人」です。法人の職員となるため「みなし公務員」になります。" },
              { id: "mq_23", type: "mc", text: "【Q066-1】岩手医科大学附属病院の先生の身分はどれに該当しますか？", options: ["公務員", "みなし公務員", "民間人"], answer: 2, explanation: "開設者は「学校法人」です。法人の職員となるため「民間」になります。" },
              { id: "mq_24", type: "mc", text: "【Q066-1】防衛医科大学校病院の先生の身分はどれに該当しますか？", options: ["公務員", "みなし公務員", "民間人"], answer: 0, explanation: "開設者は「防衛省」です。防衛省の中に配置されており、その職員となるため「公務員（国家公務員）」になります。" },
              { id: "mq_25", type: "mc", text: "【Q066-1】厚生(医療)農業協同組合連合会 上越総合病院の先生の身分はどれに該当しますか？", options: ["公務員", "みなし公務員", "民間人"], answer: 2, explanation: "開設者は「厚生(医療)農業協同組合連合会」です。その団体の職員となるため「民間」になります。" },
              { id: "mq_26", type: "mc", text: "【Q066-1】東京警察病院の先生の身分はどれに該当しますか？", options: ["公務員", "みなし公務員", "民間人"], answer: 2, explanation: "開設者は「一般財団法人 自警会」です。その団体の職員となるため「民間」になります。" },
              { id: "mq_27", type: "mc", text: "【Q066-1】浜松労災病院の先生の身分はどれに該当しますか？", options: ["公務員", "みなし公務員", "民間人"], answer: 1, explanation: "開設者は「独立行政法人 労働者健康安全機構」です。その団体の職員となるため「みなし公務員」になります。" },
              { id: "mq_28", type: "mc", text: "【Q066-1】ＪＣＨＯ大阪病院の先生の身分はどれに該当しますか？", options: ["公務員", "みなし公務員", "民間人"], answer: 1, explanation: "開設者は「独立行政法人 地域医療機能推進機構」です。その団体の職員となるため「みなし公務員」になります。" },
              { id: "mq_29", type: "mc", text: "【Q066-1】富山市立富山市民病院の先生の身分はどれに該当しますか？", options: ["公務員", "みなし公務員", "民間人"], answer: 0, explanation: "開設者は「富山市」です。地方自治体の職員となるため「公務員（地方公務員）」になります。" },
              { id: "mq_30", type: "mc", text: "【Q066-1】川崎市立多摩病院の先生の身分はどれに該当しますか？", options: ["公務員", "みなし公務員", "民間人"], answer: 2, explanation: "開設者は「学校法人 聖マリアンナ医科大学」です。指定管理者制度に基づき同法人が管理・運営しているため、その職員となり「民間」になります。" },
              { id: "mq_31", type: "mc", text: "【Q066-1】広島市立広島市民病院の先生の身分はどれに該当しますか？", options: ["公務員", "みなし公務員", "民間人"], answer: 1, explanation: "開設者は「一般地方独立行政法人」です。その団体の職員となるため「みなし公務員」になります。" },
              { id: "mq_32", type: "mc", text: "【Q066-1】済生会松山病院の先生の身分はどれに該当しますか？", options: ["公務員", "みなし公務員", "民間人"], answer: 2, explanation: "開設者は「社会福祉法人 恩賜財団」です。その団体の職員となるため「民間」になります。" },
              { id: "mq_33", type: "mc", text: "【Q066-1】産業医科大学病院の先生の身分はどれに該当しますか？", options: ["公務員", "みなし公務員", "民間人"], answer: 2, explanation: "開設者は「学校法人 産業医科大学」です。その団体の職員となるため「民間」になります。" },
              { id: "mq_34", type: "mc", text: "【Q066-2】公立大学法人の医学部附属病院の部長に特別講演を依頼しました。交通便が悪いのでタクシーチケットを提供しようと思います。問題ないでしょうか？", options: ["提供して問題ない", "タクシーチケットは金券扱いなので提供できない", "施設規定で認められていれば、事務方に確認して提供して問題ない"], answer: 2, explanation: "開設者は「公立大学法人」であり「みなし公務員」になります。事業企画申請時において、当該施設の事務方（タクシー利用確認者）に確認し、指定の記載等を行えば提供可能です。" },
              { id: "mq_35", type: "mc", text: "【Q066-2】国立病院機構の病院の部長に特別講演（1時間）を依頼しました。謝礼はいくら支払うことができますか？（国立病院機構倫理規程に基づく）", options: ["3万円", "4万円（高度な専門性を有する場合は10万円程度も可）", "依頼することはできない"], answer: 1, explanation: "国立病院機構倫理規程では講演料等は1時間当たり4万円程度と記載されていますが、医学等に関する高度な専門性を有する場合は10万円程度の受領が可能となっています。" },
              { id: "mq_36", type: "mc", text: "【Q066-2】国立病院機構の病院の医師に、自社の社内研修会講師（1時間）を依頼しました。謝礼はいくら支払うことができますか？", options: ["3万円", "4万円", "依頼することはできない"], answer: 2, explanation: "国立病院機構の倫理規程で、職員が営利企業の社員だけのために講演を行うことは、国民の疑惑や不信を招く恐れがあるため、謝礼を受け取って講演を行うことはできません。" },
              { id: "mq_37", type: "mc", text: "【Q066-3】利害関係者について。製薬企業の社員(MR等)は、国立病院機構の医師等にとって利害関係者に該当しますか？", options: ["該当する", "該当しない"], answer: 0, explanation: "MR等の行為は自社の製品の販売促進等のために病院職員に接触することが多く、病院と契約関係にある医薬品販売業者の利益のための行為（代理行為）を行っていると言わざるを得ないため、利害関係者に該当します。" },
              { id: "mq_38", type: "mc", text: "【Q066-3】利害関係者について。医師会は、一般的に国立病院機構の病院職員にとって利害関係者に該当しますか？", options: ["該当する", "該当しない"], answer: 1, explanation: "医師会ということをもって直ちに利害関係者に該当するものではありません。委託契約がある場合等を除き、通常は利害関係はないと判断されます。" },
              { id: "mq_39", type: "mc", text: "【Q066-3】利害関係者について。電気・ガス・水道等の公益事業者、地方自治体等の職員は、国立病院機構の病院職員にとって利害関係者に該当しますか？", options: ["該当する", "該当しない（ただし契約事務担当職員にとっては該当する場合がある）"], answer: 1, explanation: "電気・ガス・水道等は価格設定等に裁量の余地がほとんどないため除外されています。その他の地方自治体等の職員も直ちに該当しませんが、契約等がある場合は契約担当職員にとって利害関係者になります。" },
              { id: "mq_40", type: "mc", text: "【Q066-3】利害関係者について。マスコミ（新聞記者、放送関係者など）は、国立病院機構の病院職員にとって利害関係者に該当しますか？", options: ["該当する", "該当しない（ただし広告契約等がある場合は契約担当職員にとって該当）"], answer: 1, explanation: "一般にマスコミとの間には契約等利害関係者につながる関係がないと考えられるため該当しません。ただし広告の契約等がある場合は、契約担当職員の利害関係者として取り扱います。" },
              { id: "mq_41", type: "mc", text: "【Q066-3】国立病院機構の病院の外科系診療科全体で、昼休み（12:15〜12:45）に製品説明会を実施します。食事時間帯のため、弁当を提供してもよいでしょうか。", options: ["職務内とみなされ、提供できる", "職務外とみなされるため、提供できない"], answer: 1, explanation: "昼休み（休憩時間）は職務外となるため、利害関係者から無償で弁当の提供を受けることは禁止行為となります。" },
              { id: "mq_42", type: "mc", text: "【Q066-3】国立病院機構の病院の部長が、職務外で参加する学会において、ランチョンセミナーで弁当を配布された場合、受け取ることができるでしょうか。", options: ["受け取ることができる", "受け取ることはできない"], answer: 1, explanation: "職務外で学会に参加する場合、利害関係者から提供される弁当を受け取ることは出来ません。自己の費用を負担して飲食することになります。" },
              { id: "mq_43", type: "mc", text: "【Q066-3】国立病院機構の病院の部長が、製薬会社主催の講演会に演者（役割者）として参加しました。講演会終了後、懇親会（立食形式：約30名）に出席できるでしょうか。", options: ["出席できる", "出席できない"], answer: 0, explanation: "講演会終了後に多数の者が出席する（20人以上）立食パーティーにおいて利害関係者から飲食物の提供を受けることは、倫理規程上、例外として認められています。" },
              { id: "mq_44", type: "mc", text: "【Q067-1】団体性が認められるA研究会（学術集会と機関誌を発行）から寄附要請がありました。予算書では個人費用50万円、施設年会費90万円と記載があります。寄附要請に応じてよいでしょうか。", options: ["応じることができる", "応じることはできない"], answer: 0, explanation: "施設年会費で個人費用が賄われていると判断できる（個人費用の指標を満たしている）ため、寄附金を拠出することが出来ます。" },
              { id: "mq_45", type: "mc", text: "【Q067-2】NPO法人の理事であるA先生から寄附を依頼されました。この法人の活動内容は、B病院の受診勧誘に特化したものです。予算書で個人費用に問題はありません。このNPO法人へ寄附できますか。", options: ["寄附できる", "寄附できない"], answer: 1, explanation: "活動内容が特定の病院の受診勧誘に特化しており、実質的にB病院の通常の医療業務に対する金銭提供となるため、規約で制限され寄附できません。" }
            ]
          }
        }

                statements: [ "a. 「面談の業務記録入力において、顧客名不明の場合は、職種名を選択し、顧客名欄に性別等の情報を直接入力する。その際、業務記録本文への入力は不要である。」", "b. 「業務記録入力において、リリアムワン、リリアムIP200、タムガイド光源装置は、臨床試用医療機器と記載する。」", "c. 「MRが医療関係者に提供出来る形状見本の個数は医療関係者1名あたり1〜2個である。」", "d. 「説明会の業務記録入力において、デジプロQVを用いて情報提供を行った場合、スライドのログを紐づけるが、デジプロQVを用いなかった場合は、その旨を本文に記載する。」" ],

              { id: "e25_2", type: "mc", text: "販売情報提供活動ガイドラインに関する下記の文章について、正しい正誤の組み合わせを選びなさい。",
                statements: [ "a. 「医療従事者向けの説明スライド等については、有効性に偏らず安全性も含めた情報提供となっているか、引用時にグラフ等の加工を行っていないか、事実誤認を誘発するコンテンツや流れとなっていないか等、企業としての確認が不十分と思われる事例があった。」", "b. 「製品紹介スライドと監修者がいる一般啓発スライドは、組み合わせによっては監修者の意図と反する内容になる可能性があるために、組み合わせるスライド枚数は1~2枚程度に留めることが望ましい。」", "c. 「マイシナリオを作成する注意点として以下の4項目がある。\n・誤認を誘発させるおそれのあるシナリオ内容にならないように注意する。\n・上長承認後、シナリオ内容を変更する場合は、上長にメールで再申請しなければならない。\n・実施直前に変更が生じた場合は、事後であっても上長に情報提供したシナリオのPDFをメール送信しなければならない。\n・顧客に対して情報提供したマイシナリオは、デジプロにおいて自動保存されるが、絶対に自分で削除してはならない。」", "d. 「説明会時に切り分けても一緒に紹介できない組み合わせのスライドは、カンジダ関連+ヒノーラ関連、ONS関連+イノラス・ラコールNF、ペクチン関連+ハイネックス関連の3つである。」" ],

                statements: [ "a. 「OPF営業本部所属従業員は、医師又は薬剤師から自社製品と他社製品との比較情報について一覧表の提出を求められた場合、全ての製品において情報提供可能である。」", "b. 「OPF 営業本部所属従業員は、自社製品と他社製品との比較情報(輸液製剤組成早見表以外)については、医師又は薬剤師からの求めがない場合にも提供することはできる。」", "c. 「OPF営業本部所属従業員は、医師又は薬剤師から自社製品の適応外使用に関する情報を求められた場合、求められた内容に対し適切な回答をその場で行う準備が整っていることを前提として、その場で情報提供可能である。」", "d. 「医療用医薬品における情報提供可能な対象は医療従事者のみであり、介護福祉士(ケアワーカー)・介護支援専門員(ケアマネージャー)も含まれる。」" ],

            questions: [
