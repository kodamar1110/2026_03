              { id: "p25_5", type: "mc", text: "GPSPと製造販売後調査等ガイドラインに関する下記の文章について、正しい正誤の組み合わせを選びなさい。", statements: ["a. 「GPSPは、製造販売業者等が製造販売後の調査および試験を実施する際の遵守事項を定めたものであり、製造販売後調査等に関する業務が適正に実施され、再審査および再評価申請資料の信頼性を確保することを目的とする。」","b. 「一般使用成績調査」とは、使用成績調査のうち、医薬品を使用する者の条件を定めることなく行う調査であり、使用成績比較調査に該当しないものである。」","c. 「製造販売後データベース調査」とは、製造販売業者等が、医療情報データベース取扱事業者が提供する医療情報データベースを用い、医薬品の副作用による疾病等の種類別の発現状況ならびに品質、有効性および安全性に関する情報の検出または確認のために行う調査のことである。」","d. 「MRは製造販売後調査等を実施する際に、調査等の実施医療機関への協力依頼、契約、調査票の配布・回収、必要な再調査の実施など、重要な役割を担う。」"], options: ["a:正, b:正, c:正, d:正", "a:正, b:正, c:正, d:誤", "a:正, b:誤, c:正, d:正", "a:誤, b:正, c:誤, d:正"], answer: 0, explanation: "すべて正しい記述です。" },
              { id: "p25_6", type: "mc", text: "PMSの概要/意義・重要性に関する下記の文章について、正しい正誤の組み合わせを選びなさい。", statements: ["a. 「PMSは医薬品の製造販売後に行われる有効性、安全性の確保のための活動である。」","b. 「日本のPMSは、「再審査制度および安全性定期報告」、「再評価制度」および「副作用・感染症報告制度」の3つの制度で成り立っている。」","c. 「使用成績調査と市販直後調査はGPSPによって規定されている。」","d. 「PMSの目的のひとつは、収集・評価・分析された情報を、適切に医療関係者に伝達することである。」"], options: ["a:正, b:正, c:正, d:正", "a:誤, b:誤, c:正, d:正", "a:正, b:正, c:誤, d:正", "a:正, b:正, c:正, d:誤"], answer: 2, explanation: "c: 市販直後調査はGVPによって規定されている。" },
              { id: "p25_7", type: "mc", text: "副作用・感染症報告制度に関する下記の文章について、正しい正誤の組み合わせを選びなさい。", statements: ["a. 「副作用・感染症報告制度を構成する5つの制度は、「企業報告制度」、「感染症定期報告制度」、「医薬品・医療機器等安全性情報報告制度」、「WHO国際医薬品モニタリング制度」、「患者からの医薬品副作用報告制度」である。」","b. 「企業報告制度は、医薬品医療機器等法第68条の10に「有効性及び安全性に関する事項で厚生労働省令で定めるものを知ったときは、その旨を厚生労働省令で定めるところにより厚生労働大臣(実際にはPMDA)に報告しなければならない。」とされている。」","c. 「医薬品・医療機器等安全性情報報告制度では、「医療関係者は副作用等の症例を知って保健衛生上の危害の発生または拡大を防止するため必要があると認めるときは厚生労働大臣(実際にはPMDA)に報告しなければならない。」とされている。」","d. 「感染症定期報告制度とは、生物由来製品の製造販売業者が、当該生物由来製品やその原料、材料による感染症に関して最新の文献等から得られる知見に基づいて評価を行い、半年ごとに報告を行う制度である。」"], options: ["a:正, b:正, c:正, d:正", "a:正, b:正, c:誤, d:正", "a:誤, b:正, c:正, d:誤", "a:正, b:誤, c:正, d:正"], answer: 0, explanation: "すべて正しい記述です。" },
              { id: "p25_8", type: "mc", text: "再審査制度および安全性定期報告に関する下記の文章について、正しい正誤の組み合わせを選びなさい。", statements: ["a. 「再審査制度とは、1979年の薬事法改正により導入され、医薬品医療機器等法第14条の4に規定された制度である。」","b. 「再審査期間中に実施する製造販売後調査等はRMPにおいて計画し、GVPを遵守して実施しなければならない。」","c. 「定期的ベネフィット・リスク評価報告(PBRER)は、医薬品のオリジナル開発企業が当該医薬品と同一成分を販売している各国の提携会社から安全性情報や有効性・有用性情報を収集し、ベネフィット・リスクについて分析・評価を行った結果をまとめた報告書である。」","d. 「安全性定期報告は、承認の際に厚生労働大臣が指定した日から2年間は半年ごと、それ以降は1年ごと(調査単位期間)、調査単位期間満了後から70日以内(邦文以外の資料がある場合は3ヵ月以内)に、PMDAに報告することとなっている。」"], options: ["a:正, b:正, c:正, d:正", "a:正, b:誤, c:正, d:正", "a:誤, b:正, c:誤, d:正", "a:正, b:正, c:正, d:誤"], answer: 1, explanation: "b: 製造販売後調査等はGPSPを遵守して実施しなければならない。" },
              { id: "p25_9", type: "mc", text: "医療機器・コンビネーション製品に関する下記の文章について、正しい正誤の組み合わせを選びなさい。", statements: ["a. 「2025年1月現在、OPFが取り扱う医療機器のうち、安全管理部で安全管理情報の収集対象としているのは「タムガイド」のみである。」","b. 「医療機器の安全管理情報には、「健康被害情報等」と「不具合情報」がある。」","c. 「医療機器の「不具合」の種類には、①仕様上の問題、 ②不良品、故障、破損、 ④電子添文等の不十分な記載、および⑤ 機器による有害事象がある。」","d. 「ビーフリード輸液で、苦情・要望(含:不具合情報)が発生した旨の情報を入手したら、医療機関等で発生状況、患者への使用有無等を確認し、情報入手後7暦日以内に「苦情要望管理システム」に登録する。有害事象が含まれている場合は電子速報書システムに原則1暦日以内に登録する。」"], options: ["a:正, b:正, c:正, d:誤", "a:正, b:正, c:正, d:正", "a:誤, b:正, c:正, d:正", "a:誤, b:正, c:誤, d:正"], answer: 2, explanation: "a: タムガイド以外にも複数ある。" },
              { id: "p25_10", type: "mc", text: "情報伝達に関する下記の文章について、正しい正誤の組み合わせを選びなさい。", statements: ["a. 「医薬品医療機器等法(情報の提供等)には、「医薬品等の製造販売業者等は医薬品等の有効性及び安全性に関する事項その他医薬品等の適正な使用のために必要な情報を収集し、及び検討するとともに、医薬関係者に対し、これを提供するよう努めなければならない。」と記載されている。」","b. 「情報伝達は、教育訓練を受講していれば、伝達開始日より先に情報伝達を開始することについて問題ない。」","c. 「緊急安全性情報は、ブルーレターとも呼ばれ、最も緊急性の高い安全性情報の提供を行う際に作成される。」","d. 「電子添文の使用上の注意改訂は、通知によるもののほか、製造販売業者等が自主的に改訂を決定する場合もある。」"], options: ["a:正, b:正, c:正, d:誤", "a:正, b:誤, c:誤, d:正", "a:正, b:誤, c:正, d:正", "a:誤, b:誤, c:誤, d:誤"], answer: 1, explanation: "b: 伝達期間の遵守が必要。c: 緊急安全性情報はイエローレター。" }
            ]
          },
          basic: {
            id: "exam_basic", title: "製品知識：Basic編", type: "sei",
            questions: [
              { id: "b25_1", type: "mc", text: "浸透圧の説明について、誤っているものを選びなさい。", options: ["水は浸透圧の低い方から高い方へ移動する","浸透圧を表す単位はmOsm/Lである。","ブドウ糖はイオン化する物質である。","体液の浸透圧の基準値は「約285mOsm/L」である。","イオン化しない物質の場合には、浸透圧とモル濃度は等しい"], answer: 2, explanation: "ブドウ糖はイオン化しない物質である。" },
              { id: "b25_2", type: "mc", text: "水電解質輸液とその説明で、誤っているものを選びなさい。", options: ["ビカネイト輸液:等張電解質輸液であり細胞外液全体を補充する","KN3号輸液:カリウムイオンを100mEq/L含む","KN1号輸液:1/2生食でありKを含まず血管確保に使用される","ボルベン輸液6%:血漿増量剤として循環血液量を増加させる","5%ブドウ糖液:等張液だが同量の水を投与したことになる"], answer: 1, explanation: "KN3号のK濃度は20mEq/Lである。" },
              { id: "b25_3", type: "mc", text: "飢餓時の異化の状態についての説明で、誤っているものを選びなさい。", options: ["肝臓のグリコーゲンは約1日で枯渇する","遊離脂肪酸は酸化によりエネルギーを産生する","絶食期間が長いとケトン体が蓄積しケトアシドーシスになる","アミノ酸がエネルギーとして消費されると9kcal/gの熱量を産生する","筋肉蛋白質がアミノ酸に分解される"], answer: 3, explanation: "アミノ酸の熱量は4kcal/gである。" },
              { id: "b25_4", type: "mc", text: "アミノ酸についての説明で、誤っているものを選びなさい。", options: ["蛋白質の分解が進むと創傷治癒遅延や免疫能低下を起こす","除脂肪体重(LBM)が80%以下になると窒素死と呼ばれる","アミノ酸がエネルギーとして消費されると4kcal/gの熱量を産生する","必須アミノ酸は不可欠アミノ酸とも呼ばれる","アミノ酸とペプチドは別経路で吸収される"], answer: 1, explanation: "LBMが70%以下で窒素死と呼ばれる。" },
              { id: "b25_5", type: "mc", text: "脂質についての説明で、誤っているものを選びなさい。", options: ["脂質投与の目的はエネルギー供給と必須脂肪酸の供給である","リノール酸、リノレン酸は必須脂肪酸である","必須脂肪酸の補給として脂肪5g/日程度を投与する","MCTは吸収・代謝が速い","MCTはミトコンドリアへの取り込みにカルニチンを必要としない"], answer: 2, explanation: "必須脂肪酸は10g/日程度投与する。" },
              { id: "b25_6", type: "mc", text: "栄養評価とプランニングに関する説明で、誤っているものを選びなさい。", options: ["身体計測指標として体重変化率やBMIがある","血清アルブミン値は炎症性疾患や体位でも変動する","RTPにはプレアルブミン、コリンエステラーゼ、3-メチルヒスチジンがある","BME推計にHarris-Benedictの式がある","必要水分量は体重×30〜40mLで簡易計算できる"], answer: 2, explanation: "RTPにはレチノール結合蛋白、トランスフェリン等が含まれ、コリンエステラーゼは異なる。" },
              { id: "b25_7", type: "mc", text: "末梢静脈栄養における血管痛・静脈炎の予防として、誤っているものを選びなさい。", options: ["高浸透圧の場合、糖濃度を下げる","できるだけ大きい径のカニューラを使用する","血流の多い上肢の太い静脈に留置する","中性に近いpHの輸液を選択する","なるべく緩徐に投与する"], answer: 1, explanation: "必要最小径のカニューラを使用する。" },
              { id: "b25_8", type: "mc", text: "Gambleデータについて、正しい組み合わせを選びなさい。\n飢餓状態では6日間で約(a)の蛋白質が喪失。筋肉量換算で約(b)。ブドウ糖100g/日で喪失量は約(c)となった。", options: ["a.400g b.2kg c.200g", "a.400g b.1kg c.200g", "a.200g b.2kg c.100g", "a.200g b.1kg c.100g", "a.200g b.1kg c.50g"], answer: 0, explanation: "a=400g, b=2kg, c=200g。" },
              { id: "b25_9", type: "mc", text: "TPNに関する説明で、誤っているものを選びなさい。", options: ["TPNは長期間や水分制限が必要な場合に選択される","通常NPC/N比は150〜200程度が効率的とされる","腎不全ではNPC/N比は30〜50程度と低くなる","ビタミンB1非投与で重篤な乳酸アシドーシスを呈する","FDA2000処方ではビタミンKが規定された"], answer: 2, explanation: "腎不全ではアミノ酸制限によりNPC/N比は300〜500と高くなる。" },
              { id: "b25_10", type: "mc", text: "経腸栄養法に関する説明で、誤っているものを選びなさい。", options: ["腸管粘膜の萎縮予防が挙げられるが、CRBSIには注意が必要である","禁忌として腸管吸収機能の低下や廃絶がある","合併症として下痢の頻度が高い","ONSは経口的栄養補助を意味する","経鼻法と経瘻孔法に分類される"], answer: 0, explanation: "CRBSIは静脈栄養特有であり、経腸栄養では起こらない。" },
              { id: "b25_11", type: "mc", text: "経鼻法に関する説明で、誤っているものを選びなさい。", options: ["事故抜去のリスクが高い","ほとんど違和感を感じず、嚥下訓練もしやすい","留置長期化で潰瘍形成の頻度が高くなる","消化管穿孔のリスクがある","胃内に入ったと思われても先端位置確認が大切である"], answer: 1, explanation: "違和感が避けられず、嚥下訓練も行いにくい。" },
              { id: "b25_12", type: "mc", text: "経瘻孔法に関する説明で、誤っているものを選びなさい。", options: ["胃瘻は半固形化製品が投与でき、嚥下訓練がしやすい","PEGは開腹手術をせず胃瘻を造設する","PTEGは頸部食道瘻造設術である","PEG晩期合併症にバンパー埋没症候群がある","留置中の閉塞対策としてアルコール注入法が有効である"], answer: 4, explanation: "閉塞対策は酢水ロックが有効。" },
              { id: "b25_13", type: "mc", text: "栄養製品に関する説明で、誤っているものを選びなさい。", options: ["成分栄養はアミノ酸、半消化は蛋白質が窒素源","成分栄養剤は極めて高脂肪であり高脂血症に注意","医薬品は薬価請求、濃厚流動食品は給食費請求","濃厚流動食品は外来や在宅で全額自己負担","OPFの医薬品消化態としてツインラインNFがある"], answer: 1, explanation: "成分栄養剤は極めて低脂肪である。" },
              { id: "b25_14", type: "mc", text: "半固形化栄養法について、誤っているものを選びなさい。", options: ["胃の貯留能と排出能を得ることが可能","逆流や誤嚥、下痢の予防策になり得る","液体栄養が望ましいケースもある","栄養剤リーク対処として液体の方が流出しにくい","ミキサー食はコストは安い"], answer: 3, explanation: "半固形化の方がリークしにくい。" },
              { id: "b25_15", type: "mc", text: "酸塩基平衡に関する説明で、誤っているものを選びなさい。", options: ["動脈血pHは通常約7.4±0.05","代謝性アシドーシスの成因に下痢による重炭酸イオン喪失がある","メイロン投与時は換気を十分に行いCO2排出を図る","アシデーミアではpH低下によりKが細胞内に移動し血漿Kが低下する","アシデーミアではイオン化Ca濃度が増加する"], answer: 3, explanation: "Kは細胞外(血液中)に移動し、血漿K濃度が上昇する。" },
              { id: "b25_16", type: "mc", text: "リニュートの特徴について、誤っているものを選びなさい。", options: ["消化態タイプの濃厚流動食品","カロリー濃度 1kcal/mL","エネルギーバランスは炭水化物50%、脂質34%、タンパク質16%","食物繊維を配合","乳タンパク質は不使用"], answer: 2, explanation: "炭水化物26%、脂質50%、タンパク24%である。（問題文はイーゲルLCの比率）" },
              { id: "b25_17", type: "mc", text: "リニュートでイーゲルより増量しているものとして、誤っているものを選びなさい。", options: ["銅","亜鉛","コラーゲンペプチド","ビタミンB1","リン"], answer: 4, explanation: "リンは同量である。" },
              { id: "b25_18", type: "mc", text: "ペプタメンAFと比べたリニュートの特徴として正しいものを選びなさい。", options: ["より高タンパクである","カルニチンを配合している","イヌリンを配合している","MCTの割合がより高い","ホエイペプチドを配合している"], answer: 1, explanation: "ペプタメンAFはカルニチン無配合、リニュートは配合。" },
              { id: "b25_19", type: "mc", text: "水溶性食物繊維ではないものを選びなさい。", options: ["セルロース","グアーガム","フルクトオリゴ糖","イヌリン","アルギン酸"], answer: 0, explanation: "セルロースは不溶性食物繊維。" },
              { id: "b25_20", type: "mc", text: "イーゲルLCの特徴として、誤っているものを選びなさい。", options: ["糖質量を減らしL-カルニチンを配合","0.8kcal/mL、浸透圧340mOsm/L","200、300、400kcalの3規格","DHAとEPAを配合している","タンパク質4.0g/100kcal配合"], answer: 3, explanation: "DHAとEPAを配合しているのはリニュートのみ。" },
              { id: "b25_21", type: "mc", text: "他社製品の特徴について正しいものを選びなさい。", options: ["REF-P1は栄養剤と同時に投与する","マーメッドワンは消化態の粘度可変型である","ペプタメンシリーズはすべて1.5kcal/mLである","ペプチーノ、ラクフィアは乳酸菌配合である","グルセルナREXは脂質比率50%である"], answer: 4 },
              { id: "b25_22", type: "mc", text: "ハイネックスゼリーの特徴について、誤っているものを選びなさい。", options: ["900〜1500kcalを1日摂取量とする","粘度は約6000mPa・sである","寒天で固めベタつきにくい","脂肪酸n-3:n-6は1:3である","アレルギー物質として乳・大豆・ゼラチンを含む"], answer: 1, explanation: "粘度は約8700mPa・sである。" },
              { id: "b25_23", type: "mc", text: "ハイネックスゼリーとイノソリッドの共通点として、誤っているものを選びなさい。", options: ["1袋300kcal/300gである","カルニチン、コリンを配合している","食物繊維としてイヌリンを配合している","MCTを配合している","900kcalで1日必要ビタミンをほぼ充足"], answer: 1, explanation: "コリンはイノソリッドのみ配合。" },
              { id: "b25_24", type: "mc", text: "ハイネックスゼリー(水分量76%)で、1200kcal・水分1500mLで管理したい場合の追加水は？", options: ["388mL","588mL","740mL","840mL","976mL"], answer: 1, explanation: "1200g×0.76=912mL。1500-912=588mL。" },
              { id: "b25_25", type: "mc", text: "ラコールNF半固形からイノソリッドへ切り替えた際、同等となる成分を選びなさい。", options: ["食塩相当量","糖質量","たんぱく質量","脂肪量","水分量"], answer: 4, explanation: "どちらも水分含有率76%で同等。" },
              { id: "b25_26", type: "mc", text: "イノソリッドの説明として、誤っているものを選びなさい。", options: ["イノラスと単位あたり(g/mL)の熱量は同じである","食事摂取基準2020年版に基づき、2025年版目標値にも合致","処方設計900kcal/日、成人標準900〜1500kcal/日","1500kcal投与時、食事摂取基準の耐容上限量を超える成分はない","n-3系脂肪酸としてシソ油と魚油を配合"], answer: 0, explanation: "イノソリッドは1.0kcal/g、イノラスは1.6kcal/mL。" },
              { id: "b25_27", type: "mc", text: "在宅半固形栄養経管栄養法指導管理料について、誤っているものを選びなさい。", options: ["2500点/月である","入院中以外で栄養管セット使用時は2000点/月を算定できる","あらかじめ調整された半固形状のもののみ算定できる","最初に算定した日から3年を限度として算定できる","医薬品でない半固形状濃厚流動食でも算定できる"], answer: 3, explanation: "1年を限度として算定できる。" },
              { id: "b25_28", type: "mc", text: "キドパレン輸液の禁忌として、誤っているものを選びなさい。", options: ["高乳酸血症","高ナトリウム血症","高リン血症","高アンモニア血症","肝性昏睡のおそれ"], answer: 2, explanation: "リンが配合されていないため禁忌ではない。" },
              { id: "b25_29", type: "mc", text: "TPN処方アンケートで、目標とする管理が実施できていない理由の1位は？", options: ["個別の電解質量を考慮した結果、カロリーを少なく設定","心血管系の合併症等で投与液量が制限される","重度の糖尿病患者が多く、糖分を少なく設定","既承認医薬品の組合せでは設計困難","その他の理由"], answer: 0, explanation: "個別の電解質考慮によるカロリー制限が最多。" },
              { id: "b25_30", type: "mc", text: "体重50kgにキドパレン1バッグ投与時、アミノ酸量は約( )g/kg/日となる。", options: ["0.46","0.56","0.66","0.76","0.86"], answer: 2 },
              { id: "b25_31", type: "mc", text: "キドパレンの組成について、正しいものを選びなさい。", options: ["1バッグのNaは35mEq","1バッグのKは120mEq","FDA2000処方に準拠したビタミン等を配合","必須/非必須比は3.4でArgやGlyを配合","BCAA含有率は45.8%でキドミンと同じ"], answer: 2, explanation: "FDA2000準拠。" },
              { id: "b25_32", type: "mc", text: "エネフリード(550mL)とビーフリード(500mL)で誤っているものを選びなさい。", options: ["ブドウ糖量が同じ","BCAA含有率が同じ","ビタミンB1量が同じ","ナトリウム量が同じ","亜鉛量が同じ"], answer: 2, explanation: "ビーフリードはAMA、エネフリードはFDA2000でB1量が異なる。" },
              { id: "b25_33", type: "mc", text: "エネフリード投与時のライン管理について、誤っているものを選びなさい。", options: ["可能な限り側注口のないラインを選択","除菌用ファイナルフィルターを使用する","可能な限り閉鎖式を使用","側管から他の薬剤を投与しない","24時間毎にラインを交換する"], answer: 1, explanation: "脂肪粒子が詰まるためファイナルフィルターは使用できない。" },
              { id: "b25_34", type: "mc", text: "ビーフリードについて、誤っているものを選びなさい。", options: ["2000mL投与で60gのアミノ酸を補給できる","重篤な腎障害は禁忌とはならない","隔壁未開通で下室のみ投与時、高血糖リスクがある","うっ血性心不全への禁忌は過剰な水分負荷のため","隔壁未開通で上室が着色していた場合、メイラード反応と推測できる"], answer: 4, explanation: "上室のみの着色はトリプトファンの酸化であり、メイラードではない。" },
              { id: "b25_35", type: "mc", text: "アクトリーンについて、誤っているものを選びなさい。", options: ["ハイライトカテにはネラトンとチーマンがある","植物由来グリセリンの潤滑剤コーティング","重大な有害事象に尿路感染や損傷がある","30本入りに携帯ポーチが付く","特殊カテーテル加算で400点が算定できる"], answer: 4, explanation: "400点は再利用型。アクトリーンは異なる。" },
              { id: "b25_36", type: "mc", text: "アクトリーンについて、誤っているものを選びなさい。", options: ["逆流防止機構の採尿バッグと一体化","ミニのカテーテル長は全て90mm","ハイライトセットの採尿バッグは700mL","男性用は折りたたんで持ち運べる","チーマンは尿道狭窄などに選択"], answer: 2, explanation: "ハイライトセットのバッグは1000mL。" },
              { id: "b25_37", type: "mc", text: "タムガイドのBT光について、誤っているものを選びなさい。", options: ["硬い組織は透過しない","下咽頭通過時は光が見えることがある","胃に入った直後に腹部で光が見えることが多い","胃に入った直後は胃底部に向かう","胃底部の壁に当たった場合肋間で光が見えることがある"], answer: 2, explanation: "胃に入った直後は光は確認できないことが多い。" },
              { id: "b25_38", type: "mc", text: "タムガイドの臨床データについて、誤っているものを選びなさい。", options: ["BT光を確認した全症例で胃内留置が確認された","気管内留置症例において、胸部で光が確認された","X線で胃内でもBT光が見えない場合があった","光が検出できない場合はX線検査が必要","肥満患者の感度は低く算出された"], answer: 1, explanation: "気管内留置症例で光は確認されなかった。" },
              { id: "b25_39", type: "mc", text: "タムガイドの使用方法について、誤っているものを選びなさい。", options: ["電源ボタンで点滅→点灯→消灯と変わる","消灯後または外して30分以上で再使用不可と認識","ファイバーは再滅菌・再使用禁止","光源装置は表面消毒剤等で清掃する","抜去時抵抗があれば経鼻胃管とともに抜去する"], answer: 1, explanation: "15分以上経過で使用済みと認識される。" },
              { id: "b25_40", type: "mc", text: "J034-2 経鼻栄養チューブ挿入術(180点)について、誤っているものを選びなさい。", options: ["DPC病棟では算定不可","外来で算定可","一般病棟で算定可","回リハ、地域包括ケア病棟で算定可","在宅で算定可"], answer: 3, explanation: "回リハ、地域包括では包括されるため算定不可。" },
              { id: "b25_41", type: "mc", text: "脳卒と栄養療法について、誤っているものを選びなさい。", options: ["発症時サルコペニア有病率は15.8%","急性期では早期栄養導入が遅れがち","糖尿病既往がなくても耐糖能異常を併発","GL2021では48時間以内の早期経腸栄養が推奨されている","低ナトリウム血症は最も一般的な電解質異常"], answer: 3 },
              { id: "b25_42", type: "mc", text: "脳卒中に関する記述で、誤っているものを選びなさい。", options: ["低Na血症は機能的転帰に悪影響","重症脳卒中初期の高カロリー経腸は死亡率上昇と関連","F. nucleatum抗体検出は予後不良と関連","急性期には嘔吐等により経口・経腸が敬遠されがち","リハ時間確保のため経腸栄養の迅速投与の安全性検証が進行中"], answer: 1, explanation: "「低カロリー経腸栄養」が死亡率上昇と関連（アジア人等）。" },
              { id: "b25_43", type: "mc", text: "経腸栄養と口腔ケアについて、誤っているものを選びなさい。", options: ["GL2021で急性期の口腔ケアは誤嚥性肺炎リスク低下で推奨A","柏スタディでオーラルフレイル群は死亡リスク等が高い","くも膜下出血のクラゾセンタン影響で水分インプットは多めにする","口腔内バイオフィルムが気管に侵入し肺炎になる","口腔ケアは誤嚥性肺炎予防に寄与する"], answer: 2, explanation: "体液貯留に留意し水分バランスを+500ml以内に抑える必要がある。" },
              { id: "b25_44", type: "mc", text: "誤嚥性肺炎と口腔ケアについて、誤っているものを選びなさい。", options: ["入院肺炎患者の誤嚥性比率は高齢で高く、70〜79歳でピーク","米山らの報告で特養入所者の口腔ケアが発熱・肺炎を低減","頭頸部癌放射線療法の症状に口腔内乾燥がある","シスプラチン等投与時は低Mg血症に注意","胃瘻造設が推奨される"], answer: 0, explanation: "90歳以上でピークとなる。" },
              { id: "b25_45", type: "mc", text: "頭頸部癌の栄養療法について、誤っているものを選びなさい。", options: ["放射線療法による症状に口腔乾燥がある","鈴木らの報告は単群介入試験","シスプラチン等で低Mg血症に注意","体重10%低下防止に必ず胃瘻造設が推奨される","がん悪液質にはマルチモーダルケアが提唱される"], answer: 3, explanation: "必ずしも胃瘻を推奨しているわけではない。" },
              { id: "b25_46", type: "mc", text: "がん悪液質について、誤っているものを選びなさい。", options: ["定義の認知率は50%を下回っていた","膵癌患者の有病率が最も高い","悪影響が明らかになってからサポートを望む患者が多い","RWDは一様にエビデンスが低いとは言い切れない","重症患者のpermissive underfeedingが一般的"], answer: 2, explanation: "がんと診断された早い段階からサポートを望んでいる。" },
              { id: "b25_47", type: "mc", text: "重症患者の静脈栄養について、誤っているものを選びなさい。", options: ["permissive underfeedingが一般的","入室4-7日目の平均アミノ酸が1.2g以上と死亡率改善が関連","GL2016を機にエネルギー投与量が減少傾向","オートファジーには恒常的と誘導的がある","mTORC1活性化とリン酸輸送体発現は関連"], answer: 1, explanation: "実際には1.2g以上投与されている症例は少なく群を作れなかった。" },
              { id: "b25_48", type: "mc", text: "オートファジー、mTORについて、誤っているものを選びなさい。", options: ["オートファジーは不要物除去と栄養素提供を行う","mTORC1活性化で血清リン値モニタリングが重要","加齢による筋肉減少は炎症性サイトカインによるmTORC1抑制が原因","mTORC1はイソロイシンの刺激で活性化される","新生児の栄養補給第一選択は母乳"], answer: 3, explanation: "イソロイシンではなく「ロイシン」の刺激による。" },
              { id: "b25_49", type: "mc", text: "小児・重心の栄養管理について、誤っているものを選びなさい。", options: ["新生児・乳児の第一選択は母乳","カルニチン欠乏の一因にバルプロ酸等がある","非アテトーゼ型は痩せやすく、アテトーゼ型は太りやすい","小児ではNPC/Nは200〜400を目標","在宅半固形は2500点/月"], answer: 2, explanation: "アテトーゼ型（運動過多）が痩せやすく、非アテトーゼ型が太りやすい。" },
              { id: "b25_50", type: "mc", text: "半固形栄養について、誤っているものを選びなさい。", options: ["在宅半固形管理料は胃造設1年以内で1年限度","胃には噴門で逆流を防ぐ働きがある","合田先生の20,000mPa・sは12回転/分での値","ダンピング症候群は早期と後期に分けられる","注入後1時間程度姿勢を保持することが推奨"], answer: 4, explanation: "粘度計は6回転/分の値。注入後の安静保持は不要。" },
              { id: "b25_51", type: "mc", text: "CKD・透析について、誤っているものを選びなさい。", options: ["早期ではたんぱく質の過剰制限をしない","CKDの栄養障害をPEWと呼ぶ","腎臓リハは包括的プログラムである","筋力よりも筋肉量の方が死亡リスク増加と関連した","低栄養の透析患者は食事療法やONSが優先"], answer: 3, explanation: "筋肉量ではなく、低筋力のみが死亡リスク増加と関連した。" },
              { id: "b25_52", type: "mc", text: "CKD患者の輸液栄養管理について、誤っているものを選びなさい。", options: ["低栄養は食事・ONS優先","TPN処方で総合ビタミン90%に対し、微量元素も処方は65%","GFR60未満等でCKDと診断","TPNで水分制限のためエネルギーが不足するケースがある","透析患者のたんぱく質は1.3g/kg以上でリスク上昇"], answer: 1 },
              { id: "b25_53", type: "mc", text: "透析患者の栄養について、誤っているものを選びなさい。", options: ["たんぱく質は少なすぎても多すぎても死亡リスク上昇","医薬品経腸栄養剤は全て「高度の腎障害」が禁忌で使えない","NRI-JHは日本人のデータで作られた","サルコペニア合併率は透析患者で非常に高い","心不全患者は入退院を繰り返す"], answer: 1, explanation: "エンシュアHは腎不全末期が禁忌。全てではない。" },
              { id: "b25_54", type: "mc", text: "心不全について、誤っているものを選びなさい。", options: ["300日程度で半数が再入院","Fantastic Fourの薬剤使用が重視される","口腔機能問題等があるとADL低下が有意に多い","包括的心臓リハビリテーションを行う","LVEF40%未満をHFrEFという"], answer: 2, explanation: "在院死の増加ではなくADL低下。" },
              { id: "b25_55", type: "mc", text: "心臓リハについて、誤っているものを選びなさい。", options: ["包括的心臓リハビリテーションを行う","悪液質あり心不全にONSでQOL改善","入院中リハと外来リハを共に行うのは33%程度","EFFORT研究で個別栄養介入が生存率改善","食道癌術後下痢群は予後悪化の可能性"], answer: 2, explanation: "両方行うのはわずか7%程度。" },
              { id: "b25_56", type: "mc", text: "ハイネックスイーゲルに関連する記述で、誤っているものを選びなさい。", options: ["食道癌術後の下痢群は予後悪化の可能性","PPI使用がプレアルブミン低下と関連","食道癌術後の腸瘻管理でイーゲル有用性の報告","TPNだけの管理で60日を超えると処置区分が変更され減収","グアーガムとペクチンの短鎖脂肪酸産生に有意差なし"], answer: 3, explanation: "60日ではなく30日を超えると減収。" },
              { id: "b25_57", type: "mc", text: "食物繊維について、誤っているものを選びなさい。", options: ["グアーガムとペクチンで同等効果との報告","VLMAは大腸で発酵分解率が高く効果が高い","発酵分解率は食物繊維の種類で差がある","食事摂取基準で食物繊維は全年代で不足","コラーゲンのヒドロキシプロリンが直接合成の原材料となる"], answer: 1, explanation: "VLMAは発酵分解率が低く、50%程度とされる。" },
              { id: "b25_58", type: "mc", text: "褥瘡と栄養療法について、誤っているものを選びなさい。", options: ["ヒドロキシプロリンが直接コラーゲン合成の原材料となる","高エネルギー・高タンパク補給を提案","亜鉛等の特定栄養素を疾患考慮の上補給してもよい","栄養に関するCQは全体で1つのみ","パーキンソン病で嚥下障害を合併する"], answer: 0, explanation: "直接ではなく、ジペプチドが線維芽細胞を刺激する。" },
              { id: "b25_59", type: "mc", text: "パーキンソン病について、誤っているものを選びなさい。", options: ["約8割で嚥下障害を合併","自律神経障害で便秘や体重減少等がある","中脳黒質の変性でドパミン分泌が低下","ピリドキシンの量は少量のため問題ない","Foleyがバルーンカテーテルを開発"], answer: 3, explanation: "少量でも有効血漿濃度を下回る可能性があり問題となる。" },
              { id: "b25_60", type: "mc", text: "排尿ケアについて、誤っているものを選びなさい。", options: ["Foleyがバルーンカテーテルを開発","尿路感染症は医療関連感染全体の36%を占める","CICの目的に膀胱過伸展予防などがある","自然排尿後も残尿があれば感染症の恐れ","残尿測定を行う"], answer: 1, explanation: "現在は約10%に低下している。" }
            ]
          },
          advance: {
            id: "exam_advance", title: "製品知識：Advance編", type: "sei",
            questions: [
              { id: "a25_1", type: "mc", text: "キドパレン輸液の注意点について、誤っているものを選びなさい。", options: ["低K血症に伴う症状としてeGFR高値、乏尿が知られる","リフィーディング症候群は急速な栄養補給で発症リスク","リフィーディングハイリスクにはビタミンB等を補給","併用注意にジゴキシン、レボドパ、ワルファリンがある","アミノ酸は免疫機能等に重要である"], answer: 0, explanation: "GFR低値、頻尿が低K血症の症状。" },
              { id: "a25_2", type: "mc", text: "PPN施行時の衛生管理について、正しいものを選びなさい。", options: ["C. albicansは生理食塩液での増殖が顕著だった","B. cereusはアミノ酸加糖電解質液での発育が顕著だった","ベッド柵よりタオルケットでB. cereus検出が多かった","腎不全用アミノ酸注射液のアミノ酸濃度は約9%である","血液透析1回のアミノ酸漏出は8〜12g程度"], answer: 3 },
              { id: "a25_3", type: "mc", text: "内科系静脈栄養RWDについて、誤っているものを選びなさい。", options: ["アミノ酸は筋肉量維持等に重要","主要評価項目は院内死亡であった","アミノ酸処方量の減少と院内死亡増加の関連が認められた","腎不全用アミノ酸濃度は約9g/100mLである","血液透析1回のアミノ酸漏出は8〜12g"], answer: 3, explanation: "濃度は5.9〜7.2%。" },
              { id: "a25_4", type: "mc", text: "腎不全患者のタンパク制限について、誤っているものを選びなさい。", options: ["血液透析での漏出は8〜12g","透析患者へは30〜35kcal/kg、0.9〜1.2g/kgタンパクが推奨","GL第3版で透析患者に20kcal/kg、タンパク0.8g/kg投与とする","急性疾患のないCKD入院患者に0.6〜0.8g/kgタンパクを処方可","妊娠悪阻は初期の半数に認められる"], answer: 2, explanation: "35kcal/kg、1.0〜1.2g/kgタンパクが推奨される。" },
              { id: "a25_5", type: "mc", text: "妊娠悪阻と栄養管理について、誤っているものを選びなさい。", options: ["妊娠悪阻では低K血症に陥りやすい","維持に必要なビタミンB1は1.4mg","妊婦の悪心時に高脂質食は気持ち悪さを軽減する","第1三半期の体重減少で児の出生体重が軽くなる","経腸不可能な場合は静脈栄養適応"], answer: 2, explanation: "高脂質食は気持ち悪さを助長する。" },
              { id: "a25_6", type: "mc", text: "静脈栄養管理の新潮流について、正しいものを選びなさい。", options: ["経腸不可能な場合は静脈栄養適応","輸液治療が3ヶ月程度ならPVCを用いる","PICCは末梢静脈カテーテルの一つ","末梢カテーテル留置時も配合変化等のリスク回避は不要","誤嚥性肺炎は死因6位"], answer: 0, explanation: "1週間未満ならPVCを用いる。" },
              { id: "a25_7", type: "mc", text: "誤嚥性肺炎ケアの再考について、誤っているものを選びなさい。", options: ["死因6位である","一時的禁食群で治癒期間延長","入院7日目までに経口摂取を受けた患者は65.1%","熱量増加と院内死亡低下に関連はなかった","末梢静脈栄養は1500kcal程度を投与"], answer: 1, explanation: "経口摂取意欲群で高い推移。" },
              { id: "a25_8", type: "mc", text: "末梢静脈栄養の活用について、誤っているものを選びなさい。", options: ["テキストブックで脂肪含む糖電解質基準1500kcalと定義","不可避窒素損失は50kgで26.3g","PPN時B1非併用で欠乏症報告あり","透析患者で65歳超は減少しており半分程度","透析患者の栄養はできる限り経口・経腸で"], answer: 0, explanation: "アミノ酸を含む糖電解質輸液を基本とし、1000kcal前後とするのが定義。" },
              { id: "a25_9", type: "mc", text: "慢性維持透析患者の静脈栄養について、正しいものを選びなさい。", options: ["65歳超は増加し2/3を占める","喪失量に関わらず一日必要量以上を設定","できる限り経口・経腸で行う","NRI-JHはCRP等からなるツール","末梢静脈栄養は手技が煩雑"], answer: 2, explanation: "できる限り経口・経腸で行うことが推奨されている。" },
              { id: "a25_10", type: "mc", text: "末梢静脈栄養について、正しいものを選びなさい。", options: ["TPNと比べ手技が煩雑","消化管回復後も静脈のみで管理","頻回な差し替えが生じないメリット","入院高齢者の喫食率は70〜80%","ベッド安静で1日0.5%除脂肪体重減少"], answer: 3 },
              { id: "a25_11", type: "mc", text: "栄養療法と予後について、誤っているものを選びなさい。", options: ["ベッド安静で1日0.5%LBM減少","EFFORT試験介入群のタンパク量は0.84g/kg","EFFORT試験後150日生存率で差はなかった","TPN栄養目標達成群でADL悪化は少なかった","EUSのビスコクリア目安は50〜400g"], answer: 2, explanation: "介入群で生存率が有意に高かった。" },
              { id: "a25_12", type: "mc", text: "ビスコクリア使用量目安として正しいものを選びなさい。", options: ["EUS:50〜400g, 視野確保:200〜600g","EUS:200〜600g, 視野確保:50〜400g","EUS:600〜900g, 視野確保:200〜600g","EUS:50〜400g, 視野確保:600〜900g","水に比べ短時間でGelが貯まる"], answer: 0, explanation: "電子添文の通り。" },
              { id: "a25_13", type: "mc", text: "Gel immersion EMRの特徴で誤っているものを選びなさい。", options: ["水に比べ短時間でGelが貯まる","腸液残渣があっても良好な視野","出血に対しても良好な視野","Underwater EMRに比べ多岐に病変実施できる","気泡が入ることがある"], answer: 3, explanation: "Underwaterに比べて幅広く適応できるわけではない。" },
              { id: "a25_14", type: "mc", text: "オラネジン(Lancet 2020)について正しいものを選びなさい。", options: ["クロルヘキシジンアルコールと比較","SSI発生率は有意差がみられなかった","主要評価は表層切開創SSI発生率","有害事象は5例","タムガイドの赤色光確認ポイントは..."], answer: 0 },
              { id: "a25_15", type: "mc", text: "タムガイド赤色光確認ポイントで誤っているものを選びなさい。", options: ["胃内容物の影響を避けるため時間を設ける","視認性向上のため部屋を暗くする","チューブ先端を余分に15〜20cm進める","胃内でのチューブ操作が必要","経験症例を積み重ねる"], answer: 2, explanation: "従来の挿入長より5〜10cm程度進める。" },
              { id: "a25_16", type: "mc", text: "タムガイドで気管迷入時の光の見え方として高いものを選びなさい。", options: ["左側に強めに透過","左側だが光確認されず","正中に強めに透過","右側だが光確認されず","正中だが光確認されず"], answer: 2, explanation: "気管は頸部正中腹側のため強く見える可能性が高い。" },
              { id: "a25_17", type: "mc", text: "VAP予防バンドルにないものを選びなさい。", options: ["手指衛生確実実施","クロルヘキシジンによる口腔ケア","回路頻回交換しない","適切な鎮静・鎮痛","仰臥位で管理しない"], answer: 1, explanation: "日本では粘膜使用が禁忌のため含まれない。" },
              { id: "a25_18", type: "mc", text: "口腔粘膜炎リスクが最も高いものを選びなさい。", options: ["頭頸部化学放射線療法","自家造血幹細胞移植","骨髄抑制の強い化学療法","標準的な化学療法","頭頸部放射線療法"], answer: 0, explanation: "発生リスクが最も高い。" },
              { id: "a25_19", type: "mc", text: "正常な排尿について誤っているものを選びなさい。", options: ["1回量: 200〜400mL","時間: 10〜30秒","1日排尿量: 2000〜2500mL","1日回数: 5〜7回","間隔: 3〜5時間"], answer: 2, explanation: "1日の正常排尿量は1000〜1500mL。" },
              { id: "a25_20", type: "mc", text: "介助導尿の処理で正しいものを選びなさい。", options: ["使い捨て尿器は内容物廃棄後本体を粉砕","粉砕機稼働は約10分","再利用尿器はマセレーターで洗浄","再利用を機械なしで洗浄は次亜塩素酸","袋付きはそのまま廃棄"], answer: 4, explanation: "機械なしは次亜塩素酸等で消毒。" },
              { id: "a25_21", type: "mc", text: "OF-5に該当しないものを選びなさい。", options: ["口腔乾燥感","咀嚼困難感","嚥下困難感","滑舌低下","舌圧低下"], answer: 4, explanation: "舌圧低下は口腔機能低下症の項目。" },
              { id: "a25_22", type: "mc", text: "経腸栄養の下痢について誤っているものを選びなさい。", options: ["WHO定義とブリストル7で定義できる","ブリストルは数字が小さいほど下痢傾向","ICUでは60〜80%発生報告","排便350g以上は栄養不足リスク","Fried基準に体重減少がある"], answer: 1, explanation: "ブリストルは数字が大きいほど下痢傾向（7が水様便）。" },
              { id: "a25_23", type: "mc", text: "Friedらのフレイル基準にないものを選びなさい。", options: ["体重減少","筋肉量の減少","主観的疲労感","活動量減少","歩行速度減弱"], answer: 1, explanation: "筋肉量の減少ではなく、握力の低下。" },
              { id: "a25_24", type: "mc", text: "半固形化栄養について誤っているものを選びなさい。", options: ["血糖値上昇が抑制される","胃瘻カテは内腔が広く短いものが適する","粘度が高すぎると注入困難","注入後1時間程度姿勢保持が推奨される","CNAQ-Jが有用"], answer: 3, explanation: "安静姿勢保持は特に必要としない。" },
              { id: "a25_25", type: "mc", text: "CNAQ-Jについて誤っているものを選びなさい。", options: ["ガイドライン2017で推奨","評価は死亡率と関連","8つの質問(満点40点)で評価","20点以下で体重減少リスク","リフィーディングハイリスクに肥満"], answer: 2, explanation: "28点以下の時に体重減少リスク。" },
              { id: "a25_26", type: "mc", text: "リフィーディングハイリスクでないものを選びなさい。", options: ["慢性アルコール中毒","肥満患者","悪性腫瘍","高齢者","長期利尿薬投与"], answer: 1, explanation: "神経性やせ症等がリスク。単純な肥満はハイリスクに含まれない。" },
              { id: "a25_27", type: "mc", text: "在宅低栄養の現況について正しいものを選びなさい。", options: ["リロケーションダメージとはADL戻らない現象","HADとは環境変化ストレス現象","BMIが高いほど、または低いほど医療費を要する","要介護度が高いほどMNAスコアが低い傾向","心不全はBMI高いほど発症リスク"], answer: 2, explanation: "両極端なBMIは医療費増大。" },
              { id: "a25_28", type: "mc", text: "心不全と栄養について誤っているものを選びなさい。", options: ["食欲不振原因にうっ血、加齢、塩分制限等","FRAGILE-HFで20.4%が低栄養","塩分制限の有用性エビデンスは乏しい","対象は栄養不良等の高齢者","ONS推奨は最低400kcal"], answer: 2 },
              { id: "a25_29", type: "mc", text: "ONS推奨(ESPEN)で誤っているものを選びなさい。", options: ["30g以上タンパク、400kcal以上推奨","少なくとも3か月継続する","退院後にONSを提供するべき","高血圧でも脱水時は対処必要","OS-1の塩分はみそ汁と同等"], answer: 1, explanation: "少なくとも1か月継続する。" },
              { id: "a25_30", type: "mc", text: "高血圧の経口補水について誤っているものを選びなさい。", options: ["脱水時はすぐ対処","OS-1はみそ汁1杯の塩分","スポドリとOS-1の違いは塩分量のみ","夏でも塩分制限望まれる","食塩6g/日未満が目標"], answer: 2, explanation: "糖分量等も大きく異なる。" },
              { id: "a25_31", type: "mc", text: "リンについて誤っているものを選びなさい。", options: ["体内の約85%が骨に存在","基準値は0.9〜2.6mg/dL","高リン血症原因にCKDがある","高リン血症に特異的症状はない","カルシウムは99%が骨に"], answer: 1, explanation: "基準値は2.7〜4.6mg/dL。" },
              { id: "a25_32", type: "mc", text: "カルシウムについて誤っているものを選びなさい。", options: ["99%が骨、細胞外は0.1%未満","初期対応は生理食塩液点滴","原因にビタミンD過剰等","約90%がイオン化Ca","輸液は欠乏+維持で行う"], answer: 3, explanation: "イオン化Caは約50%。" },
              { id: "a25_33", type: "mc", text: "輸液療法について誤っているものを選びなさい。", options: ["欠乏+維持で行う","尿素は細胞膜を移動できないので水が移動","基本は生食と5%ブドウ糖","5%ブドウ糖は溶血せず純水を入れられる","調節機構に浸透圧と容量がある"], answer: 1, explanation: "尿素は容易に移動するため水は移動しない。" },
              { id: "a25_34", type: "mc", text: "脱水症について誤っているものを選びなさい。", options: ["調節機構がある","水分欠乏型は浸透圧上昇、尿量減少","Na欠乏型は血圧低下、頻脈等","無尿は中等症に該当","注射薬は単独使用が基本"], answer: 3, explanation: "無尿は重症。" },
              { id: "a25_35", type: "mc", text: "配合変化について誤っているものを選びなさい。", options: ["単独使用が基本","化学的・物理的変化が生じる","残存率80%以上で配合可能とする報告","要因に室温・光・時間等","Na異常でODSを警戒"], answer: 2, explanation: "残存率90%以上。" },
              { id: "a25_36", type: "mc", text: "Na異常について誤っているものを選びなさい。", options: ["ODSを警戒する","真の低Na血症は等張性","生食1000mLで間質750、血管250mL分布","急速補正でODS危険","化学療法中の脱水は異なる症状が出る"], answer: 1, explanation: "真の低Na血症は「低張性」。" },
              { id: "a25_37", type: "mc", text: "化学療法・緩和ケアの脱水で誤っているものを選びなさい。", options: ["抗がん剤の副作用と異なる症状が出る","薬剤血中濃度が高くなり副作用出やすい","ADL低下させやすい","痛みの閾値低下で痛みを強く感じる","がん患者電解質異常は低Na等"], answer: 0, explanation: "抗がん剤副作用と類似した症状が出やすい。" },
              { id: "a25_38", type: "mc", text: "がん患者の電解質異常で誤っているものを選びなさい。", options: ["低Na、高Ca、腫瘍崩壊が代表","低Na原因で最も多いのはRSWS","SIADH原因に肺小細胞癌等","低Na治療は一般的な治療と同様","酸塩基緩衝系に炭酸等がある"], answer: 1, explanation: "最も多いのはSIADH。" },
              { id: "a25_39", type: "mc", text: "酸塩基平衡について誤っているものを選びなさい。", options: ["緩衝系に炭酸等","アルカローシス原因に嘔吐等","アシドーシス原因にH+蓄積等","直ちにアルカリ化剤を投与する","K調節に細胞内外移動と腎排泄"], answer: 3, explanation: "まず原因の治療を優先する。" },
              { id: "a25_40", type: "mc", text: "カリウム異常について誤っているものを選びなさい。", options: ["調節機構は細胞内外移動と腎排泄","腎正常なら通常高Kにならない","ACE阻害薬等で高Kをきたす","高Kは5mEq/L以上","グルコン酸Ca効果に2〜3時間要する"], answer: 4, explanation: "数分で現れ最大1時間持続する。" }
            ]
          }
        }
      },
      exam2024: {
        id: "exam2024", title: "大項目カテゴリー3（2024年統一試験問題）", icon: "Archive",
        subcategories: {
          pms2024: {
            id: "exam_pms_2024", title: "基礎：2024年PMS", type: "bas",
            questions: [
              { id: "p24_pms_1", type: "mc", text: "医薬品医療機器等法に関する下記の文章について、正しい正誤の組み合わせを選びなさい。",
                statements: [ "a. 「医薬品医療機器等法第1条には、「医薬品、医薬部外品、化粧品、医療機器及び再生医療等製品の品質、有効性及び安全性の確保並びにこれらの使用による保健衛生上の危害の発生及び拡大防止のために必要な規制を行う」と薬害防止の理念が明記されている。」", "b. 「医薬品医療機器等法第1条の2~6には、関係者の責務の明確化のため、国や医薬関係者、医薬品等関連事業者等それぞれ責務が規定されており、国民にも役割がある。」", "c. 「GVP省令及びGPSP省令は、医薬品等の製造販売業の許可要件となっている。」", "d. 「医薬品医療機器等法第17条に、医薬品等総括製造販売責任者等の設置について規定されている。」" ],
                options: ["a:正, b:正, c:正, d:正", "a:正, b:正, c:誤, d:正", "a:誤, b:正, c:正, d:誤", "a:正, b:誤, c:正, d:誤"], answer: 1, explanation: "c. GVP省令及びGQP省令は医薬品等の製造販売業許可の要件である。なお、GPSP省令は「医薬品の製造販売後の調査及び試験の実施の基準に関する省令」である。"
              },
              { id: "p24_pms_2", type: "mc", text: "GVP省令、安全管理体制に関する下記の文章について、正しい正誤の組み合わせを選びなさい。",
                statements: [ "a. 「製造販売業三役とは、総括製造販売責任者、安全管理責任者、医薬品製造管理責任者をいう。」", "b. 「GVP省令第5条では、第一種製造販売業者は、製造販売後安全管理を適正かつ円滑に行うため、第5条に掲げられた手順を記載した製造販売後安全管理業務手順書を作成しなければならない、と規定されている。」", "c. 「MRはGVP省令第2条において「医薬情報担当者」として法的に定義され、製造販売後安全管理において重要な役割を担う者と位置付けられている。」", "d. 「OPFの安全管理体制として、各支店・薬制部・輸液DIセンターは安全管理実施部門であり、その長は安全管理実施責任者となる。」" ],
                options: ["a:正, b:正, c:正, d:正", "a:誤, b:正, c:誤, d:正", "a:誤, b:正, c:正, d:誤", "a:正, b:誤, c:正, d:誤"], answer: 2, explanation: "a. 製造販売業三役とは、総括製造販売責任者、安全管理責任者、品質保証責任者の三者を指す用語。医薬品製造管理責任者は誤り。\nd. OPFの安全管理体制として、安全管理実施部門となっているのは、各支店、輸液DIセンター・臨床応用開発部であり、薬制部は誤り。"
              },
              { id: "p24_pms_3", type: "mc", text: "MRが行う安全管理情報の収集に関する下記の文章について、正しい正誤の組み合わせを選びなさい。",
                statements: [ "a. 「医薬品の安全管理情報に関する情報を入手したときは、原則1暦日以内に電子速報書システムに入力する。」", "b. 「血管外漏出に関する情報を入手したときは、必ず血管外漏出による具体的な「症状」を確認し、例えば「血管外漏出による発赤」のように、有害事象名欄に「症状」と併せて入力する。」", "c. 「コンビネーション製品による有害事象情報を入手したときは電子速報書システムに、コンビネーション製品の不具合情報を入手したときは苦情要望管理システムに登録する。」", "d. 「安全管理情報を入手する際、優先して入手すべき6項目は、「有害事象名」、「重篤性」、「本剤との因果関係」、「患者識別情報」、「発現日」、「転帰」である。」" ],

              { id: "p24_pms_4", type: "mc", text: "RMP(医薬品リスク管理計画)に関する下記の文章について、正しい正誤の組み合わせを選びなさい。",
                statements: [ "a. 「安全性検討事項には、「重要な特定されたリスク」、「重要な潜在的リスク」、「重要な不足情報」の3つがある。」", "b. 「重要な特定されたリスク」とは、医薬品との関連性が十分な根拠に基づいて示されている有害な事象のうち、重要なもののことであり、その例として、オラネジンの「ショック」がある。」", "c. 「製造販売後の医薬品安全性監視活動の結果として、新たな安全性の懸念が判明したときは、速やかに安全性検討事項の内容を見直す。」", "d. 「リスク最小化計画」とは、収集された安全性等に関する情報およびその評価に基づき、リスクを最小に抑え、ベネフィット・リスクバランスを適切に維持するための活動の計画のことであり、「通常」と「追加」の活動がある。」" ],

              { id: "p24_pms_5", type: "mc", text: "GPSPと製造販売後調査等ガイドラインに関する下記の文章について、正しい正誤の組み合わせを選びなさい。",
                statements: [ "a. 「GPSPは、製造販売後の調査および試験を実施する際に求められる遵守事項を定めたものであり、製造販売後調査等に関する業務が適正に実施され、再審査および再評価申請資料の信頼性を確保することを目的とする。」", "b. 「一般使用成績調査」とは、使用成績調査のうち、医薬品を使用する者の条件を定めることなく行う調査であり、使用成績比較調査に該当しないものである。」", "c. 「製造販売後データベース調査」とは、製造販売業者等が、医療情報データベース取扱事業者が提供する医療情報データベースを用い、医薬品の副作用による疾病等の種類別の発現状況ならびに品質、有効性および安全性に関する情報の検出または確認のために行う調査のことである。」", "d. 「製造販売後調査等管理責任者は製造販売後調査等基本計画書を作成・保存する。(GVPのもとで医薬品リスク管理計画書が作成・保存されているときは不要)」" ],

              { id: "p24_pms_6", type: "mc", text: "PMSの意義・重要性に関する下記の文章について、正しい正誤の組み合わせを選びなさい。",
                statements: [ "a. 「PMSは医薬品の製造販売後に行われる有効性、安全性の確保のための活動である。」", "b. 「日本のPMSは、「再審査制度および安全性定期報告」、「再評価制度」および「副作用・感染症報告制度」の3つの制度で成り立っている。」", "c. 「使用成績調査と市販直後調査はGPSPによって規定されている。」", "d. 「PMSの目的のひとつは、収集・評価・分析された情報を、適切に医療関係者に伝達することである。」" ],

              },
              { id: "p24_pms_7", type: "mc", text: "副作用・感染症報告制度に関する下記の文章について、正しい正誤の組み合わせを選びなさい。",
                statements: [ "a. 「副作用・感染症報告制度を構成する4つの制度は、「企業報告制度」、「感染症定期報告制度」、「医薬品・医療機器等安全性情報報告制度」、「WHO国際医薬品モニタリング制度」である。(なお、現在は「患者からの医薬品副作用報告制度」を含め5つの制度である)」", "b. 「企業報告制度は、医薬品医療機器等法第68条の10に「有効性及び安全性に関する事項で厚生労働省令で定めるものを知ったときは、その旨を厚生労働省令で定めるところにより厚生労働大臣に報告しなければならない。」と明記されている。」", "c. 「医師等が重篤でないと判断した症例でも、当該企業が重篤と判断した症例は「重篤」な症例に該当する。」", "d. 「感染症定期報告制度とは、生物由来製品の製造販売業者が、当該生物由来製品やその原料、材料による感染症に関して最新の文献等から得られる知見に基づいて評価を行い、半年ごとに報告を行う制度である。」" ],

              { id: "p24_pms_8", type: "mc", text: "再審査制度および安全性定期報告に関する下記の文章について、正しい正誤の組み合わせを選びなさい。",
                statements: [ "a. 「再審査制度とは、1979年の薬事法改正により導入され、医薬品医療機器等法第14条の4に規定された制度である。」", "b. 「再審査期間は、製造販売承認(承認事項一部変更承認)の際に厚生労働大臣が指定し、「新有効成分含有医薬品:6年」、「新医療用配合剤:6年」、「新投与経路医薬品:8年」である。」", "c. 「定期的ベネフィット・リスク評価報告(PBRER)は、医薬品のオリジナル開発企業が当該医薬品と同一成分を販売している各国の提携会社から安全性情報や有効性・有用性情報を収集し、ベネフィット・リスクについて分析・評価を行った結果をまとめた報告書である。」", "d. 「安全性定期報告は、承認の際に厚生労働大臣が指定した日から2年間は半年ごと、それ以降は1年ごと(調査単位期間)、調査単位期間満了後から70日以内(邦文以外の資料がある場合は3ヵ月以内)に、PMDAに報告することとなっている。」" ],

              { id: "p24_pms_9", type: "mc", text: "医療機器・コンビネーション製品に関する下記の文章について、正しい正誤の組み合わせを選びなさい。",
                statements: [ "a. 「2024年1月現在、OPFが取り扱う医療機器のうち、安全管理情報の収集対象としているのは「ビスコクリア」のみである。」", "b. 「医療機器の安全管理情報には、「健康被害情報」と「不具合情報」がある。」", "c. 「不具合による影響とは、「破損、作動不良等広く具合の良くないことによる影響をいい、設計、製造販売、流通又は使用のいずれの段階によるものであるかを問わない」と、されている。」", "d. 「MRは、ビスコクリアによる健康被害情報を入手した場合、情報入手後、原則1暦日以内に「医療機器連絡システム」に登録する。」" ],

              { id: "p24_13", type: "mc", text: "ハイネックスイーゲル、ハイネックスイーゲルLCの共通点として、間違っているものを選びなさい。", options: ["カロリー濃度 0.8kcal/mL", "同じゲル化メカニズム", "消化態タイプ", "全脂質の約34%がMCT", "脂肪酸 n-3:n-6の比率が 1:3"], answer: 4, explanation: "LCは1:2であるため共通ではない。" },
              { id: "p24_14", type: "mc", text: "ハイネックスリニュートについて、間違っているものを選びなさい。", options: ["カロリー濃度 1.0kcal/mL", "L-カルニチンを配合", "コラーゲンペプチド、大豆ペプチドとアミノ酸を使用した消化態タイプ", "ハイネックスイーゲルと同量のビタミンB1を配合(1kcal当たり)", "全脂質の50%がMCT"], answer: 3, explanation: "ビタミンB1はリニュートの方が大幅に増量されている。" },
              { id: "p24_15", type: "mc", text: "下のグラフはハイネックスイーゲル、ハイネックスイーゲルLC、ハイネックスリニュート、いずれかのエネルギー産生栄養素バランスを表したものである。a.b.c.がそれぞれどの製品を表しているのか、正しい組み合わせを選びなさい。\n(a:炭50脂34タン16, b:炭64脂20タン16, c:炭26脂50タン24)", options: ["a. ハイネックスイーゲルLC b. ハイネックスイーゲル c. ハイネックスリニュート", "a. ハイネックスイーゲル b. ハイネックスイーゲルLC c. ハイネックスリニュート", "a. ハイネックスリニュート b. ハイネックスイーゲル c. ハイネックスイーゲルLC", "a. ハイネックスイーゲル b. ハイネックスリニュート c. ハイネックスイーゲルLC", "a. ハイネックスイーゲルLC b. ハイネックスリニュート c. ハイネックスイーゲル"], answer: 0, explanation: "a=LC, b=イーゲル, c=リニュート (PDF解答①による)。" },
              { id: "p24_16", type: "mc", text: "ハイネックスイーゲル、ハイネックスイーゲルLC、ハイネックスリニュートについての記載として、正しい正誤の組み合わせを選びなさい。", statements: ["a. 1kcal当たりのタンパク質量はハイネックスリニュートが最も多い。","b. 製品規格はハイネックスイーゲルが2種類、ハイネックスイーゲルLCが3種類、ハイネックスリニュートが1種類である。","c. ハイネックスリニュートのみDHAとEPAを配合している。"], options: ["a.正 b.正 c.正", "a.正 b.正 c.誤", "a.誤 b.正 c.正", "a.誤 b.誤 c.正", "a.誤 b.誤 c.誤"], answer: 0, explanation: "すべて正しい。" },
              { id: "p24_17", type: "mc", text: "ハイネックスゼリー1袋の、希望小売価格(税抜き)を選びなさい。", options: ["315円", "330円", "345円", "360円", "375円"], answer: 1, explanation: "330円である。" },
              { id: "p24_18", type: "mc", text: "ハイネックスゼリーの特徴として、間違っているものを選びなさい。", options: ["寒天で固めたゼリータイプの濃厚流動食品である。", "日本人の食事摂取基準(2020年版)を参考に各種栄養素を調整している。", "900kcalの摂取で1日に必要なビタミン・微量元素をほぼ充足できる配合設計となっている。", "エネルギー産生栄養素のバランスはタンパク質18%、脂質25%、炭水化物57%である。", "粘度は6000mPa・s(B型粘度計・12回転/分・20℃)である。"], answer: 4, explanation: "粘度は約8700mPa・sである。" },
              { id: "p24_19", type: "mc", text: "ハイネックスゼリーの特徴として、間違っているものを選びなさい。", options: ["食物繊維としてイヌリンを配合している。", "L-カルニチンを配合している。", "水分比率はラコールNF配合経腸用半固形剤よりも高い。", "脂肪酸 n-3:n-6の比率は 1:3である。", "賞味期限は製造日より8ヵ月である。"], answer: 2, explanation: "水分比率はどちらも76%で同じ。" },
              { id: "p24_20", type: "mc", text: "ハイネゼリーとハイネックスゼリーの共通点として、間違っているものを選びなさい。", options: ["1袋の容量は300gである。", "1.0kcal/gである。", "アレルギー成分は同じである。", "タンパク源としてコラーゲンペプチドを含んでいる。", "同じサイズの容器を用いている。"], answer: 4, explanation: "ハイネックスゼリーは加圧を考慮し長くなっている。" },
              { id: "p24_21", type: "mc", text: "アクトリーンの製品特徴について、正しい正誤の組み合わせを選びなさい。", statements: ["a. カテーテルは植物由来のグリセリンと蒸留水を使用したゲル状の潤滑剤でコーティングされている。","b. 潤滑剤は乾きにくく、開封120分後の水分蒸散率10%である。","c. 重大な有害事象として、尿路感染、膀胱・尿道損傷、出血、尿道炎症がある。","d. 再利用型カテーテルである。"], options: ["a.正 b.誤 c.正 d.正", "a.正 b.正 c.誤 d.誤", "a.誤 b.正 c.誤 d.正", "a.正 b.正 c.正 d.誤", "a.誤 b.誤 c.正 d.正"], answer: 3, explanation: "dは単回使用型である。" },
              { id: "p24_22", type: "mc", text: "アクトリーンについて、正しい正誤の組み合わせを選びなさい。", statements: ["a. ハイライトカテは先端の形状によりネラトン型とチーマン型の2種類がある。","b. ミニのカテーテル長は全て90mmである。","c. ハイライトセットの採尿バッグ容量は1000mLである。","d. ミニセットの採尿バッグ容量は700mLである。"], options: ["a.正 b.正 c.正 d.正", "a.誤 b.正 c.正 d.正", "a.誤 b.誤 c.正 d.正", "a.正 b.誤 c.誤 d.誤", "a.正 b.正 c.誤 d.誤"], answer: 0, explanation: "全て正しい。" },
              { id: "p24_23", type: "mc", text: "OTバルーンカテーテルについて、間違っているものを選びなさい。", options: ["再利用型で使用期間は30日以内である。", "フィルターキャップはフタを閉じている時、空気も液体も通過させない。", "12、14、16Frの3サイズある。", "膀胱留置する際に使用するバルブは一方弁になっている。", "本製品は未滅菌、未消毒である。"], answer: 1, explanation: "疎水性フィルターは空気は通過するが液体は通過しない。" },
              { id: "p24_24", type: "mc", text: "OTバルーンカテーテル使用時の a〜c の操作を、実際の手順通りに並べ替えた場合、正しい組み合わせとなるものを選びなさい。", statements: ["a. 膀胱内にカテーテルのバルーン部を挿入し尿が出てくるまで挿入する。尿が確認できたら更に5cm押し込む。","b. フィルターキャップのフタを開けて排尿する。","c. リザーバーをバルブに差し込み、滅菌水を注入してバルーンを膨張させる。リザーバーを取り外し、バルーンからの液漏れがないことを確認する。"], options: ["b-c-a", "a-b-c", "a-c-b", "c-a-b", "c-b-a"], answer: 3, explanation: "バルーン確認(c) -> 挿入(a) -> 排尿(b) の順。" },
              { id: "p24_25", type: "mc", text: "リリアムワンについて、間違っている記載を選びなさい。", options: ["使用目的又は効果は超音波を用いて膀胱の性状から尿動態を可視化し、診断のために提供することである。", "管理医療機器(クラスII)かつ特定保守管理医療機器である。", "測定精度は± (15%+20mL)である。", "3回の測定結果の平均値を膀胱内尿量と判断する。", "膀胱内に尿が少なかった場合、インジケーターは1つも点灯しないことがある。"], answer: 3, explanation: "3回の測定結果の「最大値」を判断する。" },
              { id: "p24_26", type: "mc", text: "リリアムワンの下記インジケータの表示について、正しい正誤の組み合わせを選びなさい。\n(a=全体をとらえられていない, b=1回はとらえている, c=全体をとらえられている)", statements: ["a. 膀胱全体を超音波がとらえられていない可能性がある。","b. 1回は膀胱全体を超音波がとらえられている。","c. 膀胱全体を超音波がとらえられている。"], options: ["a.正 b.正 c.正", "a.誤 b.誤 c.正", "a.誤 b.正 c.正", "a.誤 b.正 c.誤", "a.正 b.誤 c.誤"], answer: 1, explanation: "PDF解答に基づく。" },
              { id: "p24_27", type: "mc", text: "エネフリード輸液の製剤学的特性について、間違っている記載を選びなさい。", options: ["アミノ酸、ブドウ糖、電解質に加えて脂肪及び水溶性ビタミン9種類をダブルバッグに一剤化したPPN用キット製剤である。", "アミノ酸組成は、TEO基準に従い、18種類のアミノ酸から成り、分岐鎖アミノ酸を30w/w%含有している。", "水溶性ビタミン9種類を含むが投与時に遮光カバーは不要である。", "脂肪源の大豆油は、必須脂肪酸であるリノール酸、リノレン酸を約60%含んでおり、これらを含む脂肪酸を補給できる。", "エネルギー産生栄養素バランスは、たんぱく質(アミノ酸)19%、脂質32%、炭水化物48%となっている。"], answer: 2, explanation: "水溶性ビタミンを含むため遮光カバーが必要。" },
              { id: "p24_28", type: "mc", text: "エネフリード輸液 投与時の管理について、間違っている記載を選びなさい。", options: ["他の薬剤を混注できない。", "ビタミンの光分解を防ぐため、遮光カバーを用いる。", "他の薬剤を投与するときは輸液ライン側管から投与する。", "除菌用ファイナルフィルターは使用できない。", "輸液ラインの接合部は消毒操作を徹底する。"], answer: 2, explanation: "側管から他の薬剤を投与できない。" },
              { id: "p24_29", type: "mc", text: "エネフリード輸液のNPC/N比について、正しい数値を選びなさい。", options: ["64", "71", "105", "149", "153"], answer: 3, explanation: "149である。" },
              { id: "p24_30", type: "mc", text: "2024年3月5日告示のエネフリード輸液 550mL 1袋の薬価を選びなさい。", options: ["1462円", "1036円", "755円", "554円", "539円"], answer: 0, explanation: "1462円である。" },
              { id: "p24_31", type: "mc", text: "エネフリード輸液550mLの記載について、間違っている記載を選びなさい。", options: ["糖濃度は7.5%である。", "精製大豆油は10gである。", "エネルギーは310kcalである。", "水溶性ビタミンの処方は、FDA2000処方を参考にしている。", "アミノ酸は15gである。"], answer: 0, explanation: "糖濃度は6.8%。7.5%はビーフリード。" },
              { id: "p24_32", type: "mc", text: "医薬部外品 ヒノーラに含まれる薬用成分について、正しい正誤の組み合わせを選びなさい。", statements: ["a. ヒノキチオール","b. ヒアルロン酸ナトリウム","c. グリチルリチン酸ジカリウム","d. IPMP"], options: ["a.正 b.正 c.誤 d.誤", "a.正 b.誤 c.誤 d.正", "a.誤 b.正 c.正 d.誤", "a.正 b.誤 c.正 d.正", "a.誤 b.正 c.正 d.誤"], answer: 3, explanation: "bのヒアルロン酸は保湿剤であり薬用成分(有効成分)ではない。" },
              { id: "p24_33", type: "mc", text: "ヒノーラの製品紹介スライドにある基礎試験について、正しい文章を選びなさい。", options: ["Disc diffusion assayにおいて、濃度依存的に阻止円の直径が大きくなった。", "Microorganism turbidity assayにおいてヒノーラを添加した場合、使用したすべての真菌および細菌のバイオフィルム形成が抑制された。", "Crystal violet assayにおいてヒノーラを添加した場合、使用したすべての真菌および細菌に対し増殖が抑制された。", "Germ tube testにおいて、ヒノーラを添加した培地では、C. albicans の顕著な菌糸形成が認められた。", "Germ tube testにおいて、ヒノーラを添加していない培地では、多くが酵母形のままだった。"], answer: 0, explanation: "①が正しい。②③は試験名と内容が逆等。" },
              { id: "p24_34", type: "mc", text: "大塚生食注50mLソフトバッグについて、正しい正誤の組み合わせを選びなさい。", statements: ["a. 混注可能量とは、「表示量」+「容器内の空気を抜いて混注できる薬液の量」で100mLである。","b. 常用全満量とは、「表示量」+「混注可能量」(容器内の空気は残したまま)で150mLである。","c. 容器全満量とは、容器内の空気は残したまま、混注できる薬液の量で195mLである。"], options: ["a.正 b.正 c.正", "a.正 b.誤 c.誤", "a.誤 b.誤 c.正", "a.誤 b.正 c.誤", "a.誤 b.誤 c.誤"], answer: 2, explanation: "aは空気を残して100mL。bは空気を抜いて150mL。cは空気を残して195mL。" },
              { id: "p24_35", type: "mc", text: "大塚生食注50mLソフトバッグの、使用期限はどれか選びなさい。", options: ["1年", "2年", "3年", "4年", "5年"], answer: 2, explanation: "3年である。" },
              { id: "p24_36", type: "mc", text: "浸透圧の説明について、誤っているものを選びなさい。", options: ["水は浸透圧の低い方から高い方へ移動する", "浸透圧を表す単位はmOsm/Lである。", "ブドウ糖はイオン化する物質である。", "体液の浸透圧の基準値は「約285mOsm/L」である。", "イオン化しない物質の場合には、浸透圧とモル濃度は等しい"], answer: 2, explanation: "ブドウ糖はイオン化しない。" },
              { id: "p24_37", type: "mc", text: "輸液の投与速度について、電解質の最大投与速度として、正しいものはどれか選びなさい。", options: ["K+: 40mEq/hr", "Na+: 140mEq/hr", "Ca2+: 20mEq/hr", "Mg2+: 5mEq/hr", "HCO3-: 24mEq/hr"], answer: 2, explanation: "Caは20mEq/hr。Naは100, Kは20。" },
              { id: "p24_38", type: "mc", text: "アミノ酸や蛋白質の説明として、正しいものを選びなさい。", options: ["アミノ酸とは、メチル基とカルボキシル基を同時に持つ化合物の総称である。", "アミノ酸は、生体内ではD体のみである。", "アミノ酸は単体で立体構造を持つ。", "蛋白質の代表的なものとしてアルブミンがある。", "蛋白質の消化酵素トリプシンは胃液中に存在する。"], answer: 3, explanation: "アミノ基とカルボキシル基。L体。立体はタンパク質。トリプシンは膵液。" },
              { id: "p24_39", type: "mc", text: "脂肪酸の分類について、中鎖脂肪酸はどれか選びなさい。", options: ["リノール酸", "リノレン酸", "カプリル酸", "オレイン酸", "エイコサペンタエン酸"], answer: 2, explanation: "カプリル酸以外は長鎖脂肪酸。" },
              { id: "p24_40", type: "mc", text: "栄養評価の用語(略語)と正式名称で、正しい組み合わせはどれか選びなさい。", options: ["AMC: 上腕三頭筋皮下脂肪厚", "T-Cho: コリンエステラーゼ", "RBP: レチノール結合蛋白", "BMI: 基礎エネルギー消費量", "DCH: 総リンパ球数"], answer: 2, explanation: "RBPはレチノール結合蛋白。" },
              { id: "p24_41", type: "mc", text: "末梢静脈栄養における「血管痛・静脈炎の予防と対策」として、間違っているものを選びなさい。", options: ["高浸透圧の場合、糖濃度を下げる。", "できるだけ大きい径のカニューラを使用する。", "できるだけ血流の多い上肢の太い静脈に留置する。", "なるべく中性に近いpHの輸液を選択する。", "なるべく緩徐に投与する。"], answer: 1, explanation: "必要最小径のカニューラを使用する。" },
              { id: "p24_42", type: "mc", text: "飢餓時のブドウ糖投与による体蛋白の節約効果を見たGambleデータについて、a〜cに当てはまる語句を選びなさい。", statements: ["飢餓状態では、体蛋白の異化により、6日間で約(a)の蛋白質が喪失した。これは筋肉量に換算すると約(b)に相当する。この時ブドウ糖を投与すると蛋白の異化が抑制され、100g/日の投与で蛋白質喪失量は6日間で約(c)となった。"], options: ["a. 400g b. 2kg c. 200g", "a. 400g b. 1kg c. 200g", "a. 200g b. 2kg c. 100g", "a. 200g b. 1kg c. 100g", "a. 200g b. 1kg c. 50g"], answer: 0, explanation: "a=400g, b=2kg, c=200g。" },
              { id: "p24_43", type: "mc", text: "ストレスホルモンの糖代謝への影響について、()内に当てはまる語句を選びなさい。", statements: ["()は、侵襲時に副腎より分泌され、肝における糖新生、骨格筋における蛋白異化を促進し、抗炎症作用や免疫抑制などの作用がある。"], options: ["カテコールアミン", "コルチゾール", "成長ホルモン", "グルカゴン", "インスリン"], answer: 1, explanation: "コルチゾール。" },
              { id: "p24_44", type: "mc", text: "1997年の「高カロリー輸液療法施行中のアシドーシス」に関する適正使用情報について、ビタミンB1欠乏によると思われるアシドーシスが発現した場合のビタミンB1投与量についての記載で、正しいものを選びなさい。", options: ["1〜10mg", "10〜40mg", "50〜90mg", "100〜400mg", "500〜900mg"], answer: 3, explanation: "100〜400mg。" },
              { id: "p24_45", type: "mc", text: "カテーテル関連血流感染症の定義について、a〜bに当てはまる語句を選びなさい。", statements: ["TPN施行中に発熱、白血球(a)、核の左方移動、耐糖能の(b)など、感染を疑わしめる症状があって、カテーテルの抜去によって解熱、その他の臨床所見の改善をみたもの"], options: ["a.減少 b.低下", "a.減少 b.亢進", "a.増多 b.低下", "a.数は変わらず b.低下", "a.数は変わらず b.亢進"], answer: 2, explanation: "白血球増多、耐糖能の低下。" },
              { id: "p24_46", type: "mc", text: "胃瘻カテーテルの説明について、正しいものはどれか選びなさい。", options: ["バルーン型は、交換間隔が24時間以上留置の場合、保険料算定が可能である。", "バンパー型は、交換までの期間が長く、2か月以上留置の場合、保険料算定が可能である。", "ボタン型は、逆流防止機能があるが、カテーテルの汚染は多い。", "ボタン型は、指先でボタンを開閉しにくい場合があり、事故抜去も多い。", "チューブ型は、投与時の栄養チューブとの接続が容易でありチューブ内の汚染も起きにくい。"], answer: 0, explanation: "PDF解答の解説部分に基づく。" },
              { id: "p24_47", type: "mc", text: "経腸栄養の「半固形栄養法」について、正しい正誤の組み合わせを選びなさい。", statements: ["a. 胃の機能が不十分な場合でも液体栄養よりも望ましい方法である。","b. 胃食道逆流や誤嚥性肺炎、下痢、ダンピングなど経腸栄養管理を行う上で問題となる合併症の予防策になり得る。","c. ミキサー食は、粘度調節が不要であるがコストは高い。","d. 胃の機能が正常である場合、半固形栄養を注入したとき、胃の貯留能と排出能を得ることが可能である。"], options: ["a.正 b.誤 c.正 d.誤", "a.誤 b.正 c.正 d.誤", "a.誤 b.正 c.誤 d.正", "a.誤 b.誤 c.正 d.正", "a.正 b.正 c.誤 d.誤"], answer: 2, explanation: "a誤 b正 c誤 d正。" },
              { id: "p24_48", type: "mc", text: "「酸素解離曲線」の説明で、正しい正誤の組み合わせを選びなさい。", statements: ["a. 一般的に、酸素分圧が高くなると、酸素飽和度は高くなる。","b. pHが低下した場合には酸素解離曲線の右偏が起こる。","c. 急激なアシドーシスの是正は、Hbの酸素解離曲線の左偏を起こし、組織での酸素欠乏を起こす可能性がある。","d. 二酸化炭素分圧(PCO2)が上昇した場合、酸素解離曲線の左偏が起こる。"], options: ["a.正 b.正 c.誤 d.誤", "a.正 b.誤 c.正 d.誤", "a.正 b.誤 c.誤 d.正", "a.誤 b.正 c.誤 d.正", "a.誤 b.誤 c.正 d.正"], answer: 1, explanation: "PDF解答表の「解答は②(正, 誤, 正, 誤)」に従う。" },
              { id: "p24_49", type: "mc", text: "MRに求められる行動について、ふさわしいものはどれか選びなさい。", options: ["アポイントの取れない医師を病院のトイレの前で待っていた。", "担当先の病院の駐車場がいつも混んでいるため朝早くいって場所を確保した。", "病院内で、自分のオフィスのようにスマートフォンを操作した。", "病院の混んでいる待合室で座って待っていた。", "医療者と面談するため、あらかじめ院内ルールを確認した。"], answer: 4, explanation: "あらかじめ院内ルールを確認した。" },
              { id: "p24_50", type: "mc", text: "MRに求められるマナーについて、正しいものはどれか選びなさい。", options: ["自分の不注意から仕事の関係者に損害を与えたときに、誰にも報告・相談しなかった。", "医療機関の敷地内では、携帯用灰皿を使用して喫煙した。", "医療機関内では、患者が多く騒がしいため大きな声で挨拶した。", "担当先で有名人が患者として来院していたので、匿名でSNSに投稿した。", "医療者と面談するため、あらかじめ院内ルールを確認した。"], answer: 4, explanation: "事前確認が正しい。" }
            ]
          }
        }
      }
    };

    function App() {
      const [username, setUsername] = useState(() => localStorage.getItem("opf_user") || "ゲスト");
      const [isLoggedIn, setIsLoggedIn] = useState(() => !!localStorage.getItem("opf_user") && localStorage.getItem("opf_user") !== "ゲスト");
      const [activeTab, setActiveTab] = useState("dashboard"); 
      const [userProgress, setUserProgress] = useState({ completed: {}, bookmarks: {}, scores: [] });
      const [syncStatus, setSyncStatus] = useState("Local Ready");
      const [showUserModal, setShowUserModal] = useState(false);
      const [inputName, setInputName] = useState("");
      const [toast, setToast] = useState(null);
      const [studySession, setStudySession] = useState(null); 

      const showToast = (message, type = "success") => { setToast({ message, type }); setTimeout(() => setToast(null), 3000); };
      const getUserDocRef = (uName) => db.collection('artifacts').doc(appId).collection('public').doc('data').collection('userProgress').doc(uName.toLowerCase().trim());

      useEffect(() => {
        const sharedUser = new URLSearchParams(window.location.search).get("user");
        if (sharedUser && sharedUser !== username) {
          setInputName(sharedUser);
          setShowUserModal(true);
          showToast(`共有リンクから「${sharedUser}」を読み込むには確定を押してください。`, "info");
        }
      }, []);

      useEffect(() => {
        const initSync = async () => {
          if (!username || username === "ゲスト") {
            setUserProgress(JSON.parse(localStorage.getItem(`opf_progress_guest`)) || { completed: {}, bookmarks: {}, scores: [] });
            setSyncStatus("Local Mode 💾");
            return;
          }
          try {
            if (isFirebaseReady && auth && db) {
              setSyncStatus("Syncing...");
              let user = auth.currentUser;
              if (!user) {
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) await auth.signInWithCustomToken(__initial_auth_token);
                else await auth.signInAnonymously();
                user = auth.currentUser;
              }
              if (user) {
                const docRef = getUserDocRef(username);
                const docSnap = await docRef.get();
                if (docSnap.exists) {
                  const d = docSnap.data();
                  setUserProgress({ completed: d.completed || {}, bookmarks: d.bookmarks || {}, scores: d.scores || [] });
                  showToast(`「${username}」の進捗を同期しました。`, "success");
                } else {
                  await docRef.set({ username, completed: userProgress.completed, bookmarks: userProgress.bookmarks, scores: userProgress.scores, updatedAt: firebase.firestore.FieldValue.serverTimestamp() });
                  showToast(`新規ユーザー「${username}」をクラウドに登録しました！`, "success");
                }
                setSyncStatus("Cloud Synced ☁️");
                return;
              }
            }
          } catch (e) { console.warn("Firestore sync error", e); }
          
          setUserProgress(JSON.parse(localStorage.getItem(`opf_progress_${username}`)) || { completed: {}, bookmarks: {}, scores: [] });
          setSyncStatus("Local Save Mode 💾");
        };
        initSync();
      }, [username]);

      const saveProgress = async (updatedProgress) => {
        if (!username) return;
        try {
          if (isFirebaseReady && db && auth?.currentUser && username !== "ゲスト") {
            await getUserDocRef(username).set({
              username, completed: updatedProgress.completed, bookmarks: updatedProgress.bookmarks, scores: updatedProgress.scores, updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
            setSyncStatus("Cloud Saved ☁️");
          } else {
            localStorage.setItem(username === "ゲスト" ? "opf_progress_guest" : `opf_progress_${username}`, JSON.stringify(updatedProgress));
            setSyncStatus("Local Saved 💾");
          }
        } catch (e) { setSyncStatus("Local Autosaved 💾"); }
      };

      const handleLogin = (e) => {
        e?.preventDefault();
        const trimmed = inputName.trim();
        if (!trimmed) return showToast("ユーザー名を入力してください。", "error");
        localStorage.setItem("opf_user", trimmed);
        setUsername(trimmed);
        setIsLoggedIn(trimmed !== "ゲスト");
        setShowUserModal(false);
      };

      const handleLogout = () => {
        localStorage.removeItem("opf_user");
        setUsername("ゲスト");
        setIsLoggedIn(false);
        setUserProgress({ completed: {}, bookmarks: {}, scores: [] });
        setActiveTab("dashboard");
      };

      const allQuestionsList = useMemo(() => 
        Object.values(CATEGORIES).flatMap(cat => Object.values(cat.subcategories).flatMap(sub => sub.questions.map(q => ({ ...q, categoryId: cat.id, subcategoryId: sub.id }))))
      , []);

      const stats = useMemo(() => {
        const total = allQuestionsList.length;
        const solvedCorrect = Object.values(userProgress.completed).filter(v => v).length;
        const bookmarkedCount = Object.values(userProgress.bookmarks).filter(v => v).length;
        const categoryProgress = {};
        Object.entries(CATEGORIES).forEach(([catId, cat]) => {
          let catTotal = 0, catSolved = 0;
          Object.values(cat.subcategories).forEach(sub => {
            sub.questions.forEach(q => { catTotal++; if (userProgress.completed[q.id]) catSolved++; });
          });
          categoryProgress[catId] = { total: catTotal, solved: catSolved, percentage: catTotal ? Math.round((catSolved / catTotal) * 100) : 0 };
        });
        return { total, solvedCorrect, bookmarkedCount, percentage: total ? Math.round((solvedCorrect / total) * 100) : 0, categoryProgress };
      }, [allQuestionsList, userProgress]);

      const startStudy = (questions, title) => {
        if (!questions?.length) return showToast("問題がありません。", "error");
        
        // findIndex が見つからない場合は 0 とする。
        let initialIndex = questions.findIndex(q => userProgress.completed[q.id] === undefined);
        if (initialIndex === -1) initialIndex = 0;
        
        // 常に「10問ブロックの最初」から表示する。
        const blockStart = Math.floor(initialIndex / 10) * 10;
        
        setStudySession({ 
          mode: "practice", 
          questions, 
          title, 
          currentIndex: blockStart, 
          blockStartIndex: blockStart, 
          blockAnswers: {}, 
          blockCompleted: false, 
          totalFinished: false 
        });
        setActiveTab("study");
      };

      const handleAnswerQuestion = (qId, isCorrect, ans) => {
        if (!studySession) return;
        const newBlockAnswers = { ...studySession.blockAnswers, [qId]: { isCorrect, ans } };
        const updated = { ...userProgress, completed: { ...userProgress.completed, [qId]: isCorrect } };
        setUserProgress(updated);
        saveProgress(updated);
        // ここで blockCompleted にせず、解説表示後の「次へ」ボタン押下時に判定する
        setStudySession({ ...studySession, blockAnswers: newBlockAnswers });
      };

      const toggleBookmark = (qId) => {
        const isBookmarked = !!userProgress.bookmarks[qId];
        const updated = { ...userProgress, bookmarks: { ...userProgress.bookmarks, [qId]: !isBookmarked } };
        setUserProgress(updated);
        saveProgress(updated);
        showToast(!isBookmarked ? "付箋を登録しました！" : "付箋を解除しました。");
      };

      const currentQ = studySession?.questions[studySession.currentIndex];
      const currentAnswer = studySession?.blockAnswers[currentQ?.id];

      return (
        <div className="flex flex-col min-h-screen">
          <header className="bg-slate-950 text-white shadow-xl sticky top-0 z-40 border-b border-brand-900/30">
            <div className="max-w-7xl mx-auto px-4 py-3 sm:px-6 lg:px-8 flex justify-between items-center">
              <div className="flex items-center space-x-3 cursor-pointer select-none" onClick={() => { setStudySession(null); setActiveTab("dashboard"); }}>
                <div className="w-10 h-10 bg-brand-600 rounded-xl flex items-center justify-center shadow-lg shadow-brand-500/20">
                  <svg className="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" /></svg>
                </div>
                <div>
                  <h1 className="text-sm sm:text-base font-bold flex items-center space-x-1.5"><span>2026統一試験対策アプリ</span><span className="text-[10px] bg-brand-600 px-1.5 py-0.5 rounded text-white font-extrabold tracking-widest uppercase">OPF</span></h1>
                  <p className="text-[10px] text-slate-400">大塚製薬工場・クラウド同期版</p>
                </div>
              </div>
              <div className="flex items-center space-x-1.5 text-xs bg-slate-900 border border-slate-800 px-3 py-2 rounded-xl">
                <span className="relative flex h-2 w-2"><span className={`animate-ping absolute inline-flex h-full w-full rounded-full opacity-75 ${isLoggedIn ? "bg-emerald-400" : "bg-amber-400"}`}></span><span className={`relative inline-flex rounded-full h-2 w-2 ${isLoggedIn ? "bg-emerald-500" : "bg-amber-500"}`}></span></span>
                <span className="font-semibold text-slate-200 hidden sm:inline">{username} さん</span><span className="font-semibold text-slate-200 sm:hidden">{username.substring(0, 6)}</span>
                <button onClick={() => { setInputName(isLoggedIn ? username : ""); setShowUserModal(true); }} className="text-brand-400 hover:text-brand-300 font-bold transition ml-1.5 border-l border-slate-800 pl-2">設定・切替</button>
              </div>
            </div>
          </header>

          <div className="bg-slate-100 border-b border-slate-200 px-4 py-2 flex items-center space-x-2 text-[11px] font-medium text-slate-500">
            <Icon name="cloud" className="w-4 h-4" /><span>{syncStatus}</span>
          </div>

          <main className="flex-grow flex flex-col p-4 sm:p-6 lg:p-8 max-w-7xl mx-auto w-full">
            {activeTab === "dashboard" ? (
              <div className="space-y-6 w-full animation-fade-in">
                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                  <h2 className="text-xl font-bold mb-4">学習の進捗</h2>
                  <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-100"><div className="text-slate-500 text-xs font-bold mb-1">全体の進捗率</div><div className="text-2xl font-black text-brand-600">{stats.percentage}%</div></div>
                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-100"><div className="text-slate-500 text-xs font-bold mb-1">正解した問題</div><div className="text-2xl font-black text-slate-800">{stats.solvedCorrect} <span className="text-sm text-slate-400">/ {stats.total}</span></div></div>
                    <div className="bg-slate-50 p-4 rounded-xl border border-slate-100 flex flex-col justify-between">
                      <div>
                        <div className="text-slate-500 text-xs font-bold mb-1">付箋 (ブックマーク)</div>
                        <div className="text-2xl font-black text-amber-500">{stats.bookmarkedCount}</div>
                      </div>
                      {stats.bookmarkedCount > 0 && (
                        <button 
                          onClick={() => {
                            const bookmarkedQuestions = allQuestionsList.filter(q => userProgress.bookmarks[q.id]);
                            startStudy(bookmarkedQuestions, "付箋を付けた問題");
                          }}
                          className="mt-2 bg-amber-100 text-amber-700 hover:bg-amber-200 text-xs font-bold py-2 px-3 rounded-lg transition text-center w-full"
                        >
                          付箋の問題を解く
                        </button>
                      )}
                    </div>
                  </div>
                </div>
                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                  {Object.entries(CATEGORIES).map(([catId, cat]) => (
                    <div key={catId} className="bg-white rounded-2xl shadow-sm border border-slate-200 p-6 flex flex-col">
                      <div className="flex items-center space-x-3 mb-4"><Icon name={cat.icon} className="w-6 h-6 text-brand-500" /><h3 className="text-lg font-bold">{cat.title}</h3></div>
                      <div className="mb-4">
                        <div className="flex justify-between text-xs mb-1"><span className="font-semibold text-slate-600">進捗</span><span className="font-bold">{stats.categoryProgress[catId].percentage}% ({stats.categoryProgress[catId].solved}/{stats.categoryProgress[catId].total})</span></div>
                        <div className="w-full bg-slate-100 rounded-full h-2"><div className="bg-brand-500 h-2 rounded-full" style={{ width: `${stats.categoryProgress[catId].percentage}%` }}></div></div>
                      </div>
                      <div className="space-y-2 mt-auto">
                        {Object.values(cat.subcategories).map(sub => (
                          <button key={sub.id} onClick={() => startStudy(sub.questions, `${cat.title} - ${sub.title}`)} className="w-full text-left px-4 py-3 rounded-xl border border-slate-200 hover:border-brand-300 hover:bg-brand-50 transition flex justify-between items-center group">
                            <span className="font-semibold text-sm text-slate-700 group-hover:text-brand-700">{sub.title} ({sub.questions.length}問)</span><Icon name="chevron-right" className="w-4 h-4 text-slate-400 group-hover:text-brand-500" />
                          </button>
                        ))}
                      </div>
                    </div>
                  ))}
                </div>
              </div>
            ) : (
              studySession && (
                <div className="animation-slide-up w-full max-w-3xl mx-auto flex flex-col flex-grow">
                  <div className="flex justify-between items-center mb-6">
                    <h2 className="text-lg font-bold text-slate-800">{studySession.title}</h2>
                    <div className="flex items-center space-x-3">
                      <select 
                        className="bg-white border border-slate-300 text-slate-700 text-sm font-semibold rounded-lg px-2 py-1 outline-none focus:ring-2 focus:ring-brand-500 cursor-pointer"
                        value={studySession.blockStartIndex}
                        onChange={(e) => {
                          const newStart = parseInt(e.target.value, 10);
                          setStudySession({
                            ...studySession,
                            currentIndex: newStart,
                            blockStartIndex: newStart,
                            blockAnswers: {},
                            blockCompleted: false,
                            totalFinished: false
                          });
                        }}
                      >
                        {Array.from({ length: Math.ceil(studySession.questions.length / 10) }).map((_, i) => {
                          const startQ = i * 10 + 1;
                          const endQ = Math.min((i + 1) * 10, studySession.questions.length);
                          return (
                            <option key={i} value={i * 10}>Q{startQ}〜Q{endQ}</option>
                          );
                        })}
                      </select>
                      <div className="text-sm font-semibold bg-slate-200 px-3 py-1 rounded-full text-slate-700">
                        {studySession.currentIndex + 1} / {studySession.questions.length}
                      </div>
                    </div>
                  </div>
                  
                  {studySession.totalFinished ? (
                    <div className="bg-white rounded-2xl p-8 text-center flex-grow flex flex-col justify-center items-center">
                      <div className="w-20 h-20 bg-brand-100 rounded-full flex items-center justify-center mx-auto mb-6">
                        <Icon name="award" className="w-10 h-10 text-brand-500" />
                      </div>
                      <h3 className="text-2xl font-black text-slate-800 mb-2">お疲れ様でした！</h3>
                      <p className="text-slate-500 mb-8 font-medium">このカテゴリーのすべての問題を解き終わりました。</p>
                      <button onClick={() => { setStudySession(null); setActiveTab("dashboard"); }} className="bg-slate-900 text-white font-bold py-4 px-8 rounded-xl shadow-xl hover:bg-slate-800 transition">
                        ダッシュボードに戻る
                      </button>
                    </div>
                  ) : studySession.blockCompleted ? (
                    <div className="bg-white rounded-2xl p-8 text-center flex-grow flex flex-col justify-center items-center shadow-sm border border-slate-200">
                      <div className="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-4">
                        <Icon name="check-circle" className="w-8 h-8 text-emerald-500" />
                      </div>
                      <h3 className="text-xl font-bold text-slate-800 mb-2">10問ブロック完了！</h3>
                      <p className="text-slate-500 text-sm mb-8">お疲れ様です。少し休憩して次へ進みましょう。</p>
                      <div className="flex space-x-4 w-full max-w-sm mx-auto">
                        <button onClick={() => { setStudySession(null); setActiveTab("dashboard"); }} className="flex-1 py-3 bg-slate-100 text-slate-700 font-bold rounded-xl hover:bg-slate-200 transition">戻る</button>
                        <button onClick={() => {
                          const nextStart = studySession.currentIndex + 1;
                          if (nextStart >= studySession.questions.length) {
                            setStudySession({ ...studySession, totalFinished: true });
                          } else {
                            setStudySession({ ...studySession, currentIndex: nextStart, blockStartIndex: nextStart, blockAnswers: {}, blockCompleted: false });
                          }
                        }} className="flex-1 py-3 bg-brand-600 text-white font-bold rounded-xl shadow-lg hover:bg-brand-500 transition">次の10問へ</button>
                      </div>
                    </div>
                  ) : currentQ ? (
                    <div className="bg-white rounded-2xl shadow-sm border border-slate-200 flex-grow flex flex-col relative overflow-hidden">
                      <div className="absolute top-0 left-0 w-full h-1 bg-slate-100">
                        <div className="h-full bg-brand-500 transition-all duration-300" style={{ width: `${((studySession.currentIndex % 10) + (currentAnswer ? 1 : 0)) / 10 * 100}%` }}></div>
                      </div>
                      
                      <div className="p-6 sm:p-8 flex-grow">
                        <div className="flex justify-between items-start mb-6">
                          <span className="bg-slate-100 text-slate-600 text-xs font-bold px-3 py-1 rounded-lg">Q{studySession.currentIndex + 1}</span>
                          <button onClick={() => toggleBookmark(currentQ.id)} className={`p-2 rounded-full transition ${userProgress.bookmarks[currentQ.id] ? 'bg-amber-100 text-amber-500' : 'bg-slate-50 text-slate-300 hover:bg-slate-100 hover:text-slate-400'}`}>
                            <Icon name="bookmark" className={`w-5 h-5 ${userProgress.bookmarks[currentQ.id] ? 'fill-current' : ''}`} />
                          </button>
                        </div>
                        
                        <h3 className="text-lg sm:text-xl font-bold text-slate-800 leading-relaxed mb-8">{currentQ.text}</h3>

                        <div className="space-y-3">
                          {currentQ.type === 'tf' ? (
                            <div className="flex space-x-4">
                              {[true, false].map(val => {
                                const isSelected = currentAnswer?.ans === val;
                                const showCorrect = currentAnswer && currentQ.answer === val;
                                const showWrong = isSelected && !currentAnswer.isCorrect;
                                
                                return (
                                  <button
                                    key={val.toString()}
                                    disabled={!!currentAnswer}
                                    onClick={() => handleAnswerQuestion(currentQ.id, currentQ.answer === val, val)}
                                    className={`flex-1 py-4 rounded-xl font-bold text-lg transition border-2 flex items-center justify-center space-x-2
                                      ${!currentAnswer ? 'bg-white border-slate-200 text-slate-600 hover:border-brand-300 hover:bg-brand-50 hover:text-brand-700' : ''}
                                      ${showCorrect ? 'bg-emerald-50 border-emerald-500 text-emerald-700' : ''}
                                      ${showWrong ? 'bg-red-50 border-red-500 text-red-700' : ''}
                                      ${currentAnswer && !showCorrect && !showWrong ? 'bg-slate-50 border-slate-100 text-slate-400 opacity-50' : ''}
                                    `}
                                  >
                                    <span>{val ? '〇 (正しい)' : '× (誤り)'}</span>
                                  </button>
                                );
                              })}
                            </div>
                          ) : (
                            <div className="space-y-3">
                              {currentQ.statements && (
                                <div className="mb-6 bg-slate-50 p-5 rounded-xl text-sm sm:text-base text-slate-800 space-y-2 border border-slate-200 shadow-sm font-medium">
                                  {currentQ.statements.map((s, i) => (
                                    <p key={i} className="leading-relaxed whitespace-pre-wrap">{s}</p>
                                  ))}
                                </div>
                              )}
                              {currentQ.options.map((opt, idx) => {
                                const isSelected = currentAnswer?.ans === idx;
                                const showCorrect = currentAnswer && currentQ.answer === idx;
                                const showWrong = isSelected && !currentAnswer.isCorrect;

                                return (
                                  <button
                                    key={idx}
                                    disabled={!!currentAnswer}
                                    onClick={() => handleAnswerQuestion(currentQ.id, currentQ.answer === idx, idx)}
                                    className={`w-full text-left p-4 rounded-xl font-medium transition border-2 flex items-start space-x-3
                                      ${!currentAnswer ? 'bg-white border-slate-200 text-slate-700 hover:border-brand-300 hover:bg-brand-50 hover:text-brand-700' : ''}
                                      ${showCorrect ? 'bg-emerald-50 border-emerald-500 text-emerald-800' : ''}
                                      ${showWrong ? 'bg-red-50 border-red-500 text-red-800' : ''}
                                      ${currentAnswer && !showCorrect && !showWrong ? 'bg-slate-50 border-slate-100 text-slate-400 opacity-50' : ''}
                                    `}
                                  >
                                    <span className={`flex-shrink-0 w-6 h-6 rounded-full border-2 flex items-center justify-center text-xs font-bold mt-0.5
                                      ${showCorrect ? 'bg-emerald-500 border-emerald-500 text-white' : showWrong ? 'bg-red-500 border-red-500 text-white' : 'border-slate-300 text-slate-500'}
                                    `}>
                                      {showCorrect ? <Icon name="check" className="w-4 h-4" /> : showWrong ? <Icon name="x" className="w-4 h-4" /> : idx + 1}
                                    </span>
                                    <span className="leading-tight pt-0.5">{opt}</span>
                                  </button>
                                );
                              })}
                            </div>
                          )}
                        </div>
                      </div>

                      {currentAnswer && (
                        <div className="bg-slate-50 p-6 border-t border-slate-100 animation-slide-up">
                          <div className="flex items-center space-x-2 mb-3">
                            {currentAnswer.isCorrect ? <span className="bg-emerald-100 text-emerald-700 text-xs font-bold px-2 py-1 rounded">正解</span> : <span className="bg-red-100 text-red-700 text-xs font-bold px-2 py-1 rounded">不正解</span>}
                            <span className="text-sm font-bold text-slate-700">解説</span>
                          </div>
                          <p className="text-slate-600 text-sm leading-relaxed mb-6">{currentQ.explanation || "（解説なし）"}</p>
                          <button onClick={() => {
                            const relativeIndex = studySession.currentIndex - studySession.blockStartIndex;
                            const isBlockEnd = relativeIndex === 9 || studySession.currentIndex === studySession.questions.length - 1;
                            
                            if (isBlockEnd) {
                              if (studySession.currentIndex >= studySession.questions.length - 1) {
                                setStudySession({ ...studySession, totalFinished: true });
                              } else {
                                setStudySession({ ...studySession, blockCompleted: true });
                              }
                            } else {
                              setStudySession({ ...studySession, currentIndex: studySession.currentIndex + 1 });
                            }
                          }} className="w-full py-4 bg-slate-900 text-white font-bold rounded-xl shadow-lg hover:bg-slate-800 transition">
                            次へ進む
                          </button>
                        </div>
                      )}
                    </div>
                  ) : null}
                </div>
              )
            )}
          </main>

          {showUserModal && (
            <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4 animation-fade-in">
              <div className="bg-white rounded-3xl shadow-2xl w-full max-w-sm overflow-hidden">
                <div className="p-6 sm:p-8">
                  <div className="w-12 h-12 bg-brand-100 rounded-full flex items-center justify-center mb-4"><Icon name="users" className="w-6 h-6 text-brand-600" /></div>
                  <h3 className="text-xl font-bold text-slate-800 mb-2">ユーザー設定</h3>
                  <p className="text-sm text-slate-500 mb-6 leading-relaxed">学習データを共有・同期するために、お名前（ニックネーム可）を入力してください。</p>
                  <form onSubmit={handleLogin}>
                    <input type="text" value={inputName} onChange={(e) => setInputName(e.target.value)} placeholder="例: Yamada" className="w-full px-4 py-3 bg-slate-50 border border-slate-200 rounded-xl text-slate-800 outline-none transition placeholder:text-slate-300 focus:ring-2 focus:ring-brand-500 mb-6 font-medium" autoFocus />
                    <div className="flex space-x-3">
                      <button type="button" onClick={() => setShowUserModal(false)} className="flex-1 py-3 bg-slate-100 text-slate-700 font-bold rounded-xl">キャンセル</button>
                      <button type="submit" className="flex-1 py-3 bg-brand-600 text-white font-bold rounded-xl shadow-lg">決定・同期</button>
                    </div>
                  </form>
                </div>
                {isLoggedIn && <div className="p-4 bg-slate-50 flex justify-between"><span className="text-xs font-semibold text-slate-500">現在のユーザー: {username}</span><button onClick={handleLogout} className="text-xs font-bold text-red-500">ログアウト</button></div>}
              </div>
            </div>
          )}

          {toast && (
            <div className="fixed bottom-6 right-6 z-50 animation-slide-up">
              <div className={`px-5 py-3 rounded-xl shadow-xl flex items-center space-x-3 text-white font-medium text-sm ${toast.type === 'error' ? 'bg-red-600' : toast.type === 'info' ? 'bg-slate-800' : 'bg-brand-600'}`}>
                <Icon name={toast.type === 'error' ? 'alert-circle' : toast.type === 'info' ? 'info' : 'check-circle'} className="w-5 h-5" />
                <span>{toast.message}</span>
              </div>
            </div>
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
