    // --- MAIN APP COMPONENT ---
    function App() {
      // ユーザー名
      const [username, setUsername] = useState(() => localStorage.getItem("opf_user") || "ゲスト");
      const [isLoggedIn, setIsLoggedIn] = useState(() => !!localStorage.getItem("opf_user") && localStorage.getItem("opf_user") !== "ゲスト");
      const [activeTab, setActiveTab] = useState("dashboard"); 
      const [userProgress, setUserProgress] = useState({
        completed: {}, 
        bookmarks: {}, 
        scores: []     
      });
      const [loading, setLoading] = useState(false);
      const [syncStatus, setSyncStatus] = useState("Local Ready");

      // モーダル管理
      const [showUserModal, setShowUserModal] = useState(false);
      const [showShareModal, setShowShareModal] = useState(false);
      const [inputName, setInputName] = useState("");
      const [toast, setToast] = useState(null);

      // クイズセッション状態
      const [studySession, setStudySession] = useState(null); 

      // トーストヘルパー
      const showToast = (message, type = "success") => {
        setToast({ message, type });
        setTimeout(() => setToast(null), 3000);
      };

      // Lucide アイコン自動ロード
      useEffect(() => {
        if (window.lucide) {
          window.lucide.createIcons();
        }
      });

      // 共有リンク処理（他のデバイスで開いたときなど、URLパラメータに ?user=xxx があれば自動設定の誘導を行う）
      useEffect(() => {
        const params = new URLSearchParams(window.location.search);
        const sharedUser = params.get("user");
        if (sharedUser && sharedUser !== username) {
          setInputName(sharedUser);
          setShowUserModal(true);
          showToast(`共有リンクから「${sharedUser}」を読み込むには確定を押してください。`, "info");
        }
      }, []);

      // --- FIREBASE AUTH & FIRESTORE 同期フロー (RULE 1, 3 準拠) ---
      const initFirebaseSync = async (uName) => {
        if (!uName || uName === "ゲスト") {
          // ゲストモード：LocalStorage から復元
          const localData = localStorage.getItem(`opf_progress_guest`);
          if (localData) {
            setUserProgress(JSON.parse(localData));
          } else {
            setUserProgress({ completed: {}, bookmarks: {}, scores: [] });
          }
          setSyncStatus("Local Mode 💾");
          return;
        }

        setLoading(true);
        try {
          if (isFirebaseReady && auth && db) {
            setSyncStatus("Syncing...");
            
            // RULE 3: まず必ず認証を実行
            let user = auth.currentUser;
            if (!user) {
              if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                await auth.signInWithCustomToken(__initial_auth_token);
              } else {
                await auth.signInAnonymously();
              }
              user = auth.currentUser;
            }

            if (user) {
              // RULE 1: 他デバイスと同期可能な public 指定パスを厳格に使用
              const documentId = uName.toLowerCase().trim();
              const docRef = db.collection('artifacts')
                               .doc(appId)
                               .collection('public')
                               .doc('data')
                               .collection('userProgress')
                               .doc(documentId);
              
              const docSnap = await docRef.get();
              
              if (docSnap.exists) {
                const data = docSnap.data();
                setUserProgress({
                  completed: data.completed || {},
                  bookmarks: data.bookmarks || {},
                  scores: data.scores || []
                });
                showToast(`クラウド同期完了！「${uName}」の進捗を同期しました。`, "success");
              } else {
                // 初めての登録ユーザー：現在のローカルにデータがあれば、それをクラウドに引き継いで初期化
                const initialData = {
                  username: uName,
                  completed: userProgress.completed || {},
                  bookmarks: userProgress.bookmarks || {},
                  scores: userProgress.scores || [],
                  updatedAt: firebase.firestore.FieldValue.serverTimestamp()
                };
                await docRef.set(initialData);
                showToast(`新規ユーザー「${uName}」をクラウドに登録しました！`, "success");
              }
              setSyncStatus("Cloud Synced ☁️");
              setLoading(false);
              return;
            }
          }
        } catch (error) {
          console.warn("Firestore sync error, fallback to secure local storage", error);
        }

        // Firebaseが使用不可能な場合の、ローカルストレージを用いた複数ユーザー復元切り替え
        const localData = localStorage.getItem(`opf_progress_${uName}`);
        if (localData) {
          setUserProgress(JSON.parse(localData));
          showToast(`ローカルデータから「${uName}」の続きをロードしました。`, "success");
        } else {
          setUserProgress({ completed: {}, bookmarks: {}, scores: [] });
          showToast(`「${uName}」として新しく開始します（ローカル保存）`, "success");
        }
        setSyncStatus("Local Save Mode 💾");
        setLoading(false);
      };

      // ユーザー名が変わった時に同期をトリガー
      useEffect(() => {
        initFirebaseSync(username);
      }, [username]);

      // クラウドまたはローカルへの進捗保存処理
      const saveProgress = async (updatedProgress) => {
        if (!username) return;
        try {
          if (isFirebaseReady && db && auth && auth.currentUser && username !== "ゲスト") {
            const documentId = username.toLowerCase().trim();
            const docRef = db.collection('artifacts')
                             .doc(appId)
                             .collection('public')
                             .doc('data')
                             .collection('userProgress')
                             .doc(documentId);
            
            await docRef.set({
              username: username,
              completed: updatedProgress.completed || {},
              bookmarks: updatedProgress.bookmarks || {},
              scores: updatedProgress.scores || [],
              updatedAt: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
            
            setSyncStatus("Cloud Saved ☁️");
          } else {
            const key = username === "ゲスト" ? "opf_progress_guest" : `opf_progress_${username}`;
            localStorage.setItem(key, JSON.stringify(updatedProgress));
            setSyncStatus("Local Saved 💾");
          }
        } catch (error) {
          console.error("Autosave error:", error);
          setSyncStatus("Local Autosaved 💾");
        }
      };

      // ユーザー切り替え・ログイン確定処理
      const handleLogin = (e) => {
        if (e) e.preventDefault();
        const trimmed = inputName.trim();
        if (!trimmed) {
          showToast("ユーザー名を入力してください。", "error");
          return;
        }
        localStorage.setItem("opf_user", trimmed);
        setUsername(trimmed);
        setIsLoggedIn(trimmed !== "ゲスト");
        setShowUserModal(false);
        showToast(`ユーザー「${trimmed}」としてログイン・同期を開始しました！`, "success");
      };

      // ログアウト（ゲストモードへの切り替え）
      const handleLogout = () => {
        localStorage.removeItem("opf_user");
        setUsername("ゲスト");
        setIsLoggedIn(false);
        setUserProgress({ completed: {}, bookmarks: {}, scores: [] });
        setActiveTab("dashboard");
        showToast("ゲストモード（ローカル保存のみ）に切り替えました。", "info");
      };

      // 収録しているすべての問題を平坦化配列にする
      const allQuestionsList = useMemo(() => {
        const list = [];
        Object.keys(CATEGORIES).forEach(catId => {
          Object.keys(CATEGORIES[catId].subcategories).forEach(subId => {
            CATEGORIES[catId].subcategories[subId].questions.forEach(q => {
              list.push({
                ...q,
                categoryId: catId,
                categoryTitle: CATEGORIES[catId].title,
                subcategoryId: subId,
                subcategoryTitle: CATEGORIES[catId].subcategories[subId].title
              });
            });
          });
        });
        return list;
      }, []);

      // 各種統計データ算出
      const stats = useMemo(() => {
        const total = allQuestionsList.length;
        const solvedCorrect = Object.keys(userProgress.completed).filter(id => userProgress.completed[id]).length;
        const bookmarkedCount = Object.keys(userProgress.bookmarks).filter(id => userProgress.bookmarks[id]).length;
        
        const categoryProgress = {};
        Object.keys(CATEGORIES).forEach(catId => {
          let catTotal = 0;
          let catSolved = 0;
          Object.keys(CATEGORIES[catId].subcategories).forEach(subId => {
            CATEGORIES[catId].subcategories[subId].questions.forEach(q => {
              catTotal++;
              if (userProgress.completed[q.id]) catSolved++;
            });
          });
          categoryProgress[catId] = {
            total: catTotal,
            solved: catSolved,
            percentage: catTotal ? Math.round((catSolved / catTotal) * 100) : 0
          };
        });

        return {
          total,
          solvedCorrect,
          bookmarkedCount,
          percentage: total ? Math.round((solvedCorrect / total) * 100) : 0,
          categoryProgress
        };
      }, [allQuestionsList, userProgress]);

      // 共有リンクコピー
      const handleCopyShareLink = () => {
        const shareUrl = `${window.location.origin}${window.location.pathname}?user=${encodeURIComponent(username)}`;
        const textArea = document.createElement("textarea");
        textArea.value = shareUrl;
        document.body.appendChild(textArea);
        textArea.focus();
        textArea.select();
        try {
          document.execCommand('copy');
          showToast("このユーザー名で直接再開できる同期リンクをコピーしました！", "success");
        } catch (err) {
          showToast("リンクのコピーに失敗しました。手動でコピーしてください。", "error");
        }
        document.body.removeChild(textArea);
        setShowShareModal(false);
      };

      // クイズセッション開始 (ブロック設計) - 全て練習モード
      const startStudy = (questions, sessionTitle) => {
        if (!questions || !questions.length) {
          showToast("対象となる問題が1件もありません。", "error");
          return;
        }

        // 他のデバイスから復元した過去の履歴がある場合は、まだ「未正解」の問題が始まるように初期位置を設定する
        let initialIndex = 0;
        for (let i = 0; i < questions.length; i++) {
          if (userProgress.completed[questions[i].id] === undefined) {
            initialIndex = i;
            break;
          }
        }

        // 10問単位のブロック区切りのための開始点
        const blockStart = Math.floor(initialIndex / 10) * 10;

        setStudySession({
          mode: "practice",
          questions: questions,
          title: sessionTitle,
          currentIndex: initialIndex,
          blockStartIndex: blockStart, 
          blockAnswers: {}, 
          blockCompleted: false,
          totalFinished: false,
          overallAnswers: { ...userProgress.completed } 
        });
        setActiveTab("study");
      };

      // 10問ブロックの進捗を判定
      const currentBlockIndex = studySession ? Math.floor(studySession.currentIndex / 10) : 0;
      const blockQuestions = useMemo(() => {
        if (!studySession) return [];
        const start = studySession.blockStartIndex;
        return studySession.questions.slice(start, start + 10);
      }, [studySession, studySession?.blockStartIndex]);

      // 現在の質問が今のブロックの何番目か
      const relativeIndex = studySession ? studySession.currentIndex - studySession.blockStartIndex : 0;

      // 問題への回答処理
      const handleAnswerQuestion = (qId, isCorrectAnswer, selectedOption) => {
        if (!studySession) return;

        // 今回の10問中の回答状況に記録
        const newBlockAnswers = { ...studySession.blockAnswers, [qId]: { isCorrect: isCorrectAnswer, ans: selectedOption } };
        const newOverallAnswers = { ...studySession.overallAnswers, [qId]: isCorrectAnswer };

        // ユーザー全体の進捗にマージしてクラウド/ローカルに自動セーブ ( RULE 1 での続きから復元の核 )
        const newCompleted = { ...userProgress.completed, [qId]: isCorrectAnswer };
        const updated = { ...userProgress, completed: newCompleted };
        setUserProgress(updated);
        saveProgress(updated); // リアルタイム保存

        // 10問解き終わったか、または全体の最終問題まで解き終わったかを判定
        const isBlockEnd = (relativeIndex === blockQuestions.length - 1) || (studySession.currentIndex === studySession.questions.length - 1);

        setStudySession({
          ...studySession,
          blockAnswers: newBlockAnswers,
          overallAnswers: newOverallAnswers,
          blockCompleted: isBlockEnd ? true : false
        });
      };

      // ブックマークの切り替え
      const toggleBookmark = (qId) => {
        const isBookmarked = !!userProgress.bookmarks[qId];
        const newBookmarks = { ...userProgress.bookmarks, [qId]: !isBookmarked };
        const updated = { ...userProgress, bookmarks: newBookmarks };
        setUserProgress(updated);
        saveProgress(updated);
        showToast(!isBookmarked ? "付箋（ブックマーク）を登録しました！" : "付箋（ブックマーク）を解除しました。");
      };

      // 次の問題へ進む (ブロック中間は次の問題へ、ブロック終端はブロックリザルトへ)
      const nextQuestion = () => {
        if (!studySession) return;

        if (studySession.currentIndex < studySession.questions.length - 1) {
          setStudySession({
            ...studySession,
            currentIndex: studySession.currentIndex + 1
          });
        } else {
          // 全問題完了
          setStudySession({
            ...studySession,
            totalFinished: true
          });
        }
      };

      // 前の問題へ戻る
      const prevQuestion = () => {
        if (studySession.currentIndex > studySession.blockStartIndex) {
          setStudySession({
            ...studySession,
            currentIndex: studySession.currentIndex - 1
          });
        }
      };

      // 「次の10問に進む」の処理
      const handleNextBlock = () => {
        if (!studySession) return;
        const nextStart = studySession.blockStartIndex + 10;
        if (nextStart < studySession.questions.length) {
          setStudySession({
            ...studySession,
            blockStartIndex: nextStart,
            currentIndex: nextStart,
            blockAnswers: {},
            blockCompleted: false
          });
        } else {
          // 全問題終了
          setStudySession({
            ...studySession,
            totalFinished: true
          });
        }
      };

      // 「前の10問をもう一度解く」の処理 (ブロックの再チャレンジ)
      const handleRetryBlock = () => {
        if (!studySession) return;
        
        // ユーザー全体の完了状況から、今回の10問の記録をリセットしてやり直す
        const clearedCompleted = { ...userProgress.completed };
        blockQuestions.forEach(q => {
          delete clearedCompleted[q.id];
        });
        const updated = { ...userProgress, completed: clearedCompleted };
        setUserProgress(updated);
        saveProgress(updated);

        // セッションをブロック先頭に巻き戻す
        setStudySession({
          ...studySession,
          currentIndex: studySession.blockStartIndex,
          blockAnswers: {},
          blockCompleted: false
        });
        showToast("この10問をリセットしました。再挑戦しましょう！");
      };

      // 受験の最終完了を記録
      const handleCompleteAll = () => {
        if (!studySession) return;

        setStudySession(null);
        setActiveTab("dashboard");
        showToast("学習進捗をすべてクラウドに同期保存しました！");
      };

      return (
        <div className="flex flex-col min-h-screen">
          
          {/* HEADER HEADER */}
          <header className="bg-slate-950 text-white shadow-xl sticky top-0 z-40 border-b border-brand-900/30">
            <div className="max-w-7xl mx-auto px-4 py-3 sm:px-6 lg:px-8 flex justify-between items-center">
              
              <div className="flex items-center space-x-3 cursor-pointer select-none" onClick={() => { setStudySession(null); setActiveTab("dashboard"); }}>
                <div className="w-10 h-10 bg-brand-600 rounded-xl flex items-center justify-center shadow-lg shadow-brand-500/20">
                  <svg className="w-6 h-6 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
                  </svg>
                </div>
                <div>
                  <h1 className="text-sm sm:text-base font-bold tracking-tight flex items-center space-x-1.5">
                    <span>2026統一試験対策アプリ</span>
                    <span className="text-[10px] bg-brand-600 px-1.5 py-0.5 rounded text-white font-extrabold tracking-widest uppercase">OPF</span>
                  </h1>
                  <p className="text-[10px] text-slate-400">大塚製薬工場・クラウド同期版</p>
                </div>
              </div>

              <div className="flex items-center space-x-2">
                <div className="flex items-center space-x-1.5 text-xs bg-slate-900 border border-slate-800 px-3 py-2 rounded-xl">
                  <span className="relative flex h-2 w-2">
                    <span className={`animate-ping absolute inline-flex h-full w-full rounded-full opacity-75 ${username === "ゲスト" ? "bg-amber-400" : "bg-emerald-400"}`}></span>
                    <span className={`relative inline-flex rounded-full h-2 w-2 ${username === "ゲスト" ? "bg-amber-500" : "bg-emerald-500"}`}></span>
                  </span>
                  <span className="font-semibold text-slate-200 hidden sm:inline">{username} さん</span>
                  <span className="font-semibold text-slate-200 sm:hidden">{username.substring(0, 6)}</span>
                  <button 
                    onClick={() => {
                      setInputName(username === "ゲスト" ? "" : username);
                      setShowUserModal(true);
                    }} 
                    className="text-brand-400 hover:text-brand-300 font-bold transition ml-1.5 border-l border-slate-800 pl-2 text-xs"
                  >
                    設定・切替
                  </button>
                </div>
              </div>

            </div>
          </header>

          {/* SYNC STATUS BAR */}
          <div className="bg-slate-100 border-b border-slate-200 py-1 px-4 text-center text-[10px] font-bold text-slate-500 flex items-center justify-center space-x-2">
            <span>クラウド同期:</span>
            <span className={`px-2 py-0.5 rounded-full text-white text-[9px] ${syncStatus.includes("Cloud") ? "bg-emerald-600 animate-pulse" : "bg-slate-600"}`}>{syncStatus}</span>
            <span className="text-slate-400">|</span>
            <span>収録問題数: <strong className="text-slate-700">{allQuestionsList.length}問</strong></span>
          </div>

          {/* MAIN CONTAINER */}
          <main className="flex-1 max-w-5xl w-full mx-auto px-4 py-6 sm:px-6 lg:px-8">
            
            {loading && (
              <div className="fixed inset-0 bg-slate-900/40 backdrop-blur-sm flex items-center justify-center z-50">
                <div className="bg-white px-6 py-4 rounded-2xl shadow-xl flex items-center space-x-3 border border-slate-100">
                  <div className="animate-spin rounded-full h-5 w-5 border-2 border-brand-600 border-t-transparent"></div>
                  <span className="text-sm font-bold text-slate-700">データを同期中...</span>
                </div>
              </div>
            )}

            {activeTab === "dashboard" && renderDashboard()}
            {activeTab === "categories" && renderCategories()}
            {activeTab === "study" && renderStudySession()}
            {activeTab === "bookmarks" && renderBookmarks()}
          </main>

          {/* FOOTER TAB NAVIGATION */}
          <nav className="bg-white border-t border-slate-200 text-slate-600 sticky bottom-0 z-30 shadow-[0_-5px_15px_-5px_rgba(0,0,0,0.05)] select-none">
            <div className="max-w-md mx-auto flex justify-around py-2 px-4">
              <button 
                onClick={() => { setStudySession(null); setActiveTab("dashboard"); }} 
                className={`flex flex-col items-center justify-center p-2 rounded-xl transition-all ${activeTab === "dashboard" ? "text-brand-700 font-bold bg-brand-50" : "text-slate-500 hover:text-slate-800"}`}
              >
                <svg className="w-5 h-5 mb-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                  <path strokeLinecap="round" strokeLinejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
                </svg>
                <span className="text-[10px]">ホーム</span>
              </button>

              <button 
                onClick={() => { setStudySession(null); setActiveTab("categories"); }} 
                className={`flex flex-col items-center justify-center p-2 rounded-xl transition-all ${activeTab === "categories" ? "text-brand-700 font-bold bg-brand-50" : "text-slate-500 hover:text-slate-800"}`}
              >
                <svg className="w-5 h-5 mb-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                  <path strokeLinecap="round" strokeLinejoin="round" d="M4 6h16M4 10h16M4 14h16M4 18h16" />
                </svg>
                <span className="text-[10px]">全問題リスト</span>
              </button>

              <button 
                onClick={() => { setStudySession(null); setActiveTab("bookmarks"); }} 
                className={`flex flex-col items-center justify-center p-2 rounded-xl transition-all ${activeTab === "bookmarks" ? "text-brand-700 font-bold bg-brand-50" : "text-slate-500 hover:text-slate-800"}`}
              >
                <div className="relative">
                  <svg className="w-5 h-5 mb-0.5" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2">
                    <path strokeLinecap="round" strokeLinejoin="round" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z" />
                  </svg>
                  {stats.bookmarkedCount > 0 && (
                    <span className="absolute -top-1 -right-2 bg-rose-500 text-white text-[8px] font-bold px-1 rounded-full">{stats.bookmarkedCount}</span>
                  )}
                </div>
                <span className="text-[10px]">弱点付箋</span>
              </button>
            </div>
          </nav>

          {/* TOAST SYSTEM */}
          {toast && (
            <div className="fixed bottom-20 left-4 right-4 sm:left-auto sm:right-6 sm:max-w-sm z-50 animate-fade-in">
              <div className={`p-4 rounded-2xl shadow-xl flex items-center space-x-3 text-white border ${
                toast.type === "error" ? "bg-rose-600 border-rose-500" :
                toast.type === "info" ? "bg-slate-800 border-slate-700" :
                "bg-emerald-600 border-emerald-500"
              }`}>
                <div className="flex-1 text-xs font-bold">{toast.message}</div>
              </div>
            </div>
          )}

          {/* USER MODAL */}
          {showUserModal && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 px-4">
              <div className="bg-white rounded-3xl shadow-2xl max-w-md w-full overflow-hidden border border-slate-100 animate-fade-in">
                <div className="bg-gradient-to-r from-slate-900 to-brand-900 text-white p-6 relative">
                  <button onClick={() => setShowUserModal(false)} className="absolute top-4 right-4 text-slate-300 hover:text-white transition">
                    <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" /></svg>
                  </button>
                  <h3 className="text-lg font-bold">ユーザー情報の設定・登録</h3>
                  <p className="text-xs text-slate-300 mt-1">他のデバイスで同じユーザー名を入力すれば、進捗や履歴を完全に同期・復元できます。</p>
                </div>
                <div className="p-6 space-y-6">
                  <form onSubmit={handleLogin} className="space-y-4">
                    <div>
                      <label className="block text-xs font-bold text-slate-700 mb-1.5">ユーザー名 (半角英数字/日本語対応)</label>
                      <input 
                        type="text" required value={inputName} 
                        onChange={(e) => setInputName(e.target.value)} 
                        placeholder="例: taro-opf" 
                        className="w-full px-4 py-3 rounded-xl border border-slate-200 text-sm font-bold text-slate-800 focus:outline-none focus:ring-2 focus:ring-brand-500 transition"
                      />
                    </div>
                    <button type="submit" className="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-3 px-4 rounded-xl text-xs tracking-wider shadow-lg shadow-brand-600/10 transition">
                      ユーザーを確定・同期
                    </button>
                  </form>
                  <div className="border-t border-slate-100 pt-4 space-y-3">
                    {username !== "ゲスト" && (
                      <button onClick={() => { handleLogout(); setShowUserModal(false); }} className="w-full bg-slate-100 hover:bg-slate-200 text-rose-600 font-bold py-2.5 px-4 rounded-xl text-xs transition">
                        ログアウト (ゲストモードに切替)
                      </button>
                    )}
                  </div>
                </div>
              </div>
            </div>
          )}

          {/* SHARE MODAL */}
          {showShareModal && (
            <div className="fixed inset-0 bg-slate-900/60 backdrop-blur-sm flex items-center justify-center z-50 px-4">
              <div className="bg-white rounded-3xl shadow-2xl max-w-md w-full overflow-hidden border border-slate-100 animate-fade-in">
                <div className="bg-slate-950 text-white p-6 relative">
                  <button onClick={() => setShowShareModal(false)} className="absolute top-4 right-4 text-slate-300 hover:text-white">
                    <svg className="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M6 18L18 6M6 6l12 12" /></svg>
                  </button>
                  <h3 className="text-base font-bold">進捗同期・共有リンク</h3>
                </div>
                <div className="p-6 space-y-4">
                  <p className="text-xs text-slate-600 leading-relaxed">
                    現在のユーザー「<strong className="text-slate-900">{username}</strong>」の学習データを他のPCやスマートフォンで一発同期するための専用リンクです。
                  </p>
                  <div className="p-3 bg-slate-50 rounded-xl border border-slate-100 text-[10px] text-slate-500 font-bold break-all">
                    {`${window.location.origin}${window.location.pathname}?user=${encodeURIComponent(username)}`}
                  </div>
                  <button onClick={handleCopyShareLink} className="w-full bg-brand-600 hover:bg-brand-700 text-white font-bold py-3 rounded-xl text-xs transition shadow-lg shadow-brand-500/20">
                    リンクをコピーする
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );

      // --- SUB-RENDER 1: DASHBOARD ---
      function renderDashboard() {
        return (
          <div className="space-y-6">
            
            {/* TOP LANDING BANNER */}

                  <p className="text-xs text-slate-500">{studySession.title}</p>
                </div>

                <div className="p-6 bg-slate-50 rounded-2xl border border-slate-100 grid grid-cols-2 gap-4">
                  <div>
                    <span className="text-[10px] text-slate-400 block font-bold uppercase">総合正解数</span>
                    <strong className="text-3xl font-black text-brand-600">{totalCorrect} <span className="text-xs text-slate-400">/ {studySession.questions.length}問</span></strong>
                  </div>
                  <div>
                    <span className="text-[10px] text-slate-400 block font-bold uppercase">総合正答率</span>
                    <strong className="text-3xl font-black text-brand-600">{successRate}%</strong>
                  </div>
                </div>

                <button 
                  onClick={handleCompleteAll}
                  className="w-full bg-slate-900 hover:bg-slate-800 text-white font-bold py-3.5 rounded-xl text-xs transition shadow-lg"
                >
                  結果を記録してホームに戻る
                </button>

              </div>
            </div>
          );
        }

        return (
          <div className="max-w-2xl mx-auto space-y-4 animate-fade-in">
            
            {/* CURRENT BLOCK NAVIGATION STATUS */}
            <div className="bg-white rounded-2xl p-4 border border-slate-200 shadow-sm flex flex-col gap-2 font-bold text-slate-500">
              <div className="flex items-center justify-between text-xs">
                <div className="flex items-center space-x-2">
                  <span className="bg-slate-900 text-slate-200 px-2 py-0.5 rounded text-[9px] uppercase font-black">
                    第 {currentBlockIndex + 1} ブロック
                  </span>
                  <span>{studySession.title}</span>
                </div>
                <div className="flex items-center space-x-3 text-slate-400">
                  <span>全体: {studySession.currentIndex + 1} / {studySession.questions.length}問</span>
                </div>
              </div>

              {/* 10問ドットインジケータ */}
              <div className="flex justify-between items-center gap-1.5 pt-1.5 border-t border-slate-100">
                <span className="text-[9px] text-slate-400 uppercase shrink-0">この10問の進捗:</span>
                <div className="flex flex-1 items-center justify-end space-x-1.5">
                  {blockQuestions.map((q, idx) => {
                    const ans = studySession.blockAnswers[q.id];
                    const isSelected = ans !== undefined;
                    return (
                      <div 
                        key={q.id} 
                        className={`w-4 h-4 rounded-full flex items-center justify-center text-[8px] font-bold text-white border transition-all ${
                          idx === relativeIndex
                            ? "bg-slate-900 border-slate-950 scale-110 ring-2 ring-slate-200" 
                            : isSelected
                              ? ans.isCorrect
                                ? "bg-emerald-500 border-emerald-600"
                                : "bg-rose-500 border-rose-600"
                              : "bg-slate-100 border-slate-200 text-slate-400"
                        }`}
                      >
                        {idx + 1}
                      </div>
                    );
                  })}
                </div>
              </div>
            </div>

            {/* MAIN QUESTION CARD */}
            <div className="bg-white rounded-3xl p-6 sm:p-8 border border-slate-200 shadow-md space-y-6 relative">
              
              <div className="text-[10px] font-bold text-slate-400 flex justify-between items-center">
                <span className="bg-brand-50 text-brand-700 px-2 py-0.5 rounded">{currentQ.categoryTitle} ＞ {currentQ.subcategoryTitle}</span>
                <span className="text-slate-300 font-mono">ID: {currentQ.id}</span>
              </div>

              <p className="font-bold text-slate-900 text-sm sm:text-base leading-relaxed whitespace-pre-wrap">
                {currentQ.text}
              </p>

              {currentQ.type === "mc" ? (
                <div className="space-y-4">
                  {currentQ.statements && (
                    <div className="bg-slate-50 p-4 rounded-xl space-y-3 text-sm border border-slate-200 shadow-inner">
                      {currentQ.statements.map((st, i) => {
                        const m = st.match(/^([a-z])\.\s*(.*)/);
                        return (
                          <div key={i} className="flex items-start gap-2.5">
                            <span className="font-extrabold text-brand-600 bg-white border border-brand-200 w-5 h-5 flex items-center justify-center rounded shrink-0 shadow-sm">{m ? m[1] : i+1}</span>
                            <span className="text-slate-800 leading-relaxed font-medium">{m ? m[2] : st}</span>
                          </div>
                        )
                      })}
                    </div>
                  )}
                  <div className="grid grid-cols-1 gap-2.5 pt-2">
                    {currentQ.options.map((opt, i) => {
                      const isSelected = hasAnswered && userAnswer.ans === i;
                      const isCorrectOpt = i === currentQ.answer;
                      let btnClass = "bg-white border-slate-200 hover:border-brand-400 text-slate-700 hover:bg-slate-50 active:scale-[0.99]";
                      let badgeClass = "bg-slate-100 text-slate-500 border-slate-200";
                      
                      if (hasAnswered) {
                        if (isCorrectOpt) {
                          btnClass = "bg-emerald-50 border-emerald-500 text-emerald-800 font-bold ring-2 ring-emerald-500/20";
                          badgeClass = "bg-emerald-500 text-white border-emerald-600";
                        } else if (isSelected && !isCorrectOpt) {
                          btnClass = "bg-rose-50 border-rose-300 text-rose-800 font-bold";
                          badgeClass = "bg-rose-500 text-white border-rose-600";
                        } else {
                          btnClass = "bg-slate-50 border-slate-100 text-slate-400 opacity-50";
                        }
                      }

                      return (
                        <button
                          key={i}
                          onClick={() => {
                            if (hasAnswered) return;
                            handleAnswerQuestion(currentQ.id, isCorrectOpt, i);
                          }}
                          className={`p-3.5 rounded-xl border-2 flex items-center gap-4 transition-all text-left shadow-sm ${btnClass}`}
                        >
                          <span className={`w-8 h-8 rounded-full flex items-center justify-center text-xs font-black shrink-0 border ${badgeClass}`}>
                            {i + 1}
                          </span>
                          <span className="text-sm font-bold tracking-wide flex-1">{opt}</span>
                        </button>
                      );
                    })}
                  </div>
                </div>
              ) : (
                <div className="grid grid-cols-2 gap-4 pt-4">
                  
                  <button 
                    onClick={() => {
                      if (hasAnswered) return;
                      handleAnswerQuestion(currentQ.id, currentQ.answer === true, true);
                    }}
                    className={`p-5 rounded-2xl border-2 flex flex-col items-center justify-center transition-all ${
                      hasAnswered
                        ? currentQ.answer === true
                          ? "bg-emerald-50 border-emerald-500 text-emerald-800 font-extrabold"
                          : userAnswer.ans === true
                            ? "bg-rose-50 border-rose-300 text-rose-800 font-extrabold"
                            : "bg-slate-50 border-slate-100 text-slate-400 opacity-40"
                        : "bg-white border-slate-200 hover:border-slate-400 text-slate-800 hover:bg-slate-50 active:scale-95"
                    }`}
                  >
                    <span className="text-2xl sm:text-3xl mb-1">○</span>
                    <span className="text-xs font-bold">正しい (正)</span>
                  </button>

                  <button 
                    onClick={() => {
                      if (hasAnswered) return;
                      handleAnswerQuestion(currentQ.id, currentQ.answer === false, false);
                    }}
                    className={`p-5 rounded-2xl border-2 flex flex-col items-center justify-center transition-all ${
                      hasAnswered
                        ? currentQ.answer === false
                          ? "bg-emerald-50 border-emerald-500 text-emerald-800 font-extrabold"
                          : userAnswer.ans === false
                            ? "bg-rose-50 border-rose-300 text-rose-800 font-extrabold"
                            : "bg-slate-50 border-slate-100 text-slate-400 opacity-40"
                        : "bg-white border-slate-200 hover:border-slate-400 text-slate-800 hover:bg-slate-50 active:scale-95"
                    }`}
                  >
                    <span className="text-2xl sm:text-3xl mb-1">×</span>
                    <span className="text-xs font-bold">間違っている (誤)</span>
                  </button>

                </div>
              )}

              {/* PRACTICE INSTANT EXPLANATION VIEW */}
              {hasAnswered && (
                <div className="mt-6 p-4 rounded-2xl bg-slate-50 border border-slate-200 text-xs space-y-2 animate-fade-in">
                  <div className="flex items-center space-x-1.5 font-bold">
                    {userAnswer.isCorrect ? (
                      <span className="text-emerald-600 flex items-center">
                        <svg className="w-4 h-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                        正解です！
                      </span>
                    ) : (
                      <span className="text-rose-600 flex items-center">
                        <svg className="w-4 h-4 mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M10 14l2-2m0 0l2-2m-2 2l-2-2m2 2l2 2m7-2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                        不正解です
                      </span>
                    )}
                  </div>
                  <p className="font-bold text-slate-800">
                    解説: <span className="font-normal text-slate-700">{currentQ.explanation}</span>
                  </p>
                </div>
              )}

            </div>

            {/* CONTROLLER NAVIGATION BAR */}
            <div className="flex justify-between items-center text-xs">
              <button 
                onClick={prevQuestion} 
                disabled={studySession.currentIndex === studySession.blockStartIndex}
                className="bg-white border border-slate-200 px-4 py-2 rounded-xl hover:bg-slate-50 font-bold transition disabled:opacity-30 disabled:pointer-events-none text-slate-600 flex items-center space-x-1"
              >
                <span>前へ</span>
              </button>

              <button 
                onClick={() => toggleBookmark(currentQ.id)}
                className={`p-2.5 rounded-xl border flex items-center justify-center transition-all ${
                  isBookmarked ? "text-amber-500 bg-amber-50 border-amber-200" : "text-slate-400 bg-white border-slate-200 hover:text-slate-600"
                }`}
              >
                <svg className={`w-5 h-5 ${isBookmarked ? "fill-current" : ""}`} fill="none" viewBox="0 0 24 24" stroke="currentColor" strokeWidth="2"><path strokeLinecap="round" strokeLinejoin="round" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z" /></svg>
              </button>

              <button 
                onClick={nextQuestion} 
                disabled={!hasAnswered}
                className="bg-brand-600 hover:bg-brand-700 text-white px-5 py-2 rounded-xl font-bold transition disabled:opacity-30 disabled:pointer-events-none flex items-center space-x-1"
              >
                <span>{studySession.currentIndex === studySession.questions.length - 1 ? "完了" : "次へ"}</span>
              </button>
            </div>

          </div>
        );
      }

      // --- SUB-RENDER 4: BOOKMARKS / STICKY NOTES ---
      function renderBookmarks() {
        const bks = allQuestionsList.filter(q => userProgress.bookmarks[q.id]);
        return (
          <div className="space-y-4">
            <div className="flex justify-between items-center border-b border-slate-200 pb-3">
              <h2 className="text-base font-extrabold text-slate-900">弱点付箋マーク一覧 ({bks.length}問)</h2>
              <span className="text-xs text-slate-500">付箋マークした問題のみに絞って10問ずつ練習できます。</span>
            </div>

            {bks.length === 0 ? (
              <div className="bg-white rounded-2xl p-8 border border-slate-200 text-center text-slate-400 font-bold space-y-2">
                <div className="text-4xl">📎</div>
                <p className="text-xs">付箋(ブックマーク)が登録されている問題はありません。</p>
              </div>
            ) : (
              <div className="space-y-3">
                <button 
                  onClick={() => startStudy(bks, "付箋・弱点総復習特訓")}
                  className="w-full bg-brand-600 hover:bg-brand-700 text-white font-extrabold text-xs py-3 rounded-xl text-center shadow-lg shadow-brand-500/15 transition-all"
                >
                  この付箋問題リストで学習を開始する
                </button>
                
                {bks.map(q => (
                  <div key={q.id} className="bg-white p-4 rounded-xl border border-slate-200 text-xs space-y-2 relative shadow-sm">
                    <div className="flex justify-between text-[10px] text-slate-400 font-semibold">
                      <span>{q.categoryTitle} ＞ {q.subcategoryTitle}</span>
                      <button onClick={() => toggleBookmark(q.id)} className="text-amber-500 hover:text-slate-400 transition">
                        <svg className="w-4 h-4 fill-current" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M5 5a2 2 0 012-2h10a2 2 0 012 2v16l-7-3.5L5 21V5z" /></svg>
                      </button>
                    </div>
                    <p className="font-bold text-slate-800 leading-relaxed pr-6">{q.text}</p>
                    <div className="p-2.5 bg-slate-50 rounded-lg text-[11px] text-slate-600">
                      <span className="font-extrabold text-brand-700">【解説】</span> {q.explanation}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>
        );
      }
    }

    // Reactアプリの初期マウント
    window.onload = function () {
      const container = document.getElementById('root');
      const root = ReactDOM.createRoot(container);
      root.render(<App />);
    };
  </script>
</body>
</html>
