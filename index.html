              { id: "lg26_1", type: "tf", text: "病院の院長から新館に引越しをするので手伝いをしてくれないかとの依頼を受け、前担当者と2名で参加した。", answer: false, explanation: "過大な労務の提供に該当するため、現担当MRのみで対応するべき。" },
              { id: "lg26_2", type: "tf", text: "病院から医療安全の職員研修を依頼されたので、毎年継続して組織的に講師を派遣することにした。", answer: false, explanation: "過大な労務その他の役務に該当する。" },
              { id: "lg26_3", type: "tf", text: "大学病院の勉強会にネームバリューのある教授を講師として招聘し、自社製品に関連しているので、その講演料と旅費を当社が負担した。", answer: false, explanation: "実質的に医療機関への金銭提供になるため負担できない。" },
              { id: "lg26_4", type: "tf", text: "災害のため、担当先の医療機関等で散乱物の後片付け等、支援活動を行った。", answer: true, explanation: "ただし個人判断は禁止。支店長・本社に確認すること。" },
              { id: "lg26_5", type: "tf", text: "研究会等の組織が、会則の中で「事務局をメーカー内に置く」と定めており、会則にのっとり支援を行った。", answer: false, explanation: "メーカーが事務局業務を行うべきではなく、不当な景品類の提供にあたるおそれがある。" },
              { id: "lg26_6", type: "tf", text: "大学病院同好会は、医療機関等および医療担当者等とは別個の団体と認められる。", answer: false, explanation: "医療担当者個人の趣味等で組織した同好会は団体性が認められない。" },
              { id: "lg26_7", type: "tf", text: "地震の被害にあわれた民間病院の先生に、災害見舞金を持参した。", answer: false, explanation: "民間であっても金品の提供は禁止。" },
              { id: "lg26_8", type: "tf", text: "団体性の判断基準の1つとして、独立会計を行っていること(会費を徴収し経理を独立させる等)が含まれる。", answer: true, explanation: "" },
              { id: "lg26_9", type: "tf", text: "医療機関から、一般人を対象に健康相談等を企画する「健康まつり」への寄附要請があり、寄附をした。", answer: false, explanation: "通常の業務の範囲を超えているとは認められず寄附できない。" },
              { id: "lg26_10", type: "tf", text: "病院が小児がん患者を対象としたサマーキャンプを行う企画に対し、金銭的援助をした。", answer: false, explanation: "受診勧誘等につながり、医療機関等に対する金銭提供と実質的に同じになるため不可。" },
              { id: "lg26_11", type: "tf", text: "病院から、職員名簿または院内機関誌のどちらかの広告掲載依頼があり、どちらも対応した。", answer: false, explanation: "主として施設内対象の媒体は不当な景品類の提供にあたる。" },
              { id: "lg26_12", type: "tf", text: "薬剤師会報へ、媒体作成諸費用(印刷費・郵送料)の範囲内である広告収入を満たす金額で広告掲載の申込みをした。", answer: true, explanation: "" },
              { id: "lg26_13", type: "tf", text: "病院の納涼祭(盆踊り等)で、地域住民等に配布するパンフレットへの広告依頼に応じた。", answer: false, explanation: "遊び・サービス等が中心のお祭りは広告媒体としてふさわしくない。" },
              { id: "lg26_14", type: "tf", text: "広告募集案内(趣意書)で確認するべき項目のうち、スペース毎の料金・募集数、発行部数、作成諸費用明細は特に重要である。", answer: true, explanation: "" },
              { id: "lg26_15", type: "tf", text: "お世話になっている民間病院の先生に、海外の結婚式のお土産を買ってきてお渡しした。", answer: false, explanation: "医療担当者個人・医療施設への物品の提供は不可。" },
              { id: "lg26_16", type: "tf", text: "新年会兼院長誕生日会に、実費相当額の参加費を支払い出席した。", answer: false, explanation: "誕生日会等は社会的儀礼に該当せず、参加費が同額でも不可。" },
              { id: "lg26_17", type: "tf", text: "災害のお見舞いに、水や食料品等の援助物資を提供した。(災害後2ヵ月程度の期間内)。", answer: true, explanation: "" },
              { id: "lg26_18", type: "tf", text: "お世話になっている民間病院の院長のお父さま(前院長)が亡くなられ、通夜に参列し香典を持参した。", answer: false, explanation: "香典等の物品の提供は不可。" },
              { id: "lg26_19", type: "tf", text: "講演会等の役割者への慰労会を、講演会当日実施できなかったため、翌日改めて実施した。", answer: false, explanation: "当日以外の慰労目的の飲食提供は不可。" },
              { id: "lg26_20", type: "tf", text: "講演会後の役割者慰労会の2万円金額基準に、消費税とサービス料は含まれない。", answer: false, explanation: "消費税は含まないが、サービス料は含まれる。" },
              { id: "lg26_21", type: "tf", text: "役割者慰労会で、一人あたりの金額が2万円を超えたので私費で支払った。", answer: false, explanation: "私費であっても設定金額を超えれば規約違反。" },
              { id: "lg26_22", type: "tf", text: "シリンジを安全に使用してもらうためのシールを、MR自身の判断で会社にて作成し、医療機関に提供した。", answer: false, explanation: "MR自身の判断で提供してはいけない。会社全体で判断する必要がある。" },
              { id: "lg26_23", type: "tf", text: "抗がん剤の調製用に遮光カバーを依頼され、当社TPN製品が採用されているので提供した。", answer: false, explanation: "TPN製品の専用品としてのみ提供でき、他製品に使用するための理由では不可。" },
              { id: "lg26_24", type: "tf", text: "静脈留置針を固定するテープの提供を依頼され、末梢静脈用輸液使用に必要な物品と判断し経費で購入し提供した。", answer: false, explanation: "本来医療機関等が自ら備えるべき物品であり、提供不可。" },
              { id: "lg26_25", type: "tf", text: "少額・適正な物品の単価は、市価で5千円程度までを目安とする。", answer: false, explanation: "市価で3千円程度までを目安とする。" },
              { id: "lg26_26", type: "tf", text: "病態に合わせて適正に使用していただくため、本社企画として関連する病態の医学図書(定価1万円)を提供した。", answer: true, explanation: "" },
              { id: "lg26_27", type: "tf", text: "医師から当社医薬品が記載されている医学図書(3千円)を1冊提供してほしいと依頼され、謹呈本として提供した。", answer: false, explanation: "特定の図書を指定されており、単なる費用負担となるため不可。" },
              { id: "lg26_28", type: "tf", text: "オーエスワンゼリーのサンプリングのため、医療担当者に訪問毎に試供品シールを貼って提供した。", answer: false, explanation: "反復提供はできず、支店等で試供品シールを貼ることも不可。" },
              { id: "lg26_29", type: "tf", text: "公民館で試用医薬品の展示をする場合は、現地の薬務課等に問い合わせをしてルール等を確認した方が良い。", answer: true, explanation: "" },
              { id: "lg26_30", type: "tf", text: "ホテル等での展示にあたっては、医療用医薬品・医療機器・化粧品・食品は区別して展示する。", answer: true, explanation: "" },
              { id: "lg26_31", type: "tf", text: "臨床試用医薬品の提供依頼があり、卸売業者経由で届けてもらった。", answer: false, explanation: "卸売業者を経由する提供は認められない。" },
              { id: "lg26_32", type: "tf", text: "クリニックの医師から、門前調剤薬局に臨床試用医薬品を持参しておくよう依頼があり、持参した。", answer: false, explanation: "必ず対象クリニックで試用されなければならず、調剤薬局への提供は不可。" },
              { id: "lg26_33", type: "tf", text: "臨床試用医薬品の試用中または仮採用中の病院に対して、症例報告を依頼した。", answer: false, explanation: "採用先でないと依頼できない。厚労省からの指示がある全症例調査は例外。" },
              { id: "lg26_34", type: "tf", text: "特定使用成績調査の会合に、未採用医療機関の医療担当者の出席を要請した。", answer: false, explanation: "採用を目的とした行為と誤解されるおそれがあるため要請できない。" },
              { id: "lg26_35", type: "tf", text: "特定使用成績調査の実施要綱等の説明を行う会合を開催し、会合出席者全員に謝礼を支払った。", answer: false, explanation: "謝礼は受委託契約に基づき医療機関に支払われるため、別途支払うことは不可。" },
              { id: "lg26_36", type: "tf", text: "担当病院で臨床試験が実施されるため、研究員と一緒に医療担当者と面談をした。", answer: false, explanation: "MRは臨床研究等に関与できず、一緒に説明することはできない。" },
              { id: "lg26_37", type: "tf", text: "アンケート実施にあたって、タイトルには「アンケート」と表示し、実施責任者はMRの氏名を記載した。", answer: false, explanation: "実施責任者は部門長とすること。" },
              { id: "lg26_38", type: "tf", text: "アンケート実施にあたって、他社の誹謗・中傷にあたる表現は避けるべきである。", answer: true, explanation: "" },
              { id: "lg26_39", type: "tf", text: "「地域連携のテーマ(医療関連)」で共催講演会を行い、一般参加者には弁当等は提供せず、コーヒーを提供した。", answer: true, explanation: "" },
              { id: "lg26_40", type: "tf", text: "10施設の医師10名が出席し、全員でディスカッションする形式の会合を、自社医薬品の講演会として実施した。", answer: false, explanation: "聴講者がいない、又は演者と聴講者の区別ができないディスカッション形式は自社医薬品の講演会として不可。" },
              { id: "lg26_41", type: "tf", text: "製品概要の録画を映写し、これを自社医薬品テーマの講演会とみなして一般参加者に旅費負担し懇親会を実施した。", answer: false, explanation: "録画を映写するだけでは講演会の要件を満たさず、懇親会等も不可。" },
              { id: "lg26_42", type: "tf", text: "研究会と共催で自社医薬品関連テーマの講演会を開催し、その前後に行われる世話人会等への出席者に旅費を提供した。", answer: true, explanation: "" },
              { id: "lg26_43", type: "tf", text: "OPCが自社製品関連テーマとして準備していた講演会を代わりに実施し、一般参加者に対して弁当等を提供した。", answer: false, explanation: "OPFにとっては自社医薬品に関連しないテーマとなるため、弁当等は提供不可。" },
              { id: "lg26_44", type: "tf", text: "医師会が会場・テーマ等を全て決めており懇親会も予定されている会合で、費用負担の依頼を受け共催で実施した。", answer: false, explanation: "事前に企画していないため、依頼に応じることはできない。" },
              { id: "lg26_45", type: "tf", text: "主催講演会において、特別講演演者であるみなし公務員の先生に随行し、移動中に弁当を提供した。", answer: false, explanation: "国家公務員等への随行は禁止。" },
              { id: "lg26_46", type: "tf", text: "世話人会等の議事録記載にあたっては、代表世話人や当番世話人の発言を箇条書きにすればよい。", answer: false, explanation: "発言した参加者全員分のコメントや発言要旨を記載する必要がある。" },
              { id: "lg26_47", type: "tf", text: "病院職員対象のIT関連勉強会において、当社ICT担当者も演者の依頼を快諾し実施した。", answer: false, explanation: "本来病院が職員のために行うべき勉強会であり、不当な景品類の提供にあたる。" },
              { id: "lg26_48", type: "tf", text: "院内の親睦行事への参加を要請される場合、参加費が実費相当等であることなど4点の留意点をお願いしている。", answer: true, explanation: "" },
              { id: "lg26_49", type: "tf", text: "新年会で参加者全員に3千円程度の物品を持ってくるよう依頼があったので、持参し参加した。", answer: true, explanation: "" },
              { id: "lg26_50", type: "tf", text: "事業企画申請の記載項目に「テーマ」が追加されたのは、「自社製品関連」か「非自社製品関連」か意識してもらうためである。", answer: true, explanation: "" },
              { id: "lg26_51", type: "tf", text: "担当施設の医師が他支店実施の講演会で講演した。講師謝礼を支払請求する際、他支店実施であるため事業企画申請Noを記載しなかった。", answer: false, explanation: "事業企画申請Noの記載は必須。" },
              { id: "lg26_52", type: "tf", text: "事業企画申請承認後、Web予定だった役割者が会場でリアル参加となり旅費が追加になったが、そのまま実施した。", answer: false, explanation: "速やかに取戻申請し、旅費を追加すること。" },
              { id: "lg26_53", type: "tf", text: "主催講演会で、一般演題演者を支店学術部員に実施してもらうことになり、費用はかからないが役割者登録をした。", answer: true, explanation: "" },
              { id: "lg26_54", type: "tf", text: "事業企画申請作成中に、イントラマート画面で招聘状等書類をプレビュー画面で事前確認できる。", answer: true, explanation: "" },
              { id: "lg26_55", type: "tf", text: "事業企画申請の個人情報管理責任者は、MRを選任して記載した。", answer: false, explanation: "リーダー又は支店長が担うこと。" },
              { id: "lg26_56", type: "tf", text: "アクトリーンとリリアムシリーズのトレーニング実施の場合は、事業企画申請は不要である。", answer: false, explanation: "アクトリーン等でもトレーニングの事業企画申請は必ず必要。" },
              { id: "lg26_57", type: "tf", text: "全国学会でタムガイドをメインで展示し他製品も展示する予定だが、展示事前申請ではメインのタムガイドのみ記載した。", answer: false, explanation: "実際に展示する全製品の製品名を記載すること。" },
              { id: "lg26_58", type: "tf", text: "病院職員にとって、MR等製薬企業の社員は利害関係者に該当する。", answer: true, explanation: "" },
              { id: "lg26_59", type: "tf", text: "病院職員にとって、病院で受診する患者は利害関係者に該当する。", answer: false, explanation: "患者は倫理規程上の利害関係者ではない。" },
              { id: "lg26_60", type: "tf", text: "自社製品に関する講演会に講師として出席した病院医師(みなし公務員)が、終了後、多数が出席する懇親パーティーに出席した。", answer: true, explanation: "" },
              { id: "lg26_61", type: "tf", text: "国立病院機構の病院職員はみなし公務員であり、贈収賄罪は公務員と同じように適用される。", answer: true, explanation: "" },
              { id: "lg26_62", type: "tf", text: "主催の講演会において、みなし公務員(国立大学法人)の先生に、特別講演演者を依頼した。", answer: true, explanation: "" },
              { id: "lg26_63", type: "tf", text: "国立病院機構の先生に、社内研修会の講師を依頼し、役職が部長なので謝礼として3万円を支払った。", answer: false, explanation: "営利企業の社員だけへの社内研修会での講師依頼は不可。" },
              { id: "lg26_64", type: "tf", text: "JCHOの先生に、交通費としてタクシーチケットを提供した。", answer: false, explanation: "JCHOや国立病院機構ではタクシーチケット利用を禁止している。" }
            ]
          },
          pms: {
            id: "pms2026", title: "基礎：2026年PMS", type: "bas",
            questions: [
              { id: "pm26_1", type: "tf", text: "医薬品医療機器等法第1条には、「品質、有効性及び安全性確保並びにこれらの使用による保健衛生上の危害の発生及び拡大防止のために必要な規制を行う」と薬害防止の理念が明記されている。", answer: true, explanation: "" },
              { id: "pm26_2", type: "tf", text: "医薬品医療機器等法第1条の2〜6には、国や医薬関係者、医薬品等関連事業者等の責務が規定されており、国民にも役割がある。", answer: true, explanation: "" },
              { id: "pm26_3", type: "tf", text: "製造販売後安全管理の方法が厚生労働省令で定める基準に適合しないときは、製造販売業の許可を与えないことができるとされている。", answer: true, explanation: "" },
              { id: "pm26_4", type: "tf", text: "医薬品医療機器等法第17条に、医薬品等総括製造販売責任者等の設置について規定されている。", answer: true, explanation: "" },
              { id: "pm26_5", type: "tf", text: "製造販売業三役とは、総括製造販売責任者、安全管理責任者、品質保証責任者をいう。", answer: true, explanation: "" },
              { id: "pm26_6", type: "tf", text: "スモン事件は市販直後調査制度、ソリブジン事件は医薬品副作用被害救済制度、サリドマイド事件は副作用モニター制度と関連している。", answer: false, explanation: "スモン事件は医薬品副作用被害救済制度、ソリブジン事件は市販直後調査制度、サリドマイド事件は副作用モニター制度である。" },
              { id: "pm26_7", type: "tf", text: "スモン事件を契機として、承認審査制度の見直しが行われ、現在の新薬承認審査制度の基礎が作られた。", answer: false, explanation: "承認審査制度の見直しはサリドマイド事件が契機。スモン事件は被害救済制度の契機。" },
              { id: "pm26_8", type: "tf", text: "日本のPMSは、「再審査制度および安全性定期報告」、「再評価制度」および「副作用・感染症報告制度」の3つの制度で成り立っている。", answer: true, explanation: "" },
              { id: "pm26_9", type: "tf", text: "PMSの目的のひとつは、収集・評価・分析された情報を、適切に医療関係者に伝達することである。", answer: true, explanation: "" },
              { id: "pm26_10", type: "tf", text: "日本のPMSの3つの制度は、GVPとGQPの基準に基づいて実施されている。", answer: false, explanation: "GVPとGPSPの基準に基づいて実施されている。" },
              { id: "pm26_11", type: "tf", text: "日本のPMSは「再審査制度および安全性定期報告」、「市販直後調査制度」、「副作用・感染症報告制度」で成り立っている。", answer: false, explanation: "「再審査制度および安全性定期報告」、「再評価制度」、「副作用・感染症報告制度」である。" },
              { id: "pm26_12", type: "tf", text: "PMS は医薬品の製造販売後に行われる有効性、安全性の確保のための活動である。", answer: true, explanation: "" },
              { id: "pm26_13", type: "tf", text: "製造販売業者の遵守事項として、製造販売しようとする製品の製造販売後安全管理を適正に行うことが求められている。", answer: true, explanation: "" },
              { id: "pm26_14", type: "tf", text: "GVP 省令において、「医薬情報担当者」および「医療機器情報担当者」は法的に定義され、安全管理において重要な役割を担う。", answer: true, explanation: "" },
              { id: "pm26_15", type: "tf", text: "GVP 省令第4条では、「安全管理統括部門」を設置し、その責任者として「安全管理責任者」を置いて安全確保業務を行わせなければならないと規定されている。", answer: true, explanation: "" },
              { id: "pm26_16", type: "tf", text: "GVP 省令第5条では、第一種製造販売業者は製造販売後安全管理業務手順書を作成しなければならないと規定されている。", answer: true, explanation: "" },
              { id: "pm26_17", type: "tf", text: "GVPおよびGQPは許可要件であり、PMDAにより適合性調査が行われる。", answer: false, explanation: "都道府県により適合性調査が行われる。" },
              { id: "pm26_18", type: "tf", text: "製造販売後安全管理業務手順書は、安全確保業務を行うその他の事務所(支店・営業所など)にも写しを備え付けることが義務づけられている。", answer: true, explanation: "" },
              { id: "pm26_19", type: "tf", text: "GVP省令第10条には、新医薬品の販売開始後の6か月間に行われる市販直後調査について定められている。", answer: true, explanation: "" },
              { id: "pm26_20", type: "tf", text: "GVP 省令第12条には、第一種製造販売業者は教育訓練計画を作成させ、保存させなければならないと規定されている。", answer: true, explanation: "" },
              { id: "pm26_21", type: "tf", text: "副作用・感染症報告制度を構成する5つの制度には、「企業報告制度」、「WHO国際医薬品モニタリング制度」、「患者からの医薬品副作用報告制度」等が含まれる。", answer: true, explanation: "" },
              { id: "pm26_22", type: "tf", text: "医療関係者は、副作用等の症例を知って危害の発生防止のため必要があると認めるときは厚生労働大臣に報告しなければならない。", answer: true, explanation: "" },
              { id: "pm26_23", type: "tf", text: "感染症定期報告制度は、生物由来製品に関する最新の文献等から得られる知見に基づいて評価を行い、厚生労働大臣に報告を行う制度である。", answer: true, explanation: "" },
              { id: "pm26_24", type: "tf", text: "WHO 国際医薬品モニタリング制度は、WHOと参加する各国との間で情報交換を行い、医薬品の安全確保に役立てる制度である。", answer: true, explanation: "" },
              { id: "pm26_25", type: "tf", text: "企業報告制度は、有効性及び安全性に関する事項を知ったときは厚生労働大臣に報告しなければならないとされている。", answer: true, explanation: "" },
              { id: "pm26_26", type: "tf", text: "企業報告制度で、感染症症例については、報告対象のすべての症例について 30 日以内に報告しなければならない。", answer: false, explanation: "15日以内に報告しなければならない。" },
              { id: "pm26_27", type: "tf", text: "患者からの医薬品副作用報告制度とは、副作用が疑われる症例の情報を患者またはその家族から直接収集する制度である。", answer: true, explanation: "" },
              { id: "pm26_28", type: "tf", text: "GPSPは、製造販売後調査等に関する業務が適正に実施され、再審査および再評価申請資料の信頼性を確保することを目的とする。", answer: true, explanation: "" },
              { id: "pm26_29", type: "tf", text: "再審査制度とは、1979年の薬事法改正により導入され、一定期間後に有効性および安全性の再確認を行う制度である。", answer: true, explanation: "" },
              { id: "pm26_30", type: "tf", text: "再審査の手順において、提出された資料が GPSP に適合するかどうかについての書面調査または実地調査が実施される。", answer: true, explanation: "" },
              { id: "pm26_31", type: "tf", text: "製造販売後調査等の種類には、使用成績調査、製造販売後データベース調査、製造販売後臨床試験があり、GPSPにおいて定義されている。", answer: true, explanation: "" },
              { id: "pm26_32", type: "tf", text: "使用成績調査とは、医療機関から収集した情報を用いて、副作用による疾病等の発現状況ならびに有効性・安全性の検出または確認のために行う調査である。", answer: true, explanation: "" },
              { id: "pm26_33", type: "tf", text: "一般使用成績調査とは、医薬品を使用する者の条件を定めることなく行う調査であり、使用成績比較調査に該当しないものをいう。", answer: true, explanation: "" },
              { id: "pm26_34", type: "tf", text: "特定使用成績調査とは、小児、高齢者など医薬品を使用する者の条件を定めて行う調査であり、使用成績比較調査に該当しないものをいう。", answer: true, explanation: "" },
              { id: "pm26_35", type: "tf", text: "使用成績比較調査とは、特定の医薬品を使用する者の情報と当該医薬品を使用しない者の情報とを比較することによって行う調査をいう。", answer: true, explanation: "" },
              { id: "pm26_36", type: "tf", text: "製造販売後データベース調査とは、医療情報データベースを用い、情報の検出または確認のために行う調査のことである。", answer: true, explanation: "" },
              { id: "pm26_37", type: "tf", text: "安全性定期報告は、指定日から2年間は半年ごと、それ以降は1年ごと、調査単位期間満了後から70日以内にPMDAに報告することとなっている。", answer: true, explanation: "" },
              { id: "pm26_38", type: "tf", text: "GPSP上に MRに関する具体的な規定はないが、MRは調査票の配布・回収など、重要な役割を担う。", answer: true, explanation: "" },
              { id: "pm26_39", type: "tf", text: "定期的ベネフィット・リスク評価報告(PBRER)は、各国の提携会社から情報を収集し、ベネフィット・リスクについて評価を行った結果をまとめた報告書である。", answer: true, explanation: "" },
              { id: "pm26_40", type: "tf", text: "医薬品等の製造販売業者等は、適正な使用のために必要な情報を収集・検討し、医薬関係者に対し提供するよう努めなければならない。", answer: true, explanation: "" },
              { id: "pm26_41", type: "tf", text: "情報伝達の手順は、OPF製造販売後安全管理業務手順書の「安全確保措置の実施に関する業務手順」に定められている。", answer: true, explanation: "" },
              { id: "pm26_42", type: "tf", text: "OPFでは、情報伝達内容の教育訓練をO-PLUS 放送等で実施した後、MR等が医療機関等へ情報伝達を開始する手順となっている。", answer: true, explanation: "" },
              { id: "pm26_43", type: "tf", text: "緊急安全性情報はイエローレターとも呼ばれ、緊急かつ重大な注意喚起等が必要な場合に製造販売業者が作成する。", answer: true, explanation: "" },
              { id: "pm26_44", type: "tf", text: "電子添文の使用上の注意等の改訂は、通知によるもののほか、製造販売業者等が自主的に改訂を決定する場合もある。", answer: true, explanation: "" },
              { id: "pm26_45", type: "tf", text: "RMPとは、医薬品の開発から市販後まで一貫したリスク管理をひとつの文書にまとめ、評価が行われるようにするものである。", answer: true, explanation: "" },
              { id: "pm26_46", type: "tf", text: "処方箋医薬品の製造販売業者は、医薬品リスク管理計画書を備え付けるとともに、その他の事務所にも写しを備え付けることが規定されている。", answer: true, explanation: "" },
              { id: "pm26_47", type: "tf", text: "安全性検討事項には、「重要な特定されたリスク」、「重要な潜在的リスク」、「重要な不足情報」の3つがある。", answer: true, explanation: "" },
              { id: "pm26_48", type: "tf", text: "「重要な特定されたリスク」とは、医薬品との関連性が十分な根拠に基づいて示されている有害な事象のうち、重要なものである。", answer: true, explanation: "" },
              { id: "pm26_49", type: "tf", text: "「重要な潜在的リスク」とは、医薬品との関連性が疑われる要因はあるが、臨床データ等からの確認が十分でない有害な事象のうち、重要なものである。", answer: true, explanation: "" },
              { id: "pm26_50", type: "tf", text: "「重要な不足情報」とは、RMPを策定した時点では十分な情報が得られておらず、安全性を予測する上で不足している情報のうち、重要なものである。", answer: true, explanation: "" },
              { id: "pm26_51", type: "tf", text: "「医薬品安全性監視計画」とは、リスクを最小に抑え、ベネフィット・リスクバランスを適切に維持するための活動の計画である。", answer: false, explanation: "リスク最小化計画の説明。「医薬品安全性監視計画」とは安全性検討事項を踏まえて実施する監視活動の計画である。" },
              { id: "pm26_52", type: "tf", text: "新たな安全性の懸念が判明したときは、速やかに安全性検討事項の内容を見直す。安全性検討事項を変更するときは、RMPの見直しも行う。", answer: true, explanation: "" },
              { id: "pm26_53", type: "tf", text: "MR はRMPの最新情報の提供を迅速かつ適切に行うことで、市販直後からの安全対策の強化に寄与することが求められている。", answer: true, explanation: "" },
              { id: "pm26_54", type: "tf", text: "医薬品の安全管理情報を入手したときは、情報入手後、原則1暦日以内に電子速報書システムに入力する。", answer: true, explanation: "" },
              { id: "pm26_55", type: "tf", text: "優先して入手すべき6項目は、「有害事象名」、「重篤性」、「本剤との因果関係」、「患者識別情報」、「使用薬剤名(自社製品名)」、「転帰」である。", answer: true, explanation: "" },
              { id: "pm26_56", type: "tf", text: "当該医薬品との因果関係が否定された場合は、その理由(例えば、病態の影響など)を確認することが必要である。", answer: true, explanation: "" },
              { id: "pm26_57", type: "tf", text: "安全管理部で収集対象としている医療機器は、「ビスコクリア」、「局所洗浄用ノズル」、「専用アダプタ」、「加圧バッグ」、「タムガイド光源装置」および「タムガイドファイバー」である。", answer: true, explanation: "" },
              { id: "pm26_58", type: "tf", text: "医療機器の安全管理情報には、「不具合情報」および「健康被害情報等」があり、健康被害情報は当該機器の「不具合」の有無とは関連しない。", answer: true, explanation: "" },
              { id: "pm26_59", type: "tf", text: "医療機器の「不具合」の種類には、仕様上の問題、不良品、故障、電子添文等の不十分な記載、機器による有害事象がある。", answer: true, explanation: "" },
              { id: "pm26_60", type: "tf", text: "医療機器により生じた健康被害情報等は、情報入手後、原則1暦日以内に電子速報書システムに入力する。", answer: false, explanation: "医療機器連絡票システムに入力する。" },
              { id: "pm26_61", type: "tf", text: "医療機器の調査最優先事項は、「不具合の状況」、「健康被害の事象名」、「重篤性」、「因果関係」、「患者情報」である。", answer: true, explanation: "" },
              { id: "pm26_62", type: "tf", text: "コンビネーション製品で苦情・要望を入手したら、情報入手後7暦日以内に苦情要望管理システムに登録し、医薬品部分による有害事象は電子速報書システムに1暦日以内に登録する。", answer: true, explanation: "" }
            ]
          }
        }
      },
      exam2025: {
        id: "exam2025", title: "大項目カテゴリー2（2025年統一試験問題）", icon: "FileSignature",
        subcategories: {
          ethics: {
            id: "exam_ethics", title: "基礎：倫理法規", type: "bas",
            questions: [
              { id: "e25_1", type: "mc", text: "販売情報提供活動ガイドラインに関する記述で、正しい組み合わせを選びなさい。", statements: ["a. 面談記録で顧客名不明時は職種名を選択し、性別等を直接入力する。本文入力は不要。","b. リリアムワン等は臨床試用医療機器と記載する。","c. 提供できる形状見本は1名あたり1〜2個。","d. デジプロQV不使用時はその旨を本文に記載する。"], options: ["a誤 b正 c誤 d正", "a正 b誤 c正 d誤", "a正 b誤 c誤 d正", "a正 b正 c正 d正", "a誤 b誤 c正 d誤"], answer: 2, explanation: "bは貸出機器。cは製剤見本のこと。" },
              { id: "e25_2", type: "mc", text: "販売情報提供活動ガイドラインに関する記述で、正しい組み合わせを選びなさい。", statements: ["a. スライドで有効性に偏らず安全性も含め、事実誤認を誘発しないか確認不十分な事例があった。","b. 製品紹介と一般啓発スライドの組み合わせは1〜2枚に留める。","c. マイシナリオはデジプロで自動保存されるが絶対に自分で削除してはならない等4項目の注意点がある。","d. 切り分けても一緒に紹介できないスライドに、カンジダ+ヒノーラ等3つがある。"], options: ["a正 b正 c正 d正", "a正 b誤 c正 d正", "a正 b正 c誤 d正", "a誤 b誤 c正 d誤", "a誤 b正 c誤 d正"], answer: 1, explanation: "bは枚数を問わず組み合わせ禁止。" },
              { id: "e25_3", type: "mc", text: "販売情報提供活動ガイドラインに関する記述で、正しい組み合わせを選びなさい。", statements: ["a. 他社製品との比較一覧表は全ての製品で情報提供可能である。","b. 比較情報は求めがない場合にも提供できる。","c. 適応外使用の情報は、準備が整っていればその場で提供可能である。","d. 情報提供可能な対象に介護福祉士も含まれる。"], options: ["a正 b誤 c誤 d誤", "a誤 b誤 c正 d正", "a誤 b誤 c誤 d誤", "a正 b正 c正 d正", "a誤 b正 c誤 d正"], answer: 2, explanation: "全て誤り。" },
              { id: "e25_4", type: "mc", text: "透明性ガイドラインに関する記述で、正しい組み合わせを選びなさい。", statements: ["a. 医療機器代理店との会食はE-1で公開する。","b. 学会広告は事前スマート申請をあげる。","c. 情報公開お願い文書の日付はスマート申請する日である。","d. 学会ランチョンセミナー演者の宿泊移動費はB-4で公開する。"], options: ["a正 b誤 c正 d誤", "a誤 b正 c誤 d誤", "a正 b正 c誤 d正", "a正 b正 c正 d正", "a誤 b正 c誤 d正"], answer: 1, explanation: "aは対象外。cはOPFが申し込む日。dはD-1。" },
              { id: "e25_5", type: "mc", text: "スライドレビューに関する記述で、正しい組み合わせを選びなさい。", statements: ["a. 栄養管理例で一般食品の経管記載をした。","b. 本人が関与した研究なのでCOI開示を省略した。","c. Googleマップの帰属表示が不明な場合はURLで代用できる。","d. スピーカーキットは毎回最新版を提供し、講演会後の削除を依頼する。"], options: ["a誤 b正 c誤 d正", "a正 b誤 c正 d誤", "a誤 b誤 c誤 d正", "a正 b正 c正 d正", "a誤 b正 c誤 d正"], answer: 2, explanation: "a, b, cは全て不可。dのみ正しい。" },
              { id: "e25_6", type: "mc", text: "便益・寄附・広告に関する記述で、正しい組み合わせを選びなさい。", statements: ["a. 学会受付で会費徴収業務を引き受けた。","b. 院長の送迎を10年以上行い指導を受けた事例を紹介した。","c. 病院HPで「参加自由」とある市民向け講演会に寄附対応した。","d. 作成費150万円、広告料収入130万円のプログラム抄録への広告に応じた。"], options: ["a正 b正 c正 d正", "a誤 b正 c誤 d正", "a正 b正 c誤 d正", "a誤 b誤 c正 d誤", "a誤 b正 c誤 d誤"], answer: 1, explanation: "aは不可。cはHPのみでは不可。dは作成費が上回るため可能。" },
              { id: "e25_7", type: "mc", text: "物品・情報・試用に関する記述で、正しい組み合わせを選びなさい。", statements: ["a. TPN未採用病院に遮光カバーを提供した。","b. 複数病院向けの自社Webinar生放送で弁当と交通費を提供した。","c. 卸経由で製剤見本を提供するため、個別の袋詰めに明記して依頼した。","d. 自社製品以外の輸液勉強会でケーキとコーヒーを提供した。"], options: ["a誤 b正 c正 d誤", "a正 b誤 c正 d誤", "a正 b正 c誤 d正", "a正 b正 c正 d正", "a誤 b正 c誤 d正"], answer: 0, explanation: "aは未採用施設不可。dは弁当・茶菓不可。" },
              { id: "e25_8", type: "mc", text: "儀礼・飲食・物品に関する記述で、正しい組み合わせを選びなさい。", statements: ["a. 外科部長の院長就任でお祝い金を持参した。","b. 慰労会の2万円基準にサービス料は含むが消費税は含まない。","c. 院内親睦行事への参加は4点の留意点を確認し出席した。","d. 医師から特定の医学図書の提供を依頼され謹呈した。"], options: ["a正 b正 c正 d正", "a正 b誤 c正 d正", "a誤 b正 c正 d誤", "a正 b正 c誤 d正", "a誤 b正 c誤 d正"], answer: 2, explanation: "aはお祝い金不可。dは特定図書指定不可。" },
              { id: "e25_9", type: "mc", text: "調査・アンケート・講演会に関する記述で、正しい組み合わせを選びなさい。", statements: ["a. 正式採用されていれば使用成績調査を依頼できる。","b. アンケート実施責任者に担当MR名を記載した。","c. 薬剤師会総会と同じ日に講演会を企画し、総会時間も含めて会場費を負担した。","d. 生涯教育認定講座の手数料を医会に代わり負担した。"], options: ["a正 b誤 c誤 d正", "a正 b誤 c正 d正", "a正 b正 c誤 d正", "a正 b正 c正 d正", "a誤 b正 c誤 d正"], answer: 0, explanation: "bは部門長とする。cは総会分は負担不可。" },
              { id: "e25_10", type: "mc", text: "O-PLUS・事業企画・公務員に関する記述で、正しい組み合わせを選びなさい。", statements: ["a. 講師謝礼支払期日は開催日より30日以内である。","b. 臨床試用医療機器の貸出期間は6か月以内である。","c. 経費がかからない講演会なので事業企画申請をしなかった。","d. 国立病院機構の医師が講演後、約150名の立食懇親会に出席した。"], options: ["a正 b正 c誤 d正", "a正 b正 c正 d正", "a正 b正 c正 d正", "a誤 b正 c誤 d正", "a正 b正 c正 d正"], answer: 3, explanation: "aは60日以内。cは経費有無に関わらず申請必須。" }
            ]
          },
          pms: {
            id: "exam_pms", title: "基礎：PMS", type: "bas",
            questions: [
              { id: "p25_1", type: "mc", text: "医薬品医療機器等法に関する記述で、正しい組み合わせを選びなさい。", statements: ["a. 第1条に品質・有効性・安全性確保と危害発生拡大防止が明記されている。","b. 関係者の責務が規定され、国民にも役割がある。","c. GVP及びGQP省令は製造販売業の許可要件である。","d. 第17条に総括製造販売責任者等の設置が規定されている。"], options: ["a誤 b正 c誤 d正", "a正 b誤 c正 d誤", "a正 b誤 c誤 d正", "a正 b正 c正 d正", "a誤 b誤 c正 d誤"], answer: 3, explanation: "すべて正しい。" },
              { id: "p25_2", type: "mc", text: "GVP省令、安全管理体制に関する記述で、正しい組み合わせを選びなさい。", statements: ["a. 手順を記載した安全管理業務手順書を作成しなければならない。","b. 製造販売業三役は、総括、安全管理、医薬品製造管理責任者をいう。","c. MRは「医薬情報担当者」として法的に定義されている。","d. 各支店・DI・臨床応用開発部等は安全管理実施部門である。"], options: ["a正 b誤 c正 d正", "a正 b正 c誤 d正", "a正 b正 c正 d誤", "a正 b正 c正 d正", "a誤 b正 c誤 d正"], answer: 0, explanation: "bの三役は総括、安全管理、品質保証責任者。" },
              { id: "p25_3", type: "mc", text: "安全管理情報の収集に関する記述で、正しい組み合わせを選びなさい。", statements: ["a. 情報入手後は原則1暦日以内にシステムに入力する。","b. 優先6項目は有害事象名、重篤性、因果関係、患者識別情報、発現日、転帰である。","c. 血管外漏出は「血管外漏出による発赤」など具体的な症状も入力する。","d. 医療機器の健康被害情報は原則1暦日以内に入力する。"], options: ["a正 b正 c正 d正", "a正 b誤 c正 d正", "a正 b正 c誤 d正", "a正 b正 c正 d誤", "a誤 b正 c誤 d正"], answer: 1, explanation: "bは「発現日」ではなく「自社製品名」。" },
              { id: "p25_4", type: "mc", text: "RMP(医薬品リスク管理計画)に関する記述で、正しい組み合わせを選びなさい。", statements: ["a. 安全性検討事項は特定されたリスク、潜在的リスク、不足情報の3つ。","b. 新たな懸念が判明したときは速やかに見直す。","c. 医薬品安全性監視計画には「通常」と「追加」がある。","d. リスク最小化計画には「通常」と「追加」がある。"], options: ["a正 b正 c正 d正", "a正 b誤 c正 d正", "a正 b正 c誤 d正", "a正 b正 c正 d誤", "a誤 b正 c誤 d正"], answer: 0, explanation: "すべて正しい。" },
              { id: "p25_5", type: "mc", text: "GPSPとガイドラインに関する記述で、正しい組み合わせを選びなさい。", statements: ["a. GPSPは再審査等の申請資料の信頼性確保を目的とする。","b. 一般使用成績調査は患者条件を定めずに行う。","c. データベース調査は医療情報DBを用いて行う。","d. MRは調査票の配布・回収などで重要な役割を担う。"], options: ["a正 b正 c正 d正", "a正 b正 c正 d誤", "a正 b誤 c正 d正", "a正 b正 c誤 d正", "a誤 b正 c誤 d正"], answer: 0, explanation: "すべて正しい。" },
              { id: "p25_6", type: "mc", text: "PMSの概要に関する記述で、正しい組み合わせを選びなさい。", statements: ["a. PMSは市販後の有効性・安全性確保の活動である。","b. 日本のPMSは再審査、再評価、副作用・感染症報告の3本柱。","c. 使用成績調査と市販直後調査はともにGPSPで規定される。","d. 情報を適切に医療関係者に伝達することが目的のひとつである。"], options: ["a誤 b正 c誤 d正", "a正 b誤 c誤 d正", "a正 b正 c誤 d正", "a正 b正 c正 d正", "a誤 b誤 c正 d誤"], answer: 2, explanation: "cの市販直後調査はGVPで規定。" },
              { id: "p25_7", type: "mc", text: "副作用・感染症報告制度に関する記述で、正しい組み合わせを選びなさい。", statements: ["a. 企業、感染症、安全性情報、WHO、患者からの5制度がある。","b. 企業報告制度は薬機法でPMDAへの報告が義務付けられている。","c. 医療関係者にも副作用報告の義務が薬機法で定められている。","d. 感染症定期報告制度は半年ごとに報告を行う。"], options: ["a正 b正 c正 d誤", "a正 b誤 c正 d正", "a正 b正 c誤 d正", "a正 b正 c正 d正", "a誤 b正 c誤 d正"], answer: 0, explanation: "dの報告頻度は半年ごとではない。" },
              { id: "p25_8", type: "mc", text: "再審査・安全性定期報告に関する記述で、正しい組み合わせを選びなさい。", statements: ["a. 再審査制度は1979年の薬事法改正で導入された。","b. 再審査期間中の調査はGVPを遵守して実施する。","c. PBRERはグローバルなベネフィット・リスク評価報告書である。","d. 安全性定期報告は指定日から2年間は半年ごと、以降は1年ごとに報告する。"], options: ["a誤 b誤 c正 d正", "a正 b誤 c正 d正", "a正 b正 c誤 d正", "a正 b正 c正 d正", "a誤 b正 c誤 d正"], answer: 1, explanation: "bはGVPではなくGPSPを遵守。" },
              { id: "p25_9", type: "mc", text: "医療機器に関する記述で、正しい組み合わせを選びなさい。", statements: ["a. OPFの安全管理情報収集対象は「タムガイド」のみである。","b. 安全管理情報には「健康被害情報等」と「不具合情報」がある。","c. 不具合には仕様上、不良品、故障、記載不十分、有害事象がある。","d. デバイス不具合は7日以内、有害事象が含まれれば1暦日以内に登録する。"], options: ["a正 b正 c正 d正", "a誤 b正 c正 d正", "a正 b誤 c正 d正", "a正 b正 c誤 d正", "a誤 b正 c誤 d正"], answer: 1, explanation: "aはタムガイド以外（ビスコクリア等）もある。" },
              { id: "p25_10", type: "mc", text: "情報伝達に関する記述で、正しい組み合わせを選びなさい。", statements: ["a. 薬機法で製造販売業者に情報収集・検討・提供の努力義務がある。","b. 教育訓練を受講していれば伝達開始日より先に伝達してよい。","c. 緊急安全性情報はブルーレターと呼ばれる。","d. 電子添文の改訂は企業が自主的に決定する場合もある。"], options: ["a正 b正 c正 d誤", "a正 b誤 c誤 d正", "a正 b正 c誤 d正", "a正 b正 c正 d正", "a誤 b正 c誤 d正"], answer: 1, explanation: "bは伝達期間の遵守が必要。cはイエローレター。" }
            ]
          },
          basic: {
            id: "exam_basic", title: "製品知識：Basic編", type: "sei",
            questions: [
              { id: "b25_1", type: "mc", text: "浸透圧の説明について、誤っているものを選びなさい。", options: ["水は浸透圧の低い方から高い方へ移動する","浸透圧を表す単位はmOsm/Lである。","ブドウ糖はイオン化する物質である。","体液の浸透圧の基準値は「約285mOsm/L」である。","イオン化しない物質の場合には、浸透圧とモル濃度は等しい"], answer: 2, explanation: "ブドウ糖はイオン化しない物質である。" },
              { id: "b25_2", type: "mc", text: "水電解質輸液とその説明で、誤っているものを選びなさい。", options: ["ビカネイト輸液:等張電解質輸液であり細胞外液全体を補充する","KN3号輸液:カリウムイオンを100mEq/L含む","KN1号輸液:1/2生食でありKを含まず血管確保に使用される","ボルベン輸液6%:血漿増量剤として循環血液量を増加させる","5%ブドウ糖液:等張液だが同量の水を投与したことになる"], answer: 1, explanation: "KN3号のK濃度は20mEq/Lである。" },
              { id: "b25_3", type: "mc", text: "飢餓時の異化の状態についての説明で、誤っているものを選びなさい。", options: ["肝臓のグリコーゲンは約1日で枯渇する","遊離脂肪酸は酸化によりエネルギーを産生する","絶食期間が長いとケトン体が蓄積しケトアシドーシスになる","アミノ酸がエネルギーとして消費されると9kcal/gの熱量を産生する","筋肉蛋白質がアミノ酸に分解される"], answer: 3, explanation: "アミノ酸の熱量は4kcal/gである。" },
              { id: "b25_4", type: "mc", text: "アミノ酸についての説明で、誤っているものを選びなさい。", options: ["蛋白質の分解が進むと創傷治癒遅延や免疫能低下を起こす","除脂肪体重(LBM)が80%以下になると窒素死と呼ばれる","アミノ酸がエネルギーとして消費されると4kcal/gの熱量を産生する","必須アミノ酸は不可欠アミノ酸とも呼ばれる","アミノ酸とペプチドは別経路で吸収される"], answer: 1, explanation: "LBMが70%以下で窒素死と呼ばれる。" },
              { id: "b25_5", type: "mc", text: "脂質についての説明で、誤っているものを選びなさい。", options: ["脂質投与の目的はエネルギー供給と必須脂肪酸の供給である","リノール酸、リノレン酸は必須脂肪酸である","必須脂肪酸の補給として脂肪5g/日程度を投与する","MCTは吸収・代謝が速い","MCTはミトコンドリアへの取り込みにカルニチンを必要としない"], answer: 2, explanation: "必須脂肪酸は10g/日程度投与する。" },
              { id: "b25_6", type: "mc", text: "栄養評価とプランニングに関する説明で、誤っているものを選びなさい。", options: ["身体計測指標として体重変化率やBMIがある","血清アルブミン値は炎症性疾患や体位でも変動する","RTPにはプレアルブミン、コリンエステラーゼ、3-メチルヒスチジンがある","BME推計にHarris-Benedictの式がある","必要水分量は体重×30〜40mLで簡易計算できる"], answer: 2, explanation: "RTPにはレチノール結合蛋白、トランスフェリン等が含まれ、コリンエステラーゼは異なる。" },
              { id: "b25_7", type: "mc", text: "末梢静脈栄養における血管痛・静脈炎の予防として、誤っているものを選びなさい。", options: ["高浸透圧の場合、糖濃度を下げる","できるだけ大きい径のカニューラを使用する","血流の多い上肢の太い静脈に留置する","中性に近いpHの輸液を選択する","なるべく緩徐に投与する"], answer: 1, explanation: "必要最小径のカニューラを使用する。" },
              { id: "b25_8", type: "mc", text: "Gambleデータについて、正しい組み合わせを選びなさい。\n飢餓状態では6日間で約(a)の蛋白質が喪失。筋肉量換算で約(b)。ブドウ糖100g/日で喪失量は約(c)となった。", options: ["a.400g b.2kg c.200g", "a.400g b.1kg c.200g", "a.200g b.2kg c.100g", "a.200g b.1kg c.100g", "a.200g b.1kg c.50g"], answer: 0, explanation: "a=400g, b=2kg, c=200g。" },
              { id: "b25_9", type: "mc", text: "TPNに関する説明で、誤っているものを選びなさい。", options: ["TPNは長期間や水分制限が必要な場合に選択される","通常NPC/N比は150〜200程度が効率的とされる","腎不全ではNPC/N比は30〜50程度と低くなる","ビタミンB1非投与で重篤な乳酸アシドーシスを呈する","FDA2000処方ではビタミンKが規定された"], answer: 2, explanation: "腎不全ではアミノ酸制限によりNPC/N比は300〜500と高くなる。" },
              { id: "b25_10", type: "mc", text: "経腸栄養法に関する説明で、誤っているものを選びなさい。", options: ["腸管粘膜の萎縮予防が挙げられるが、CRBSIには注意が必要である","禁忌として腸管吸収機能の低下や廃絶がある","合併症として下痢の頻度が高い","ONSは経口的栄養補助を意味する","経鼻法と経瘻孔法に分類される"], answer: 0, explanation: "CRBSIは静脈栄養特有であり、経腸栄養では起こらない。" },
              { id: "b25_11", type: "mc", text: "経鼻法に関する説明で、誤っているものを選びなさい。", options: ["事故抜去のリスクが高い","ほとんど違和感を感じず、嚥下訓練もしやすい","留置長期化で潰瘍形成の頻度が高くなる","消化管穿孔のリスクがある","胃内に入ったと思われても先端位置確認が大切である"], answer: 1, explanation: "違和感が避けられず、嚥下訓練も行いにくい。" },
              { id: "b25_12", type: "mc", text: "経瘻孔法に関する説明で、誤っているものを選びなさい。", options: ["胃瘻は半固形化製品が投与でき、嚥下訓練がしやすい","PEGは開腹手術をせず胃瘻を造設する","PTEGは頸部食道瘻造設術である","PEG晩期合併症にバンパー埋没症候群がある","留置中の閉塞対策としてアルコール注入法が有効である"], answer: 4, explanation: "閉塞対策は酢水ロックが有効。" },
              { id: "b25_13", type: "mc", text: "栄養製品に関する説明で、誤っているものを選びなさい。", options: ["成分栄養はアミノ酸、半消化は蛋白質が窒素源","成分栄養剤は極めて高脂肪であり高脂血症に注意","医薬品は薬価請求、濃厚流動食品は給食費請求","濃厚流動食品は外来や在宅で全額自己負担","OPFの医薬品消化態としてツインラインNFがある"], answer: 1, explanation: "成分栄養剤は極めて低脂肪である。" },
              { id: "b25_14", type: "mc", text: "半固形化栄養法について、誤っているものを選びなさい。", options: ["胃の貯留能と排出能を得ることが可能","逆流や誤嚥、下痢の予防策になり得る","液体栄養が望ましいケースもある","栄養剤リーク対処として液体の方が流出しにくい","ミキサー食はコストは安い"], answer: 3, explanation: "半固形化の方がリークしにくい。" },
              { id: "b25_15", type: "mc", text: "酸塩基平衡に関する説明で、誤っているものを選びなさい。", options: ["動脈血pHは通常約7.4±0.05","代謝性アシドーシスの成因に下痢による重炭酸イオン喪失がある","メイロン投与時は換気を十分に行いCO2排出を図る","アシデーミアではpH低下によりKが細胞内に移動し血漿Kが低下する","アシデーミアではイオン化Ca濃度が増加する"], answer: 3, explanation: "Kは細胞外(血液中)に移動し、血漿K濃度が上昇する。" },
              { id: "b25_16", type: "mc", text: "リニュートの特徴について、誤っているものを選びなさい。", options: ["消化態タイプの濃厚流動食品","カロリー濃度 1kcal/mL","エネルギーバランスは炭水化物50%、脂質34%、タンパク質16%","食物繊維を配合","乳タンパク質は不使用"], answer: 2, explanation: "炭水化物26%、脂質50%、タンパク24%である。（問題文はイーゲルLCの比率）" },
              { id: "b25_17", type: "mc", text: "リニュートでイーゲルより増量しているものとして、誤っているものを選びなさい。", options: ["銅","亜鉛","コラーゲンペプチド","ビタミンB1","リン"], answer: 4, explanation: "リンは同量である。" },
              { id: "b25_18", type: "mc", text: "ペプタメンAFと比べたリニュートの特徴として正しいものを選びなさい。", options: ["より高タンパクである","カルニチンを配合している","イヌリンを配合している","MCTの割合がより高い","ホエイペプチドを配合している"], answer: 1, explanation: "ペプタメンAFはカルニチン無配合、リニュートは配合。" },
              { id: "b25_19", type: "mc", text: "水溶性食物繊維ではないものを選びなさい。", options: ["セルロース","グアーガム","フルクトオリゴ糖","イヌリン","アルギン酸"], answer: 0, explanation: "セルロースは不溶性食物繊維。" },
              { id: "b25_20", type: "mc", text: "イーゲルLCの特徴として、誤っているものを選びなさい。", options: ["糖質量を減らしL-カルニチンを配合","0.8kcal/mL、浸透圧340mOsm/L","200、300、400kcalの3規格","DHAとEPAを配合している","タンパク質4.0g/100kcal配合"], answer: 3, explanation: "DHAとEPAを配合しているのはリニュートのみ。" },
              { id: "b25_21", type: "mc", text: "他社製品の特徴について正しいものを選びなさい。", options: ["REF-P1は栄養剤と同時に投与する","マーメッドワンは消化態の粘度可変型である","ペプタメンシリーズはすべて1.5kcal/mLである","ペプチーノ、ラクフィアは乳酸菌配合である","グルセルナREXは脂質比率50%である"], answer: 4, explanation: "（※PDF解答に基づく。REF-P1は前に注入等）" },
              { id: "b25_22", type: "mc", text: "ハイネックスゼリーの特徴について、誤っているものを選びなさい。", options: ["900〜1500kcalを1日摂取量とする","粘度は約6000mPa・sである","寒天で固めベタつきにくい","脂肪酸n-3:n-6は1:3である","アレルギー物質として乳・大豆・ゼラチンを含む"], answer: 1, explanation: "粘度は約8700mPa・sである。" },
              { id: "b25_23", type: "mc", text: "ハイネックスゼリーとイノソリッドの共通点として、誤っているものを選びなさい。", options: ["1袋300kcal/300gである","カルニチン、コリンを配合している","食物繊維としてイヌリンを配合している","MCTを配合している","900kcalで1日必要ビタミンをほぼ充足"], answer: 1, explanation: "コリンはイノソリッドのみ配合。" },
              { id: "b25_24", type: "mc", text: "ハイネックスゼリー(水分量76%)で、1200kcal・水分1500mLで管理したい場合の追加水は？", options: ["388mL","588mL","740mL","840mL","976mL"], answer: 1, explanation: "1200g×0.76=912mL。1500-912=588mL。" },
              { id: "b25_25", type: "mc", text: "ラコールNF半固形からイノソリッドへ切り替えた際、同等となる成分を選びなさい。", options: ["食塩相当量","糖質量","たんぱく質量","脂肪量","水分量"], answer: 4, explanation: "どちらも水分含有率76%で同等。" },
              { id: "b25_26", type: "mc", text: "イノソリッドの説明として、誤っているものを選びなさい。", options: ["イノラスと単位あたり(g/mL)の熱量は同じである","食事摂取基準2020年版に基づき、2025年版目標値にも合致","処方設計900kcal/日、成人標準900〜1500kcal/日","1500kcal投与時、食事摂取基準の耐容上限量を超える成分はない","n-3系脂肪酸としてシソ油と魚油を配合"], answer: 0, explanation: "イノソリッドは1.0kcal/g、イノラスは1.6kcal/mL。" },
              { id: "b25_27", type: "mc", text: "在宅半固形栄養経管栄養法指導管理料について、誤っているものを選びなさい。", options: ["2500点/月である","入院中以外で栄養管セット使用時は2000点/月を算定できる","あらかじめ調整された半固形状のもののみ算定できる","最初に算定した日から3年を限度として算定できる","医薬品でない半固形状濃厚流動食でも算定できる"], answer: 3, explanation: "1年を限度として算定できる。" },
              { id: "b25_28", type: "mc", text: "キドパレン輸液の禁忌として、誤っているものを選びなさい。", options: ["高乳酸血症","高ナトリウム血症","高リン血症","高アンモニア血症","肝性昏睡のおそれ"], answer: 2, explanation: "リンが配合されていないため禁忌ではない。" },
              { id: "b25_29", type: "mc", text: "TPN処方アンケートで、目標とする管理が実施できていない理由の1位は？", options: ["個別の電解質量を考慮した結果、カロリーを少なく設定","心血管系の合併症等で投与液量が制限される","重度の糖尿病患者が多く、糖分を少なく設定","既承認医薬品の組合せでは設計困難","その他の理由"], answer: 0, explanation: "個別の電解質考慮によるカロリー制限が最多。" },
              { id: "b25_30", type: "mc", text: "体重50kgにキドパレン1バッグ投与時、アミノ酸量は約( )g/kg/日となる。", options: ["0.46","0.56","0.66","0.76","0.86"], answer: 2, explanation: "キドパレンのアミノ酸量に基づく計算。" },
              { id: "b25_31", type: "mc", text: "キドパレンの組成について、正しいものを選びなさい。", options: ["1バッグのNaは35mEq","1バッグのKは120mEq","FDA2000処方に準拠したビタミン等を配合","必須/非必須比は3.4でArgやGlyを配合","BCAA含有率は45.8%でキドミンと同じ"], answer: 2, explanation: "FDA2000準拠。" },
              { id: "b25_32", type: "mc", text: "エネフリード(550mL)とビーフリード(500mL)で誤っているものを選びなさい。", options: ["ブドウ糖量が同じ","BCAA含有率が同じ","ビタミンB1量が同じ","ナトリウム量が同じ","亜鉛量が同じ"], answer: 2, explanation: "ビーフリードはAMA、エネフリードはFDA2000でB1量が異なる。" },
              { id: "b25_33", type: "mc", text: "エネフリード投与時のライン管理について、誤っているものを選びなさい。", options: ["可能な限り側注口のないラインを選択","除菌用ファイナルフィルターを使用する","可能な限り閉鎖式を使用","側管から他の薬剤を投与しない","24時間毎にラインを交換する"], answer: 1, explanation: "脂肪粒子が詰まるためファイナルフィルターは使用できない。" },
              { id: "b25_34", type: "mc", text: "ビーフリードについて、誤っているものを選びなさい。", options: ["2000mL投与で60gのアミノ酸を補給できる","重篤な腎障害は禁忌とはならない","隔壁未開通で下室のみ投与時、高血糖リスクがある","うっ血性心不全への禁忌は過剰な水分負荷のため","隔壁未開通で上室が着色していた場合、メイラード反応と推測できる"], answer: 4, explanation: "上室のみの着色はトリプトファンの酸化であり、メイラードではない。" },
              { id: "b25_35", type: "mc", text: "アクトリーンについて、誤っているものを選びなさい。", options: ["ハイライトカテにはネラトンとチーマンがある","植物由来グリセリンの潤滑剤コーティング","重大な有害事象に尿路感染や損傷がある","30本入りに携帯ポーチが付く","特殊カテーテル加算で400点が算定できる"], answer: 4, explanation: "400点は再利用型。アクトリーンは異なる。" },
              { id: "b25_36", type: "mc", text: "アクトリーンについて、誤っているものを選びなさい。", options: ["逆流防止機構の採尿バッグと一体化","ミニのカテーテル長は全て90mm","ハイライトセットの採尿バッグは700mL","男性用は折りたたんで持ち運べる","チーマンは尿道狭窄などに選択"], answer: 2, explanation: "ハイライトセットのバッグは1000mL。" },
              { id: "b25_37", type: "mc", text: "タムガイドのBT光について、誤っているものを選びなさい。", options: ["硬い組織は透過しない","下咽頭通過時は光が見えることがある","胃に入った直後に腹部で光が見えることが多い","胃に入った直後は胃底部に向かう","胃底部の壁に当たった場合肋間で光が見えることがある"], answer: 2, explanation: "胃に入った直後は光は確認できないことが多い。" },
              { id: "b25_38", type: "mc", text: "タムガイドの臨床データについて、誤っているものを選びなさい。", options: ["BT光を確認した全症例で胃内留置が確認された","気管内留置症例において、胸部で光が確認された","X線で胃内でもBT光が見えない場合があった","光が検出できない場合はX線検査が必要","肥満患者の感度は低く算出された"], answer: 1, explanation: "気管内留置症例で光は確認されなかった。" },
              { id: "b25_39", type: "mc", text: "タムガイドの使用方法について、誤っているものを選びなさい。", options: ["電源ボタンで点滅→点灯→消灯と変わる","消灯後または外して30分以上で再使用不可と認識","ファイバーは再滅菌・再使用禁止","光源装置は表面消毒剤等で清掃する","抜去時抵抗があれば経鼻胃管とともに抜去する"], answer: 1, explanation: "15分以上経過で使用済みと認識される。" },
              { id: "b25_40", type: "mc", text: "J034-2 経鼻栄養チューブ挿入術(180点)について、誤っているものを選びなさい。", options: ["DPC病棟では算定不可","外来で算定可","一般病棟で算定可","回リハ、地域包括ケア病棟で算定可","在宅で算定可"], answer: 3, explanation: "回リハ、地域包括では包括されるため算定不可。" },
              { id: "b25_41", type: "mc", text: "脳卒中と栄養療法について、誤っているものを選びなさい。", options: ["発症時サルコペニア有病率は15.8%","急性期では早期栄養導入が遅れがち","糖尿病既往がなくても耐糖能異常を併発","GL2021では48時間以内の早期経腸栄養が推奨されている","低ナトリウム血症は最も一般的な電解質異常"], answer: 3, explanation: "時間に関する詳細な記載はないか、適応は慎重にされる。" },
              { id: "b25_42", type: "mc", text: "脳卒中に関する記述で、誤っているものを選びなさい。", options: ["低Na血症は機能的転帰に悪影響","重症脳卒中初期の高カロリー経腸は死亡率上昇と関連","F. nucleatum抗体検出は予後不良と関連","急性期には嘔吐等により経口・経腸が敬遠されがち","リハ時間確保のため経腸栄養の迅速投与の安全性検証が進行中"], answer: 1, explanation: "「低カロリー経腸栄養」が死亡率上昇と関連（アジア人等）。" },
              { id: "b25_43", type: "mc", text: "経腸栄養と口腔ケアについて、誤っているものを選びなさい。", options: ["GL2021で急性期の口腔ケアは誤嚥性肺炎リスク低下で推奨A","柏スタディでオーラルフレイル群は死亡リスク等が高い","くも膜下出血のクラゾセンタン影響で水分インプットは多めにする","口腔内バイオフィルムが気管に侵入し肺炎になる","口腔ケアは誤嚥性肺炎予防に寄与する"], answer: 2, explanation: "体液貯留に留意し水分バランスを+500ml以内に抑える必要がある。" },
              { id: "b25_44", type: "mc", text: "誤嚥性肺炎と口腔ケアについて、誤っているものを選びなさい。", options: ["入院肺炎患者の誤嚥性比率は高齢で高く、70〜79歳でピーク","米山らの報告で特養入所者の口腔ケアが発熱・肺炎を低減","頭頸部癌放射線療法の症状に口腔内乾燥がある","シスプラチン等投与時は低Mg血症に注意","胃瘻造設が推奨される"], answer: 0, explanation: "90歳以上でピークとなる。" },
              { id: "b25_45", type: "mc", text: "頭頸部癌の栄養療法について、誤っているものを選びなさい。", options: ["放射線療法による症状に口腔乾燥がある","鈴木らの報告は単群介入試験","シスプラチン等で低Mg血症に注意","体重10%低下防止に必ず胃瘻造設が推奨される","がん悪液質にはマルチモーダルケアが提唱される"], answer: 3, explanation: "必ずしも胃瘻を推奨しているわけではない。" },
              { id: "b25_46", type: "mc", text: "がん悪液質について、誤っているものを選びなさい。", options: ["定義の認知率は50%を下回っていた","膵癌患者の有病率が最も高い","悪影響が明らかになってからサポートを望む患者が多い","RWDは一様にエビデンスが低いとは言い切れない","重症患者のpermissive underfeedingが一般的"], answer: 2, explanation: "がんと診断された早い段階からサポートを望んでいる。" },
              { id: "b25_47", type: "mc", text: "重症患者の静脈栄養について、誤っているものを選びなさい。", options: ["permissive underfeedingが一般的","入室4-7日目の平均アミノ酸が1.2g以上と死亡率改善が関連","GL2016を機にエネルギー投与量が減少傾向","オートファジーには恒常的と誘導的がある","mTORC1活性化とリン酸輸送体発現は関連"], answer: 1, explanation: "実際には1.2g以上投与されている症例は少なく群を作れなかった。" },
              { id: "b25_48", type: "mc", text: "オートファジー、mTORについて、誤っているものを選びなさい。", options: ["オートファジーは不要物除去と栄養素提供を行う","mTORC1活性化で血清リン値モニタリングが重要","加齢による筋肉減少は炎症性サイトカインによるmTORC1抑制が原因","mTORC1はイソロイシンの刺激で活性化される","新生児の栄養補給第一選択は母乳"], answer: 3, explanation: "イソロイシンではなく「ロイシン」の刺激による。" },
              { id: "b25_49", type: "mc", text: "小児・重心の栄養管理について、誤っているものを選びなさい。", options: ["新生児・乳児の第一選択は母乳","カルニチン欠乏の一因にバルプロ酸等がある","非アテトーゼ型は痩せやすく、アテトーゼ型は太りやすい","小児ではNPC/Nは200〜400を目標","在宅半固形は2500点/月"], answer: 2, explanation: "アテトーゼ型（運動過多）が痩せやすく、非アテトーゼ型が太りやすい。" },
              { id: "b25_50", type: "mc", text: "半固形栄養について、誤っているものを選びなさい。", options: ["在宅半固形管理料は胃造設1年以内で1年限度","胃には噴門で逆流を防ぐ働きがある","合田先生の20,000mPa・sは12回転/分での値","ダンピング症候群は早期と後期に分けられる","注入後1時間程度姿勢を保持することが推奨"], answer: 4, explanation: "粘度計は6回転/分の値。注入後の安静保持は不要。" },
              { id: "b25_51", type: "mc", text: "CKD・透析について、誤っているものを選びなさい。", options: ["早期ではたんぱく質の過剰制限をしない","CKDの栄養障害をPEWと呼ぶ","腎臓リハは包括的プログラムである","筋力よりも筋肉量の方が死亡リスク増加と関連した","低栄養の透析患者は食事療法やONSが優先"], answer: 3, explanation: "筋肉量ではなく、低筋力のみが死亡リスク増加と関連した。" },
              { id: "b25_52", type: "mc", text: "CKD患者の輸液栄養管理について、誤っているものを選びなさい。", options: ["低栄養は食事・ONS優先","TPN処方で総合ビタミン90%に対し、微量元素も処方は65%","GFR60未満等でCKDと診断","TPNで水分制限のためエネルギーが不足するケースがある","透析患者のたんぱく質は1.3g/kg以上でリスク上昇"], answer: 1, explanation: "微量元素は「14.7%」など実際は非常に低い（解答に基づく）。" },
              { id: "b25_53", type: "mc", text: "透析患者の栄養について、誤っているものを選びなさい。", options: ["たんぱく質は少なすぎても多すぎても死亡リスク上昇","医薬品経腸栄養剤は全て「高度の腎障害」が禁忌で使えない","NRI-JHは日本人のデータで作られた","サルコペニア合併率は透析患者で非常に高い","心不全患者は入退院を繰り返す"], answer: 1, explanation: "エンシュアHは腎不全末期が禁忌。全てではない。" },
              { id: "b25_54", type: "mc", text: "心不全について、誤っているものを選びなさい。", options: ["300日程度で半数が再入院","Fantastic Fourの薬剤使用が重視される","口腔機能問題等があるとADL低下が有意に多い","包括的心臓リハビリテーションを行う","LVEF40%未満をHFrEFという"], answer: 2, explanation: "在院死の増加ではなくADL低下。" },
              { id: "b25_55", type: "mc", text: "心臓リハについて、誤っているものを選びなさい。", options: ["包括的心臓リハビリテーションを行う","悪液質あり心不全にONSでQOL改善","入院中リハと外来リハを共に行うのは33%程度","EFFORT研究で個別栄養介入が生存率改善","食道癌術後下痢群は予後悪化の可能性"], answer: 2, explanation: "両方行うのはわずか7%程度。" },
              { id: "b25_56", type: "mc", text: "ハイネックスイーゲルに関連する記述で、誤っているものを選びなさい。", options: ["食道癌術後の下痢群は予後悪化の可能性","PPI使用がプレアルブミン低下と関連","食道癌術後の腸瘻管理でイーゲル有用性の報告","TPNだけの管理で60日を超えると処置区分が変更され減収","グアーガムとペクチンの短鎖脂肪酸産生に有意差なし"], answer: 3, explanation: "60日ではなく30日を超えると減収。" },
              { id: "b25_57", type: "mc", text: "食物繊維について、誤っているものを選びなさい。", options: ["グアーガムとペクチンで同等効果との報告","VLMAは大腸で発酵分解率が高く効果が高い","発酵分解率は食物繊維の種類で差がある","食事摂取基準で食物繊維は全年代で不足","コラーゲンのヒドロキシプロリンが直接合成の原材料となる"], answer: 1, explanation: "VLMAは発酵分解率が低く、50%程度とされる。" },
              { id: "b25_58", type: "mc", text: "褥瘡と栄養療法について、誤っているものを選びなさい。", options: ["ヒドロキシプロリンが直接コラーゲン合成の原材料となる","高エネルギー・高タンパク補給を提案","亜鉛等の特定栄養素を疾患考慮の上補給してもよい","栄養に関するCQは全体で1つのみ","パーキンソン病で嚥下障害を合併する"], answer: 0, explanation: "直接ではなく、ジペプチドが線維芽細胞を刺激する。" },
              { id: "b25_59", type: "mc", text: "パーキンソン病について、誤っているものを選びなさい。", options: ["約8割で嚥下障害を合併","自律神経障害で便秘や体重減少等がある","中脳黒質の変性でドパミン分泌が低下","ピリドキシンの量は少量のため問題ない","Foleyがバルーンカテーテルを開発"], answer: 3, explanation: "少量でも有効血漿濃度を下回る可能性があり問題となる。" },
              { id: "b25_60", type: "mc", text: "排尿ケアについて、誤っているものを選びなさい。", options: ["Foleyがバルーンカテーテルを開発","尿路感染症は医療関連感染全体の36%を占める","CICの目的に膀胱過伸展予防などがある","自然排尿後も残尿があれば感染症の恐れ","残尿測定を行う"], answer: 1, explanation: "現在は約10%に低下している。" }
            ]
          },
          advance: {
            id: "exam_advance", title: "製品知識：Advance編", type: "sei",
            questions: [
              { id: "a25_1", type: "mc", text: "キドパレン輸液の注意点について、誤っているものを選びなさい。", options: ["低K血症に伴う症状としてeGFR高値、乏尿が知られる","リフィーディング症候群は急速な栄養補給で発症リスク","リフィーディングハイリスクにはビタミンB等を補給","併用注意にジゴキシン、レボドパ、ワルファリンがある","アミノ酸は免疫機能等に重要である"], answer: 0, explanation: "GFR低値、頻尿が低K血症の症状。" },
              { id: "a25_2", type: "mc", text: "PPN施行時の衛生管理について、正しいものを選びなさい。", options: ["C. albicansは生理食塩液での増殖が顕著だった","B. cereusはアミノ酸加糖電解質液での発育が顕著だった","ベッド柵よりタオルケットでB. cereus検出が多かった","腎不全用アミノ酸注射液のアミノ酸濃度は約9%である","血液透析1回のアミノ酸漏出は8〜12g程度"], answer: 3, explanation: "正解は腎不全用アミノ酸濃度5.9〜7.2%（誤り選択肢として設定）。解説等で正当は選択肢4等。PDFに基づく。" },
              { id: "a25_3", type: "mc", text: "内科系静脈栄養RWDについて、誤っているものを選びなさい。", options: ["アミノ酸は筋肉量維持等に重要","主要評価項目は院内死亡であった","アミノ酸処方量の減少と院内死亡増加の関連が認められた","腎不全用アミノ酸濃度は約9g/100mLである","血液透析1回のアミノ酸漏出は8〜12g"], answer: 3, explanation: "濃度は5.9〜7.2%。" },
              { id: "a25_4", type: "mc", text: "腎不全患者のタンパク制限について、誤っているものを選びなさい。", options: ["血液透析での漏出は8〜12g","透析患者へは30〜35kcal/kg、0.9〜1.2g/kgタンパクが推奨","GL第3版で透析患者に20kcal/kg、タンパク0.8g/kg投与とする","急性疾患のないCKD入院患者に0.6〜0.8g/kgタンパクを処方可","妊娠悪阻は初期の半数に認められる"], answer: 2, explanation: "35kcal/kg、1.0〜1.2g/kgタンパクが推奨される。" },
              { id: "a25_5", type: "mc", text: "妊娠悪阻と栄養管理について、誤っているものを選びなさい。", options: ["妊娠悪阻では低K血症に陥りやすい","維持に必要なビタミンB1は1.4mg","妊婦の悪心時に高脂質食は気持ち悪さを軽減する","第1三半期の体重減少で児の出生体重が軽くなる","経腸不可能な場合は静脈栄養適応"], answer: 2, explanation: "高脂質食は気持ち悪さを助長する。" },
              { id: "a25_6", type: "mc", text: "静脈栄養管理の新潮流について、正しいものを選びなさい。", options: ["経腸不可能な場合は静脈栄養適応","輸液治療が3ヶ月程度ならPVCを用いる","PICCは末梢静脈カテーテルの一つ","末梢カテーテル留置時も配合変化等のリスク回避は不要","誤嚥性肺炎は死因6位"], answer: 0, explanation: "1週間未満ならPVCを用いる。" },
              { id: "a25_7", type: "mc", text: "誤嚥性肺炎ケアの再考について、誤っているものを選びなさい。", options: ["死因6位である","一時的禁食群で治癒期間延長","入院7日目までに経口摂取を受けた患者は65.1%","熱量増加と院内死亡低下に関連はなかった","末梢静脈栄養は1500kcal程度を投与"], answer: 1, explanation: "経口摂取意欲群で高い推移。" },
              { id: "a25_8", type: "mc", text: "末梢静脈栄養の活用について、誤っているものを選びなさい。", options: ["テキストブックで脂肪含む糖電解質基準1500kcalと定義","不可避窒素損失は50kgで26.3g","PPN時B1非併用で欠乏症報告あり","透析患者で65歳超は減少しており半分程度","透析患者の栄養はできる限り経口・経腸で"], answer: 0, explanation: "アミノ酸を含む糖電解質輸液を基本とし、1000kcal前後とするのが定義。" },
              { id: "a25_9", type: "mc", text: "慢性維持透析患者の静脈栄養について、正しいものを選びなさい。", options: ["65歳超は増加し2/3を占める","喪失量に関わらず一日必要量以上を設定","できる限り経口・経腸で行う","NRI-JHはCRP等からなるツール","末梢静脈栄養は手技が煩雑"], answer: 2, explanation: "できる限り経口・経腸で行うことが推奨されている。" },
              { id: "a25_10", type: "mc", text: "末梢静脈栄養について、正しいものを選びなさい。", options: ["TPNと比べ手技が煩雑","消化管回復後も静脈のみで管理","頻回な差し替えが生じないメリット","入院高齢者の喫食率は70〜80%","ベッド安静で1日0.5%除脂肪体重減少"], answer: 3, explanation: "TPNより手技は簡便。喫食率70-80%等のデータがある。（正解はPDFに従う）" },
              { id: "a25_11", type: "mc", text: "栄養療法と予後について、誤っているものを選びなさい。", options: ["ベッド安静で1日0.5%LBM減少","EFFORT試験介入群のタンパク量は0.84g/kg","EFFORT試験後150日生存率で差はなかった","TPN栄養目標達成群でADL悪化は少なかった","EUSのビスコクリア目安は50〜400g"], answer: 2, explanation: "介入群で生存率が有意に高かった。" },
              { id: "a25_12", type: "mc", text: "ビスコクリア使用量目安として正しいものを選びなさい。", options: ["EUS:50〜400g, 視野確保:200〜600g","EUS:200〜600g, 視野確保:50〜400g","EUS:600〜900g, 視野確保:200〜600g","EUS:50〜400g, 視野確保:600〜900g","水に比べ短時間でGelが貯まる"], answer: 0, explanation: "電子添文の通り。" },
              { id: "a25_13", type: "mc", text: "Gel immersion EMRの特徴で誤っているものを選びなさい。", options: ["水に比べ短時間でGelが貯まる","腸液残渣があっても良好な視野","出血に対しても良好な視野","Underwater EMRに比べ多岐に病変実施できる","気泡が入ることがある"], answer: 3, explanation: "Underwaterに比べて幅広く適応できるわけではない。" },
              { id: "a25_14", type: "mc", text: "オラネジン(Lancet 2020)について正しいものを選びなさい。", options: ["クロルヘキシジンアルコールと比較","SSI発生率は有意差がみられなかった","主要評価は表層切開創SSI発生率","有害事象は5例","タムガイドの赤色光確認ポイントは..."], answer: 0, explanation: "オラネジンとポビドンヨードの比較等、優越性に関する記述。（解答に基づく）" },
              { id: "a25_15", type: "mc", text: "タムガイド赤色光確認ポイントで誤っているものを選びなさい。", options: ["胃内容物の影響を避けるため時間を設ける","視認性向上のため部屋を暗くする","チューブ先端を余分に15〜20cm進める","胃内でのチューブ操作が必要","経験症例を積み重ねる"], answer: 2, explanation: "従来の挿入長より5〜10cm程度進める。" },
              { id: "a25_16", type: "mc", text: "タムガイドで気管迷入時の光の見え方として高いものを選びなさい。", options: ["左側に強めに透過","左側だが光確認されず","正中に強めに透過","右側だが光確認されず","正中だが光確認されず"], answer: 2, explanation: "気管は頸部正中腹側のため強く見える可能性が高い。" },
              { id: "a25_17", type: "mc", text: "VAP予防バンドルにないものを選びなさい。", options: ["手指衛生確実実施","クロルヘキシジンによる口腔ケア","回路頻回交換しない","適切な鎮静・鎮痛","仰臥位で管理しない"], answer: 1, explanation: "日本では粘膜使用が禁忌のため含まれない。" },
              { id: "a25_18", type: "mc", text: "口腔粘膜炎リスクが最も高いものを選びなさい。", options: ["頭頸部化学放射線療法","自家造血幹細胞移植","骨髄抑制の強い化学療法","標準的な化学療法","頭頸部放射線療法"], answer: 0, explanation: "発生リスクが最も高い。" },
              { id: "a25_19", type: "mc", text: "正常な排尿について誤っているものを選びなさい。", options: ["1回量: 200〜400mL","時間: 10〜30秒","1日排尿量: 2000〜2500mL","1日回数: 5〜7回","間隔: 3〜5時間"], answer: 2, explanation: "1日の正常排尿量は1000〜1500mL。" },
              { id: "a25_20", type: "mc", text: "介助導尿の処理で正しいものを選びなさい。", options: ["使い捨て尿器は内容物廃棄後本体を粉砕","粉砕機稼働は約10分","再利用尿器はマセレーターで洗浄","再利用を機械なしで洗浄は次亜塩素酸","袋付きはそのまま廃棄"], answer: 4, explanation: "機械なしは次亜塩素酸等で消毒。" },
              { id: "a25_21", type: "mc", text: "OF-5に該当しないものを選びなさい。", options: ["口腔乾燥感","咀嚼困難感","嚥下困難感","滑舌低下","舌圧低下"], answer: 4, explanation: "舌圧低下は口腔機能低下症の項目。" },
              { id: "a25_22", type: "mc", text: "経腸栄養の下痢について誤っているものを選びなさい。", options: ["WHO定義とブリストル7で定義できる","ブリストルは数字が小さいほど下痢傾向","ICUでは60〜80%発生報告","排便350g以上は栄養不足リスク","Fried基準に体重減少がある"], answer: 1, explanation: "ブリストルは数字が大きいほど下痢傾向（7が水様便）。" },
              { id: "a25_23", type: "mc", text: "Friedらのフレイル基準にないものを選びなさい。", options: ["体重減少","筋肉量の減少","主観的疲労感","活動量減少","歩行速度減弱"], answer: 1, explanation: "筋肉量の減少ではなく、握力の低下。" },
              { id: "a25_24", type: "mc", text: "半固形化栄養について誤っているものを選びなさい。", options: ["血糖値上昇が抑制される","胃瘻カテは内腔が広く短いものが適する","粘度が高すぎると注入困難","注入後1時間程度姿勢保持が推奨される","CNAQ-Jが有用"], answer: 3, explanation: "安静姿勢保持は特に必要としない。" },
              { id: "a25_25", type: "mc", text: "CNAQ-Jについて誤っているものを選びなさい。", options: ["ガイドライン2017で推奨","評価は死亡率と関連","8つの質問(満点40点)で評価","20点以下で体重減少リスク","リフィーディングハイリスクに肥満"], answer: 2, explanation: "28点以下の時に体重減少リスク。" },
              { id: "a25_26", type: "mc", text: "リフィーディングハイリスクでないものを選びなさい。", options: ["慢性アルコール中毒","肥満患者","悪性腫瘍","高齢者","長期利尿薬投与"], answer: 1, explanation: "神経性やせ症等がリスク。単純な肥満はハイリスクに含まれない。" },
              { id: "a25_27", type: "mc", text: "在宅低栄養の現況について正しいものを選びなさい。", options: ["リロケーションダメージとはADL戻らない現象","HADとは環境変化ストレス現象","BMIが高いほど、または低いほど医療費を要する","要介護度が高いほどMNAスコアが低い傾向","心不全はBMI高いほど発症リスク"], answer: 2, explanation: "両極端なBMIは医療費増大。" },
              { id: "a25_28", type: "mc", text: "心不全と栄養について誤っているものを選びなさい。", options: ["食欲不振原因にうっ血、加齢、塩分制限等","FRAGILE-HFで20.4%が低栄養","塩分制限の有用性エビデンスは乏しい","対象は栄養不良等の高齢者","ONS推奨は最低400kcal"], answer: 2, explanation: "エビデンスが乏しい等に関する解説（解答に基づく）。" },
              { id: "a25_29", type: "mc", text: "ONS推奨(ESPEN)で誤っているものを選びなさい。", options: ["30g以上タンパク、400kcal以上推奨","少なくとも3か月継続する","退院後にONSを提供するべき","高血圧でも脱水時は対処必要","OS-1の塩分はみそ汁と同等"], answer: 1, explanation: "少なくとも1か月継続する。" },
              { id: "a25_30", type: "mc", text: "高血圧の経口補水について誤っているものを選びなさい。", options: ["脱水時はすぐ対処","OS-1はみそ汁1杯の塩分","スポドリとOS-1の違いは塩分量のみ","夏でも塩分制限望まれる","食塩6g/日未満が目標"], answer: 2, explanation: "糖分量等も大きく異なる。" },
              { id: "a25_31", type: "mc", text: "リンについて誤っているものを選びなさい。", options: ["体内の約85%が骨に存在","基準値は0.9〜2.6mg/dL","高リン血症原因にCKDがある","高リン血症に特異的症状はない","カルシウムは99%が骨に"], answer: 1, explanation: "基準値は2.7〜4.6mg/dL。" },
              { id: "a25_32", type: "mc", text: "カルシウムについて誤っているものを選びなさい。", options: ["99%が骨、細胞外は0.1%未満","初期対応は生理食塩液点滴","原因にビタミンD過剰等","約90%がイオン化Ca","輸液は欠乏+維持で行う"], answer: 3, explanation: "イオン化Caは約50%。" },
              { id: "a25_33", type: "mc", text: "輸液療法について誤っているものを選びなさい。", options: ["欠乏+維持で行う","尿素は細胞膜を移動できないので水が移動","基本は生食と5%ブドウ糖","5%ブドウ糖は溶血せず純水を入れられる","調節機構に浸透圧と容量がある"], answer: 1, explanation: "尿素は容易に移動するため水は移動しない。" },
              { id: "a25_34", type: "mc", text: "脱水症について誤っているものを選びなさい。", options: ["調節機構がある","水分欠乏型は浸透圧上昇、尿量減少","Na欠乏型は血圧低下、頻脈等","無尿は中等症に該当","注射薬は単独使用が基本"], answer: 3, explanation: "無尿は重症。" },
              { id: "a25_35", type: "mc", text: "配合変化について誤っているものを選びなさい。", options: ["単独使用が基本","化学的・物理的変化が生じる","残存率80%以上で配合可能とする報告","要因に室温・光・時間等","Na異常でODSを警戒"], answer: 2, explanation: "残存率90%以上。" },
              { id: "a25_36", type: "mc", text: "Na異常について誤っているものを選びなさい。", options: ["ODSを警戒する","真の低Na血症は等張性","生食1000mLで間質750、血管250mL分布","急速補正でODS危険","化学療法中の脱水は異なる症状が出る"], answer: 1, explanation: "真の低Na血症は「低張性」。" },
              { id: "a25_37", type: "mc", text: "化学療法・緩和ケアの脱水で誤っているものを選びなさい。", options: ["抗がん剤の副作用と異なる症状が出る","薬剤血中濃度が高くなり副作用出やすい","ADL低下させやすい","痛みの閾値低下で痛みを強く感じる","がん患者電解質異常は低Na等"], answer: 0, explanation: "抗がん剤副作用と類似した症状が出やすい。" },
              { id: "a25_38", type: "mc", text: "がん患者の電解質異常で誤っているものを選びなさい。", options: ["低Na、高Ca、腫瘍崩壊が代表","低Na原因で最も多いのはRSWS","SIADH原因に肺小細胞癌等","低Na治療は一般的な治療と同様","酸塩基緩衝系に炭酸等がある"], answer: 1, explanation: "最も多いのはSIADH。" },
              { id: "a25_39", type: "mc", text: "酸塩基平衡について誤っているものを選びなさい。", options: ["緩衝系に炭酸等","アルカローシス原因に嘔吐等","アシドーシス原因にH+蓄積等","直ちにアルカリ化剤を投与する","K調節に細胞内外移動と腎排泄"], answer: 3, explanation: "まず原因の治療を優先する。" },
              { id: "a25_40", type: "mc", text: "カリウム異常について誤っているものを選びなさい。", options: ["調節機構は細胞内外移動と腎排泄","腎正常なら通常高Kにならない","ACE阻害薬等で高Kをきたす","高Kは5mEq/L以上","グルコン酸Ca効果に2〜3時間要する"], answer: 4, explanation: "数分で現れ最大1時間持続する。" }
            ]
          }
        }
      },
      exam2024: {
        id: "exam2024", title: "大項目カテゴリー3（2024年統一試験問題）", icon: "Archive",
        subcategories: {
          pms2024: {
            id: "exam_pms_2024", title: "基礎：2024年PMS", type: "bas",
            questions: [
              { id: "p24_pms_1", type: "mc", text: "医薬品医療機器等法に関する記述で、正しい組み合わせを選びなさい。(2024年)", statements: ["a. 医薬品医療機器等法第1条には、薬害防止の理念が明記されている。","b. 関係者の責務の明確化のため、国や医薬関係者等の責務が規定されており、国民にも役割がある。","c. GVP省令及びGPSP省令は、医薬品等の製造販売業の許可要件となっている。","d. 医薬品医療機器等法第17条に、医薬品等総括製造販売責任者等の設置について規定されている。"], options: ["a正 b正 c誤 d誤", "a誤 b誤 c正 d誤", "a正 b正 c誤 d正", "a誤 b誤 c誤 d誤", "a正 b正 c正 d正"], answer: 2, explanation: "c. 許可要件はGVP省令及びGQP省令。GPSP省令は製造販売後の調査及び試験の実施の基準に関する省令。" },
              { id: "p24_pms_2", type: "mc", text: "GVP省令、安全管理体制に関する記述で、正しい組み合わせを選びなさい。(2024年)", statements: ["a. 製造販売業三役とは、総括製造販売責任者、安全管理責任者、医薬品製造管理責任者をいう。","b. GVP省令第5条では、第一種製造販売業者は製造販売後安全管理業務手順書を作成しなければならないと規定されている。","c. MRはGVP省令第2条において「医薬情報担当者」として法的に定義されている。","d. OPFの安全管理体制として、各支店・薬制部・輸液DIセンターは安全管理実施部門である。"], options: ["a誤 b正 c誤 d正", "a誤 b正 c正 d誤", "a正 b誤 c正 d正", "a正 b誤 c正 d誤", "a誤 b正 c誤 d誤"], answer: 1, explanation: "a. 三役は総括、安全管理、品質保証責任者。 d. 薬制部ではなく、臨床応用開発部。" },
              { id: "p24_pms_3", type: "mc", text: "安全管理情報の収集に関する記述で、正しい組み合わせを選びなさい。(2024年)", statements: ["a. 情報入手後は原則1暦日以内に電子速報書システムに入力する。","b. 血管外漏出に関する情報を入手したときは、有害事象名欄に具体的な「症状」と併せて入力する。","c. コンビネーション製品による有害事象情報を入手したときは電子速報書システムに、不具合情報は苦情要望管理システムに登録する。","d. 優先して入手すべき6項目は、有害事象名、重篤性、本剤との因果関係、患者識別情報、発現日、転帰である。"], options: ["a誤 b正 c誤 d正", "a正 b正 c正 d正", "a誤 b誤 c正 d正", "a正 b正 c誤 d正", "a正 b正 c正 d誤"], answer: 4, explanation: "d. 「発現日」ではなく「使用薬剤名(自社製品名)」。" },
              { id: "p24_pms_4", type: "mc", text: "RMP(医薬品リスク管理計画)に関する記述で、正しい組み合わせを選びなさい。(2024年)", statements: ["a. 安全性検討事項には、「重要な特定されたリスク」、「重要な潜在的リスク」、「重要な不足情報」の3つがある。","b. 「重要な特定されたリスク」の例として、オラネジンの「ショック」がある。","c. 新たな安全性の懸念が判明したときは、速やかに安全性検討事項の内容を見直す。","d. 「リスク最小化計画」には、「通常」と「追加」の活動がある。"], options: ["a誤 b正 c誤 d正", "a正 b誤 c正 d誤", "a正 b誤 c正 d正", "a正 b誤 c誤 d誤", "a正 b正 c正 d正"], answer: 2, explanation: "b. オラネジンのショックは「重要な潜在的リスク」。" },
              { id: "p24_pms_5", type: "mc", text: "GPSPと製造販売後調査等ガイドラインに関する記述で、正しい組み合わせを選びなさい。(2024年)", statements: ["a. GPSPは、製造販売後調査等に関する業務が適正に実施され、申請資料の信頼性を確保することを目的とする。","b. 「一般使用成績調査」とは、患者条件を定めることなく行う調査である。","c. 「製造販売後データベース調査」とは、医療情報データベースを用い行う調査のことである。","d. 製造販売後調査等管理責任者は製造販売後調査等基本計画書を作成・保存する。"], options: ["a正 b正 c誤 d正", "a誤 b正 c正 d正", "a誤 b正 c誤 d正", "a正 b正 c正 d正", "a正 b誤 c正 d誤"], answer: 3, explanation: "すべて正しい。" },
              { id: "p24_pms_6", type: "mc", text: "PMSの意義・重要性に関する記述で、正しい組み合わせを選びなさい。(2024年)", statements: ["a. PMSは医薬品の製造販売後に行われる有効性、安全性の確保のための活動である。","b. 日本のPMSは、「再審査制度および安全性定期報告」、「再評価制度」および「副作用・感染症報告制度」の3つの制度で成り立っている。","c. 使用成績調査と市販直後調査はGPSPによって規定されている。","d. PMSの目的のひとつは、収集・評価・分析された情報を、適切に医療関係者に伝達することである。"], options: ["a正 b誤 c誤 d正", "a誤 b誤 c誤 d正", "a誤 b正 c正 d誤", "a正 b正 c誤 d正", "a正 b正 c正 d誤"], answer: 3, explanation: "c. 市販直後調査はGVPによって規定されている。" },
              { id: "p24_pms_7", type: "mc", text: "副作用・感染症報告制度に関する記述で、正しい組み合わせを選びなさい。(2024年)", statements: ["a. 副作用・感染症報告制度を構成する制度として、現在は「患者からの医薬品副作用報告制度」を含め5つの制度である。","b. 企業報告制度は、薬機法で厚生労働大臣への報告が義務付けられている。","c. 医師等が重篤でないと判断した症例でも、当該企業が重篤と判断した症例は「重篤」な症例に該当する。","d. 感染症定期報告制度とは、半年ごとに報告を行う制度である。"], options: ["a誤 b誤 c正 d正", "a正 b正 c正 d正", "a誤 b正 c誤 d正", "a正 b正 c正 d誤", "a正 b正 c誤 d誤"], answer: 3, explanation: "d. 感染症定期報告は半年ごとではないため誤り。" },
              { id: "p24_pms_8", type: "mc", text: "再審査制度および安全性定期報告に関する記述で、正しい組み合わせを選びなさい。(2024年)", statements: ["a. 再審査制度は1979年の薬事法改正により導入された。","b. 再審査期間は、「新有効成分含有医薬品:6年」、「新医療用配合剤:6年」、「新投与経路医薬品:8年」である。","c. PBRERは、ベネフィット・リスクについて分析・評価を行った結果をまとめた報告書である。","d. 安全性定期報告は、指定日から2年間は半年ごと、それ以降は1年ごとに報告することとなっている。"], options: ["a正 b正 c誤 d誤", "a誤 b誤 c正 d誤", "a正 b誤 c正 d正", "a正 b誤 c誤 d正", "a誤 b誤 c正 d正"], answer: 2, explanation: "b. 新有効成分含有医薬品は「8年」、新投与経路医薬品は「6年」である。逆になっている。" },
              { id: "p24_pms_9", type: "mc", text: "医療機器・コンビネーション製品に関する記述で、正しい組み合わせを選びなさい。(2024年)", statements: ["a. 2024年1月現在、OPFが取り扱う医療機器のうち、安全管理情報の収集対象としているのは「ビスコクリア」のみである。","b. 医療機器の安全管理情報には、「健康被害情報」と「不具合情報」がある。","c. 不具合による影響とは、破損、作動不良等広く具合の良くないことによる影響をいう。","d. MRは、ビスコクリアによる健康被害情報を入手した場合、原則1暦日以内に「医療機器連絡システム」に登録する。"], options: ["a誤 b誤 c誤 d正", "a誤 b誤 c誤 d誤", "a誤 b正 c正 d正", "a正 b誤 c誤 d正", "a誤 b正 c正 d誤"], answer: 2, explanation: "a. 「ビスコクリア」のほか、「局所洗浄用ノズル」「ラコール専用アダプタ」「加圧バッグ」も対象である。" },
              { id: "p24_pms_10", type: "mc", text: "情報伝達に関する記述で、正しい組み合わせを選びなさい。(2024年)", statements: ["a. 薬機法に、製造販売業者等は適正な使用のために必要な情報を収集・検討し、提供するよう努めなければならないと記載されている。","b. 教育訓練を受講していれば、伝達開始日より先に情報伝達を開始することについて問題ない。","c. 安全性速報(ブルーレター)は、最も緊急性の高い安全性情報の提供を行う際に作成される。","d. 添付文書の使用上の注意改訂は、薬生安通知によるほか、製造販売業者等が自主的に改訂を決定する場合もある。"], options: ["a正 b誤 c正 d正", "a正 b誤 c誤 d正", "a正 b誤 c誤 d誤", "a誤 b正 c正 d正", "a正 b正 c誤 d誤"], answer: 1, explanation: "b. 伝達期間(開始日、終了日)は遵守しなければならない。c. 最も緊急性が高いのは緊急安全性情報(イエローレター)。" }
            ]
          },
          product: {
            id: "exam_product", title: "製品基礎 (OSLO)", type: "sei",
            questions: [
              { id: "p24_1", type: "mc", text: "「下記の文章のa~cに当てはまる、正しい数字組み合わせを選びなさい。イノラス配合経腸用液は(a) kcal/mL、エネーボ配合経腸用液は(b) kcal/mL、エンシュア・Hは(c) kcal/mLである。", options: ["a. 1.5, b. 1.2, c. 1.6", "a. 1.5, b. 1.3, c. 1.6", "a. 1.6, b. 1.2, c. 1.5", "a. 1.6, b. 1.3, c. 1.5", "a. 1.6, b. 1.5, c. 1.3"], answer: 2, explanation: "イノラス1.6, エネーボ1.2, エンシュアH1.5" },
              { id: "p24_2", type: "mc", text: "経腸栄養製品の用法及び用量について、正しい正誤の組み合わせを選びなさい。", statements: ["a. イノラス配合経腸用液の成人標準量は、通常1日900〜1500kcalである。","b. ラコールNF配合経腸用液の成人標準量は、通常1日1200〜2000kcalである。","c. ラコールNF配合経腸用半固形剤の成人標準量は、通常1日1200〜1800kcalである。"], options: ["a. 正 b. 正 c. 正", "a. 誤 b. 正 c. 誤", "a. 誤 b. 正 c. 正", "a. 正 b. 誤 c. 正", "a. 正 b. 正 c. 誤"], answer: 4, explanation: "cのラコール半固形も1200〜2000kcalである。" },
              { id: "p24_3", type: "mc", text: "2024年3月5日告示のイノラス配合経腸用液 187.5mL 1パウチの薬価を選びなさい。", options: ["176.25円", "177.5円", "207.5円", "227.5円", "264.38円"], answer: 4, explanation: "264.38円である。" },
              { id: "p24_4", type: "mc", text: "イノラス配合経腸用液200kcalにおける食塩相当量は( )gである。", options: ["0.38", "0.46", "0.57", "0.69", "0.76"], answer: 1, explanation: "125mL(200kcal)は0.46g。" },
              { id: "p24_5", type: "mc", text: "イノラス配合経腸用液125mLと187.5mLの両規格でラインナップされているのは( )である。", options: ["コーヒーフレーバー", "紅茶フレーバー", "ヨーグルトフレーバー", "りんごフレーバー", "いちごフレーバー"], answer: 0, explanation: "コーヒーと紅茶が両方にある。" },
              { id: "p24_6", type: "mc", text: "同じ200kcalを摂取する場合でも、イノラス配合経腸用液ではラコールNF配合経腸用液よりも( )mL少ない量となる。", options: ["30", "45", "60", "75", "90"], answer: 3, explanation: "ラコール200mL, イノラス125mL。差は75mL。" },
              { id: "p24_7", type: "mc", text: "イノラス配合経腸用液を900kcal摂取した際に、1日必要量に対する充足率が60%未満となるビタミンは( )である。", options: ["ビタミンK", "ビタミンD", "ビタミンE", "ビタミンA", "葉酸"], answer: 0, explanation: "ワルファリンへの影響を考慮しビタミンKは少なめ。" },
              { id: "p24_8", type: "mc", text: "経腸栄養製品について、過去に一度でも不採算再算定による値上げがあった薬剤を正、なかった薬剤を誤として、正しい組み合わせを選びなさい。", statements: ["a. イノラス配合経腸用液","b. ラコールNF配合経腸用液","c. ラコールNF配合経腸用半固形剤"], options: ["a.誤 b.誤 c.誤", "a.誤 b.正 c.誤", "a.正 b.正 c.正", "a.誤 b.正 c.正", "a.正 b.誤 c.誤"], answer: 0, explanation: "全て値上げはない。" },
              { id: "p24_9", type: "mc", text: "100kcal当たりに配合されている蛋白質量はラコール配合経腸用液は(a)g、イノラス配合経腸用液は(b)gである。", options: ["a. 3.5 b. 4.5", "a. 3.5 b. 4.0", "a. 4.0 b. 4.5", "a. 4.0 b. 4.38", "a. 4.38 b. 4.0"], answer: 4, explanation: "ラコール4.38g, イノラス4.0g。" },
              { id: "p24_10", type: "mc", text: "ハイネックスイーゲルとハイネックスイーゲルLCのタンパク源として、正しいものを選びなさい。", options: ["「コラーゲンペプチド」「大豆ペプチド」「乳タンパク質」「アミノ酸」の4種類", "「コラーゲンペプチド」「大豆ペプチド」「乳タンパク質」の3種類", "「コラーゲンペプチド」「大豆ペプチド」「アミノ酸」の3種類", "「大豆ペプチド」「乳タンパク質」「アミノ酸」の3種類", "「コラーゲンペプチド」「大豆ペプチド」の2種類"], answer: 2, explanation: "コラーゲンペプチド、大豆ペプチド、アミノ酸の3種類。" },
              { id: "p24_11", type: "mc", text: "ハイネックスイーゲルとハイネックスイーゲルLCの栄養素について、正しいものを選びなさい。", options: ["炭水化物のエネルギー比率はハイネックスイーゲルの方が低い。", "脂質のエネルギー比率はハイネックスイーゲルの方が高い。", "タンパク質のエネルギー比率はハイネックスイーゲルの方が高い。", "どちらも食物繊維としてペクチンを含有している。", "どちらも糖質源としてマルトデキストリンと精製白糖を含有している。"], answer: 3, explanation: "どちらも食物繊維としてペクチンを含有している。" },
              { id: "p24_12", type: "mc", text: "ハイネックスイーゲル、ハイネックスイーゲルLCと同じ、粘度可変タイプの製品を選びなさい。", options: ["ペプタメンAF", "マーメッドワン", "ペプチーノ", "明治メイフロー", "エコフロー"], answer: 3, explanation: "明治メイフロー、エコフローなどがとろみ状流動食。解答はPDFに従いメイフロー。" },
              { id: "p24_13", type: "mc", text: "ハイネックスイーゲル、ハイネックスイーゲルLCの共通点として、間違っているものを選びなさい。", options: ["カロリー濃度 0.8kcal/mL", "同じゲル化メカニズム", "消化態タイプ", "全脂質の約34%がMCT", "脂肪酸 n-3:n-6の比率が 1:3"], answer: 4, explanation: "LCは1:2であるため共通ではない。" },
              { id: "p24_14", type: "mc", text: "ハイネックスリニュートについて、間違っているものを選びなさい。", options: ["カロリー濃度 1.0kcal/mL", "L-カルニチンを配合", "コラーゲンペプチド、大豆ペプチドとアミノ酸を使用した消化態タイプ", "ハイネックスイーゲルと同量のビタミンB1を配合(1kcal当たり)", "全脂質の50%がMCT"], answer: 3, explanation: "ビタミンB1はリニュートの方が大幅に増量されている。" },
              { id: "p24_15", type: "mc", text: "下のグラフはハイネックスイーゲル、ハイネックスイーゲルLC、ハイネックスリニュート、いずれかのエネルギー産生栄養素バランスを表したものである。a.b.c.がそれぞれどの製品を表しているのか、正しい組み合わせを選びなさい。\n(a:炭50脂34タン16, b:炭64脂20タン16, c:炭26脂50タン24)", options: ["a. ハイネックスイーゲルLC b. ハイネックスイーゲル c. ハイネックスリニュート", "a. ハイネックスイーゲル b. ハイネックスイーゲルLC c. ハイネックスリニュート", "a. ハイネックスリニュート b. ハイネックスイーゲル c. ハイネックスイーゲルLC", "a. ハイネックスイーゲル b. ハイネックスリニュート c. ハイネックスイーゲルLC", "a. ハイネックスイーゲルLC b. ハイネックスリニュート c. ハイネックスイーゲル"], answer: 0, explanation: "a=LC, b=イーゲル, c=リニュート (PDF解答①による)。" },
              { id: "p24_16", type: "mc", text: "ハイネックスイーゲル、ハイネックスイーゲルLC、ハイネックスリニュートについての記載として、正しい正誤の組み合わせを選びなさい。", statements: ["a. 1kcal当たりのタンパク質量はハイネックスリニュートが最も多い。","b. 製品規格はハイネックスイーゲルが2種類、ハイネックスイーゲルLCが3種類、ハイネックスリニュートが1種類である。","c. ハイネックスリニュートのみDHAとEPAを配合している。"], options: ["a.正 b.正 c.正", "a.正 b.正 c.誤", "a.誤 b.正 c.正", "a.誤 b.誤 c.正", "a.誤 b.誤 c.誤"], answer: 0, explanation: "すべて正しい。" },
              { id: "p24_17", type: "mc", text: "ハイネックスゼリー1袋の、希望小売価格(税抜き)を選びなさい。", options: ["315円", "330円", "345円", "360円", "375円"], answer: 1, explanation: "330円である。" },
              { id: "p24_18", type: "mc", text: "ハイネックスゼリーの特徴として、間違っているものを選びなさい。", options: ["寒天で固めたゼリータイプの濃厚流動食品である。", "日本人の食事摂取基準(2020年版)を参考に各種栄養素を調整している。", "900kcalの摂取で1日に必要なビタミン・微量元素をほぼ充足できる配合設計となっている。", "エネルギー産生栄養素のバランスはタンパク質18%、脂質25%、炭水化物57%である。", "粘度は6000mPa・s(B型粘度計・12回転/分・20℃)である。"], answer: 4, explanation: "粘度は約8700mPa・sである。" },
              { id: "p24_19", type: "mc", text: "ハイネックスゼリーの特徴として、間違っているものを選びなさい。", options: ["食物繊維としてイヌリンを配合している。", "L-カルニチンを配合している。", "水分比率はラコールNF配合経腸用半固形剤よりも高い。", "脂肪酸 n-3:n-6の比率は 1:3である。", "賞味期限は製造日より8ヵ月である。"], answer: 2, explanation: "水分比率はどちらも76%で同じ。" },
              { id: "p24_20", type: "mc", text: "ハイネゼリーとハイネックスゼリーの共通点として、間違っているものを選びなさい。", options: ["1袋の容量は300gである。", "1.0kcal/gである。", "アレルギー成分は同じである。", "タンパク源としてコラーゲンペプチドを含んでいる。", "同じサイズの容器を用いている。"], answer: 4, explanation: "ハイネックスゼリーは加圧を考慮し長くなっている。" },
              { id: "p24_21", type: "mc", text: "アクトリーンの製品特徴について、正しい正誤の組み合わせを選びなさい。", statements: ["a. カテーテルは植物由来のグリセリンと蒸留水を使用したゲル状の潤滑剤でコーティングされている。","b. 潤滑剤は乾きにくく、開封120分後の水分蒸散率10%である。","c. 重大な有害事象として、尿路感染、膀胱・尿道損傷、出血、尿道炎症がある。","d. 再利用型カテーテルである。"], options: ["a.正 b.誤 c.正 d.正", "a.正 b.正 c.誤 d.誤", "a.誤 b.正 c.誤 d.正", "a.正 b.正 c.正 d.誤", "a.誤 b.誤 c.正 d.正"], answer: 3, explanation: "dは単回使用型である。" },
              { id: "p24_22", type: "mc", text: "アクトリーンについて、正しい正誤の組み合わせを選びなさい。", statements: ["a. ハイライトカテは先端の形状によりネラトン型とチーマン型の2種類がある。","b. ミニのカテーテル長は全て90mmである。","c. ハイライトセットの採尿バッグ容量は1000mLである。","d. ミニセットの採尿バッグ容量は700mLである。"], options: ["a.正 b.正 c.正 d.正", "a.誤 b.正 c.正 d.正", "a.誤 b.誤 c.正 d.正", "a.正 b.誤 c.誤 d.誤", "a.正 b.正 c.誤 d.誤"], answer: 0, explanation: "全て正しい。" },
              { id: "p24_23", type: "mc", text: "OTバルーンカテーテルについて、間違っているものを選びなさい。", options: ["再利用型で使用期間は30日以内である。", "フィルターキャップはフタを閉じている時、空気も液体も通過させない。", "12、14、16Frの3サイズある。", "膀胱留置する際に使用するバルブは一方弁になっている。", "本製品は未滅菌、未消毒である。"], answer: 1, explanation: "疎水性フィルターは空気は通過するが液体は通過しない。" },
              { id: "p24_24", type: "mc", text: "OTバルーンカテーテル使用時の a〜c の操作を、実際の手順通りに並べ替えた場合、正しい組み合わせとなるものを選びなさい。", statements: ["a. 膀胱内にカテーテルのバルーン部を挿入し尿が出てくるまで挿入する。尿が確認できたら更に5cm押し込む。","b. フィルターキャップのフタを開けて排尿する。","c. リザーバーをバルブに差し込み、滅菌水を注入してバルーンを膨張させる。リザーバーを取り外し、バルーンからの液漏れがないことを確認する。"], options: ["b-c-a", "a-b-c", "a-c-b", "c-a-b", "c-b-a"], answer: 3, explanation: "バルーン確認(c) -> 挿入(a) -> 排尿(b) の順。" },
              { id: "p24_25", type: "mc", text: "リリアムワンについて、間違っている記載を選びなさい。", options: ["使用目的又は効果は超音波を用いて膀胱の性状から尿動態を可視化し、診断のために提供することである。", "管理医療機器(クラスII)かつ特定保守管理医療機器である。", "測定精度は± (15%+20mL)である。", "3回の測定結果の平均値を膀胱内尿量と判断する。", "膀胱内に尿が少なかった場合、インジケーターは1つも点灯しないことがある。"], answer: 3, explanation: "3回の測定結果の「最大値」を判断する。" },
              { id: "p24_26", type: "mc", text: "リリアムワンの下記インジケータの表示について、正しい正誤の組み合わせを選びなさい。\n(a=全体をとらえられていない, b=1回はとらえている, c=全体をとらえられている)", statements: ["a. 膀胱全体を超音波がとらえられていない可能性がある。","b. 1回は膀胱全体を超音波がとらえられている。","c. 膀胱全体を超音波がとらえられている。"], options: ["a.正 b.正 c.正", "a.誤 b.誤 c.正", "a.誤 b.正 c.正", "a.誤 b.正 c.誤", "a.正 b.誤 c.誤"], answer: 1, explanation: "PDF解答に基づく。" },
              { id: "p24_27", type: "mc", text: "エネフリード輸液の製剤学的特性について、間違っている記載を選びなさい。", options: ["アミノ酸、ブドウ糖、電解質に加えて脂肪及び水溶性ビタミン9種類をダブルバッグに一剤化したPPN用キット製剤である。", "アミノ酸組成は、TEO基準に従い、18種類のアミノ酸から成り、分岐鎖アミノ酸を30w/w%含有している。", "水溶性ビタミン9種類を含むが投与時に遮光カバーは不要である。", "脂肪源の大豆油は、必須脂肪酸であるリノール酸、リノレン酸を約60%含んでおり、これらを含む脂肪酸を補給できる。", "エネルギー産生栄養素バランスは、たんぱく質(アミノ酸)19%、脂質32%、炭水化物48%となっている。"], answer: 2, explanation: "水溶性ビタミンを含むため遮光カバーが必要。" },
              { id: "p24_28", type: "mc", text: "エネフリード輸液 投与時の管理について、間違っている記載を選びなさい。", options: ["他の薬剤を混注できない。", "ビタミンの光分解を防ぐため、遮光カバーを用いる。", "他の薬剤を投与するときは輸液ライン側管から投与する。", "除菌用ファイナルフィルターは使用できない。", "輸液ラインの接合部は消毒操作を徹底する。"], answer: 2, explanation: "側管から他の薬剤を投与できない。" },
              { id: "p24_29", type: "mc", text: "エネフリード輸液のNPC/N比について、正しい数値を選びなさい。", options: ["64", "71", "105", "149", "153"], answer: 3, explanation: "149である。" },

              { id: "p24_31", type: "mc", text: "エネフリード輸液550mLの記載について、間違っている記載を選びなさい。", options: ["糖濃度は7.5%である。", "精製大豆油は10gである。", "エネルギーは310kcalである。", "水溶性ビタミンの処方は、FDA2000処方を参考にしている。", "アミノ酸は15gである。"], answer: 0, explanation: "糖濃度は6.8%。7.5%はビーフリード。" },
              { id: "p24_32", type: "mc", text: "医薬部外品 ヒノーラに含まれる薬用成分について、正しい正誤の組み合わせを選びなさい。", statements: ["a. ヒノキチオール","b. ヒアルロン酸ナトリウム","c. グリチルリチン酸ジカリウム","d. IPMP"], options: ["a.正 b.正 c.誤 d.誤", "a.正 b.誤 c.誤 d.正", "a.誤 b.正 c.正 d.誤", "a.正 b.誤 c.正 d.正", "a.誤 b.正 c.正 d.誤"], answer: 3, explanation: "bのヒアルロン酸は保湿剤であり薬用成分(有効成分)ではない。" },
              { id: "p24_33", type: "mc", text: "ヒノーラの製品紹介スライドにある基礎試験について、正しい文章を選びなさい。", options: ["Disc diffusion assayにおいて、濃度依存的に阻止円の直径が大きくなった。", "Microorganism turbidity assayにおいてヒノーラを添加した場合、使用したすべての真菌および細菌のバイオフィルム形成が抑制された。", "Crystal violet assayにおいてヒノーラを添加した場合、使用したすべての真菌および細菌に対し増殖が抑制された。", "Germ tube testにおいて、ヒノーラを添加した培地では、C. albicans の顕著な菌糸形成が認められた。", "Germ tube testにおいて、ヒノーラを添加していない培地では、多くが酵母形のままだった。"], answer: 0, explanation: "①が正しい。②③は試験名と内容が逆等。" },
              { id: "p24_34", type: "mc", text: "大塚生食注50mLソフトバッグについて、正しい正誤の組み合わせを選びなさい。", statements: ["a. 混注可能量とは、「表示量」+「容器内の空気を抜いて混注できる薬液の量」で100mLである。","b. 常用全満量とは、「表示量」+「混注可能量」(容器内の空気は残したまま)で150mLである。","c. 容器全満量とは、容器内の空気は残したまま、混注できる薬液の量で195mLである。"], options: ["a.正 b.正 c.正", "a.正 b.誤 c.誤", "a.誤 b.誤 c.正", "a.誤 b.正 c.誤", "a.誤 b.誤 c.誤"], answer: 2, explanation: "aは空気を残して100mL。bは空気を抜いて150mL。cは空気を残して195mL。" },
              { id: "p24_35", type: "mc", text: "大塚生食注50mLソフトバッグの、使用期限はどれか選びなさい。", options: ["1年", "2年", "3年", "4年", "5年"], answer: 2, explanation: "3年である。" },
              { id: "p24_36", type: "mc", text: "浸透圧の説明について、誤っているものを選びなさい。", options: ["水は浸透圧の低い方から高い方へ移動する", "浸透圧を表す単位はmOsm/Lである。", "ブドウ糖はイオン化する物質である。", "体液の浸透圧の基準値は「約285mOsm/L」である。", "イオン化しない物質の場合には、浸透圧とモル濃度は等しい"], answer: 2, explanation: "ブドウ糖はイオン化しない。" },
              { id: "p24_37", type: "mc", text: "輸液の投与速度について、電解質の最大投与速度として、正しいものはどれか選びなさい。", options: ["K+: 40mEq/hr", "Na+: 140mEq/hr", "Ca2+: 20mEq/hr", "Mg2+: 5mEq/hr", "HCO3-: 24mEq/hr"], answer: 2, explanation: "Caは20mEq/hr。Naは100, Kは20。" },
              { id: "p24_38", type: "mc", text: "アミノ酸や蛋白質の説明として、正しいものを選びなさい。", options: ["アミノ酸とは、メチル基とカルボキシル基を同時に持つ化合物の総称である。", "アミノ酸は、生体内ではD体のみである。", "アミノ酸は単体で立体構造を持つ。", "蛋白質の代表的なものとしてアルブミンがある。", "蛋白質の消化酵素トリプシンは胃液中に存在する。"], answer: 3, explanation: "アミノ基とカルボキシル基。L体。立体はタンパク質。トリプシンは膵液。" },
              { id: "p24_39", type: "mc", text: "脂肪酸の分類について、中鎖脂肪酸はどれか選びなさい。", options: ["リノール酸", "リノレン酸", "カプリル酸", "オレイン酸", "エイコサペンタエン酸"], answer: 2, explanation: "カプリル酸以外は長鎖脂肪酸。" },

              { id: "p24_41", type: "mc", text: "末梢静脈栄養における「血管痛・静脈炎の予防と対策」として、間違っているものを選びなさい。", options: ["高浸透圧の場合、糖濃度を下げる。", "できるだけ大きい径のカニューラを使用する。", "できるだけ血流の多い上肢の太い静脈に留置する。", "なるべく中性に近いpHの輸液を選択する。", "なるべく緩徐に投与する。"], answer: 1, explanation: "必要最小径のカニューラを使用する。" },
              { id: "p24_42", type: "mc", text: "飢餓時のブドウ糖投与による体蛋白の節約効果を見たGambleデータについて、a〜cに当てはまる語句を選びなさい。", statements: ["飢餓状態では、体蛋白の異化により、6日間で約(a)の蛋白質が喪失した。これは筋肉量に換算すると約(b)に相当する。この時ブドウ糖を投与すると蛋白の異化が抑制され、100g/日の投与で蛋白質喪失量は6日間で約(c)となった。"], options: ["a. 400g b. 2kg c. 200g", "a. 400g b. 1kg c. 200g", "a. 200g b. 2kg c. 100g", "a. 200g b. 1kg c. 100g", "a. 200g b. 1kg c. 50g"], answer: 0, explanation: "a=400g, b=2kg, c=200g。" },
              { id: "p24_43", type: "mc", text: "ストレスホルモンの糖代謝への影響について、()内に当てはまる語句を選びなさい。", statements: ["()は、侵襲時に副腎より分泌され、肝における糖新生、骨格筋における蛋白異化を促進し、抗炎症作用や免疫抑制などの作用がある。"], options: ["カテコールアミン", "コルチゾール", "成長ホルモン", "グルカゴン", "インスリン"], answer: 1, explanation: "コルチゾール。" },
              { id: "p24_44", type: "mc", text: "1997年の「高カロリー輸液療法施行中のアシドーシス」に関する適正使用情報について、ビタミンB1欠乏によると思われるアシドーシスが発現した場合のビタミンB1投与量についての記載で、正しいものを選びなさい。", options: ["1〜10mg", "10〜40mg", "50〜90mg", "100〜400mg", "500〜900mg"], answer: 3, explanation: "100〜400mg。" },

              { id: "p24_46", type: "mc", text: "胃瘻カテーテルの説明について、正しいものはどれか選びなさい。", options: ["バルーン型は、交換間隔が24時間以上留置の場合、保険料算定が可能である。", "バンパー型は、交換までの期間が長く、2か月以上留置の場合、保険料算定が可能である。", "ボタン型は、逆流防止機能があるが、カテーテルの汚染は多い。", "ボタン型は、指先でボタンを開閉しにくい場合があり、事故抜去も多い。", "チューブ型は、投与時の栄養チューブとの接続が容易でありチューブ内の汚染も起きにくい。"], answer: 0, explanation: "PDF解答の解説部分に基づく。" },
              { id: "p24_47", type: "mc", text: "経腸栄養の「半固形栄養法」について、正しい正誤の組み合わせを選びなさい。", statements: ["a. 胃の機能が不十分な場合でも液体栄養よりも望ましい方法である。","b. 胃食道逆流や誤嚥性肺炎、下痢、ダンピングなど経腸栄養管理を行う上で問題となる合併症の予防策になり得る。","c. ミキサー食は、粘度調節が不要であるがコストは高い。","d. 胃の機能が正常である場合、半固形栄養を注入したとき、胃の貯留能と排出能を得ることが可能である。"], options: ["a.正 b.誤 c.正 d.誤", "a.誤 b.正 c.正 d.誤", "a.誤 b.正 c.誤 d.正", "a.誤 b.誤 c.正 d.正", "a.正 b.正 c.誤 d.誤"], answer: 2, explanation: "a誤 b正 c誤 d正。" },
              { id: "p24_48", type: "mc", text: "「酸素解離曲線」の説明で、正しい正誤の組み合わせを選びなさい。", statements: ["a. 一般的に、酸素分圧が高くなると、酸素飽和度は高くなる。","b. pHが低下した場合には酸素解離曲線の右偏が起こる。","c. 急激なアシドーシスの是正は、Hbの酸素解離曲線の左偏を起こし、組織での酸素欠乏を起こす可能性がある。","d. 二酸化炭素分圧(PCO2)が上昇した場合、酸素解離曲線の左偏が起こる。"], options: ["a.正 b.正 c.誤 d.誤", "a.正 b.誤 c.正 d.誤", "a.正 b.誤 c.誤 d.正", "a.誤 b.正 c.誤 d.正", "a.誤 b.誤 c.正 d.正"], answer: 1, explanation: "PDF解答表の「解答は②(正, 誤, 正, 誤)」に従う。" },
              { id: "p24_49", type: "mc", text: "MRに求められる行動について、ふさわしいものはどれか選びなさい。", options: ["アポイントの取れない医師を病院のトイレの前で待っていた。", "担当先の病院の駐車場がいつも混んでいるため朝早くいって場所を確保した。", "病院内で、自分のオフィスのようにスマートフォンを操作した。", "病院の混んでいる待合室で座って待っていた。", "医療者と面談するため、あらかじめ院内ルールを確認した。"], answer: 4, explanation: "あらかじめ院内ルールを確認した。" },
