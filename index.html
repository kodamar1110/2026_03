    // --- COMPREHENSIVE QUESTION DATABASE ---
    const CATEGORIES = {
      exam2026: {
        id: "exam2026", title: "大項目カテゴリー1（2026年統一試験問題）", icon: "BookOpen",
        subcategories: {
          oplus: {
            id: "oplus2026", title: "O-PLUS 公開問題", type: "sei",
            questions: [
              { id: "o26_1", type: "tf", text: "リアルワールドデータを用いた入院患者 55,000 例の TPN 調査では、脂肪を含む静脈栄養管理が多く行われている現状が明らかになった。", answer: false, explanation: "脂肪はほとんど投与されていなかった。" },
              { id: "o26_2", type: "tf", text: "低栄養患者に対する栄養サポート実施の効果を検証したスイスのデータベース研究において、栄養サポート実施群では非実施群と比べて院内30日死亡率・再入院率が減少していた。", answer: true, explanation: "" },
              { id: "o26_3", type: "tf", text: "中間的静脈栄養IPN: Intermediate Parenteral Nutrition とは、PPNとTPNの適応期間の中間にあたる1〜2週間程度の静脈栄養管理を指す。", answer: true, explanation: "" },
              { id: "o26_4", type: "tf", text: "IPN を検討すべき症例として、腸管安静を必要とする病態、嚥下障害のある病態、通過障害のある病態、などがあげられる。", answer: true, explanation: "" },
              { id: "o26_5", type: "tf", text: "静脈経腸栄養ガイドライン(第3版)では、血栓性静脈炎予防の観点から PPN 製剤と脂肪乳剤の同時投与は避けるべきであるとされている。", answer: false, explanation: "PPN製剤と脂肪乳剤を同時に投与することにより浸透圧を下げることができるため、血栓性静脈炎の予防に有用であると記載されている。" },
              { id: "o26_6", type: "tf", text: "キドパレンの臨床第三相試験で、キドパレン(本剤) 群の6割以上がステージ G5D (透析期の患者)であった。", answer: true, explanation: "" },
              { id: "o26_7", type: "tf", text: "透析患者の原疾患の第一位は糖尿病性腎症で、死亡原因の第一位は感染症である。", answer: true, explanation: "" },
              { id: "o26_8", type: "tf", text: "「急性または慢性腎臓病の入院患者における臨床栄養に関する ESPEN 実践ガイドライン」の中で、「腎機能異常は、腎臓内科や内科病棟、外科病棟、集中治療(ICU)などさまざまな臨床場面で入院患者の間に広くみられる」という記載がある。", answer: true, explanation: "" },
              { id: "o26_9", type: "tf", text: "CKD の患者さんがAKI を発症する事はほとんどない。", answer: false, explanation: "CKDを基礎に有する者はAKI発症のリスクが高く、たとえ腎機能が前値に回復した場合でもCKDの進行が速まるリスクが上がる。" },
              { id: "o26_10", type: "tf", text: "RRT(腎代替療法)を受けている患者では、水溶性ビタミン(ビタミンB1、B6、C、葉酸)が透析により失われるため、補充を考慮する。", answer: true, explanation: "" },
              { id: "o26_11", type: "tf", text: "小児の発育段階はいくつかの区分に分かれており、新生児期とは「生まれてから1歳まで」の間を指す。", answer: false, explanation: "新生児期は生後28日まで。生後29日から1歳は乳児期とされる。" },
              { id: "o26_12", type: "tf", text: "医療事故の再発防止に向けた提言第 6 号に記載されている、経鼻胃管留置位置確認方法の一覧表には X線/X線造影のデメリットは特に記載されていない。", answer: false, explanation: "「誤読の可能性がある」旨がデメリットとして記載されている。" },
              { id: "o26_13", type: "tf", text: "患者によっては腎臓や回腸が胃に覆いかぶさってタムガイドの赤色光を遮ってしまい、腹壁で赤色光を確認できない可能性がある。", answer: false, explanation: "腎臓・肝臓、回腸⇒横行結腸。" },
              { id: "o26_14", type: "tf", text: "ICU 入室患者では嚥下機能の低下や意識障害によって咳嗽反射が無い場合も多く、一般的に経鼻胃管の挿入が難しいと考えられる。", answer: true, explanation: "" },
              { id: "o26_15", type: "tf", text: "関西医科大学小児外科教室で、タムガイドとX線検査による経鼻胃管留置位置確認に関して検討した結果、1例を除いてタムガイドとX線検査の結果が一致していた。", answer: true, explanation: "" },
              { id: "o26_16", type: "tf", text: "「リアルワールドデータ研究からみるアミノ酸処方量と予後の関連」で、静脈栄養管理におけるアミノ酸投与推奨量は、国内のガイドラインでは 0.8〜1.0g/kg/日、米国のガイドラインでは0.8〜1.5g/kg/日とされている。", answer: true, explanation: "" },
              { id: "o26_17", type: "tf", text: "内科系静脈栄養患者を対象としたリアルワールドデータの調査対象は、絶食期間が10日を超える入院患者(年齢≥18歳)で、絶食開始後4〜10日目の経静脈的平均アミノ酸処方量を調査・検討している。", answer: true, explanation: "" },
              { id: "o26_18", type: "tf", text: "内科系静脈栄養患者を対象としたリアルワールドデータの主要評価項目は院内死亡で、絶食開始後4〜10日目の経静脈的平均アミノ酸処方量の減少と、院内死亡の増加との関連が認められた。", answer: true, explanation: "" },
              { id: "o26_19", type: "tf", text: "内科系静脈栄養患者を対象としたリアルワールドデータの副次評価項目の一つに在院日数があり、リファレンスである Adequate 群に比べて、Moderate 群は1.2日、Low 群は1.5日、Very low 群は2.9日 在院日数が長いという結果であった。", answer: true, explanation: "" },
              { id: "o26_20", type: "tf", text: "EFFORT試験：低栄養リスクのある外科の入院患者を対象とした研究である。", answer: false, explanation: "内科の入院患者である。" },
              { id: "o26_21", type: "tf", text: "EFFORT試験：栄養介入の約40%は静脈栄養によるサポートであった。", answer: false, explanation: "約90%は食事やONSなどの経口栄養であった。" },
              { id: "o26_22", type: "tf", text: "EFFORT試験：個別化された栄養サポートが30日以内の全死亡率や身体機能の低下のリスクを減少させることが示された。", answer: true, explanation: "" },
              { id: "o26_23", type: "tf", text: "EFFORT試験：平均在院日数は約9日で、急性期の短期間の栄養介入の効果をみた試験と言える。", answer: true, explanation: "" },
              { id: "o26_24", type: "tf", text: "誤嚥性肺炎リアルワールドデータ研究：65歳以上の誤嚥性肺炎入院患者で、7日以上絶食となっている患者が対象となっている。", answer: true, explanation: "" },
              { id: "o26_25", type: "tf", text: "誤嚥性肺炎リアルワールドデータ研究：経静脈的なエネルギー・アミノ酸の処方量の増加が院内死亡の低下と関連していた。", answer: false, explanation: "エネルギー処方量の増加は院内死亡率に影響を与えなかった。" },
              { id: "o26_26", type: "tf", text: "誤嚥性肺炎リアルワールドデータ研究：本研究の在院日数の中央値は30日を超えていた。", answer: true, explanation: "" },
              { id: "o26_27", type: "tf", text: "誤嚥性肺炎リアルワールドデータ研究：アミノ酸の処方量が0.6g/kg/日を超える患者は、アミノ酸が処方されていない患者と比べて入院期間が短縮していた。", answer: true, explanation: "" },
              { id: "o26_28", type: "tf", text: "JSPENで2014年に行われたアンケート結果から、経腸栄養実施中に経験する消化器合併症として下痢をあげた施設が80%以上に及んだ。", answer: true, explanation: "" },
              { id: "o26_29", type: "tf", text: "経腸栄養関連下痢対策のためのアルゴリズムにおいて、経腸栄養実施中に下痢を認めたらただちに投与速度を下げることが示されている。", answer: false, explanation: "下痢を認めたら水様性下痢の頻度や発熱・白血球数/CRPを確認し、その後の方策を考えるフローが示されている。" },
              { id: "o26_30", type: "tf", text: "半固形化栄養法は消化器合併症対策として活用されており、メタ解析においても下痢の低減に有用であることが示された。", answer: false, explanation: "胃食道逆流の低減等に有用であることが示されており、下痢に対する有用性は示されていない。" },
              { id: "o26_31", type: "tf", text: "1.6kcal/mLの経腸栄養剤(イノラス)の水分比率は80%である。", answer: false, explanation: "1.6kcal/mL 経腸栄養剤(イノラス)の水分比率は75%である。" },
              { id: "o26_32", type: "tf", text: "腸内細菌叢に負の影響を与える因子としては薬剤の影響が大きく、PPIは特にその影響が大きいことが示されている。", answer: true, explanation: "" },
              { id: "o26_33", type: "tf", text: "ディスバイオシスの影響から下痢に至る経路、便秘に至る経路いずれも想定されている。", answer: true, explanation: "" },
              { id: "o26_34", type: "tf", text: "水溶性食物繊維は蠕動運動を促進することで便秘に役割を果たし、不溶性食物繊維は短鎖脂肪酸を産生することで下痢に対する効果を示す。", answer: false, explanation: "水溶性食物繊維は主に発酵性が高く短鎖脂肪酸を産生し下痢に効果を示し、不溶性食物繊維は便の形成や排便促進に役立ち便秘に効果を示す。" },
              { id: "o26_35", type: "tf", text: "腸内細菌の種類は1000種類以上であり、細菌数として100兆個程度とされている。", answer: true, explanation: "" },
              { id: "o26_36", type: "tf", text: "がん悪液質の診断基準の一つとして、「過去6か月間で5%を超える体重減少」が提唱されている。", answer: true, explanation: "" },
              { id: "o26_37", type: "tf", text: "がん悪液質の有病率を調査した海外の研究では、「過去6ヶ月で5%を超える体重減少」で定義した場合、膵癌＞胃・食道癌＞頭頸部癌の順に悪液質の有病率が高い事が示されている。", answer: true, explanation: "" },
              { id: "o26_38", type: "tf", text: "日本肺癌学会のデータベース研究では、がん悪液質と診断された群は、がん悪液質でない群と比べて抗がん剤の奏効率が低く、生命予後が不良である事が示されている。", answer: true, explanation: "" },
              { id: "o26_39", type: "tf", text: "がん悪液質は「通常の栄養サポートでは完全に回復することができず、進行性の機能障害に至る」とされ、栄養療法を実施する意義はないとされている。", answer: false, explanation: "栄養療法のみでは回復できないという意味であり、悪液質の症状に応じたマルチモーダル(多面的)な介入が推奨されている。" },
              { id: "o26_40", type: "tf", text: "ESMOガイドラインでは、予測される予後が数ヵ月未満(3-6か月未満)の患者では、栄養療法の侵襲性を低下させることが推奨され、栄養カウンセリングおよび ONS(経口的栄養補助)が望ましいと記載されている。", answer: true, explanation: "" },
              { id: "o26_41", type: "tf", text: "ESMOガイドラインでは「がん悪液質」は、低栄養診断となるGLIM基準および全身性炎症の存在に基づく疾患関連低栄養として定義することが推奨されている。", answer: true, explanation: "" },
              { id: "o26_42", type: "tf", text: "ハイネックスゼリーの粘度の参考とした、胃食道逆流の抑制が期待できる粘度(6,000〜10,000mPa s)はB型粘度計6回転/分で試験をしている。", answer: false, explanation: "B型粘度計 12回転/分である。" },
              { id: "o26_43", type: "tf", text: "ハイネックスゼリーとイノソリッド配合経腸用半固形剤の粘度は同等である。", answer: true, explanation: "" },
              { id: "o26_44", type: "tf", text: "コラーゲンペプチド (CP) の機能性リーフレット (08896)は、ハイネックスゼリーの報告として紹介できる。", answer: false, explanation: "栄養素の機能性の情報提供であり、ハイネックスシリーズの報告ではない。" },
              { id: "o26_45", type: "tf", text: "ハイネックスゼリーとイノソリッド配合経腸用半固形剤の1袋あたりの食塩相当量は同量(1日標準量において食塩相当量が3〜5g)である。", answer: false, explanation: "1袋あたり、ラコール半固形0.57g、イノソリッド1g、ハイネックスゼリー1.35gである。" },
              { id: "o26_46", type: "tf", text: "ハイネックスゼリーとイノソリッド配合経腸用半固形剤の900kcalあたりのカリウムの量は、ラコール NF 配合経腸用半固形剤の1600kcalあたりと同量である。", answer: false, explanation: "ラコール NF 配合経腸用半固形剤の1200kcalあたりと同量(1656mg)である。" },
              { id: "o26_47", type: "tf", text: "ハイネックスゼリーとイノソリッド配合経腸用半固形剤の900kcalあたりのカリウムの量は、「慢性腎臓病に対する食事療法基準 2014年版」 ステージ4のカリウム量より多い。", answer: true, explanation: "" },
              { id: "o26_48", type: "tf", text: "清潔間欠自己導尿 (CIC) の目的の1つとして、カテーテル留置からの解放により患者の活動性・QOLを向上させることがあげられる。", answer: true, explanation: "" },
              { id: "o26_49", type: "tf", text: "在宅 CIC患者は増加しており、(親水性と非親水性では) 親水性カテーテルのみ算定患者数は増加している。", answer: false, explanation: "すべてのカテーテルで算定患者数は増加している。" },
              { id: "o26_50", type: "tf", text: "再利用型カテーテルでは、カテーテルと保存用ケースがセットになっており、ケースの消毒液は導尿時に毎回交換する。", answer: false, explanation: "消毒液は1日1回交換する。" },
              { id: "o26_51", type: "tf", text: "令和2年診療報酬改定により、特殊カテーテル加算は、親水性コーティングを有するものは1700点・1900点・2100点と、本数にあわせて3段階の点数を算定できるようになった。", answer: true, explanation: "" },
              { id: "o26_52", type: "tf", text: "各カテーテルのコストシミュレーションにより、施設の差益を考えると、単価の高い親水性カテーテルを使うことで施設の差益は減る。", answer: false, explanation: "施設の差益は収入と支出の差を考えるため、親水性カテーテルを使うことで必ずしも減るとはいえない。" },
              { id: "o26_53", type: "tf", text: "再利用型カテーテルと親水性カテーテルの併用メソッド提案は、例としては、1日の導尿回数が多い方、外出時に導尿を行う方、などに提案を行う。", answer: true, explanation: "" },
              { id: "o26_54", type: "tf", text: "サルコペニアは「筋肉」の「減少」を意味するギリシア語が語源となっており、加齢以外にも様々な原因で発症する事が示されている。", answer: true, explanation: "" },
              { id: "o26_55", type: "tf", text: "がん患者の場合、CTで第3腰椎部(L3)の筋肉の面積を計測して、身長の2乗で補正し、SMI(骨格筋指数)を算出している研究が多い。", answer: true, explanation: "" },
              { id: "o26_56", type: "tf", text: "東大病院の消化器がん・泌尿器がん患者の研究では、Fujiwara基準に基づくサルコペニアの有病率は17.8%であり、他の診断基準を使うよりも予後の予測能力が高い事が示された。", answer: true, explanation: "" },
              { id: "o26_57", type: "tf", text: "プレハビリテーションとは術前から栄養・運動、心理的なサポートを実施し、患者さんの身体機能や筋肉量を維持する取り組みで貯筋活動ともいえる。", answer: true, explanation: "" },
              { id: "o26_58", type: "tf", text: "腹部外科手術を対象にした最近のメタ解析では、プレハビリテーションとして運動だけでなく、栄養も取り入れた方が身体機能の向上と術後合併症の軽減が期待できる事が示されている。", answer: true, explanation: "" },
              { id: "o26_59", type: "tf", text: "日本食道学会のアンケート調査によると、NAC (術前補助化学療法)中のプレハビリテーション導入率は89%である事が示されている。", answer: false, explanation: "89%が誤り。導入率は39%であった。" },
              { id: "o26_60", type: "tf", text: "排尿障害で多いものとして 前立腺肥大症、過活動膀胱、夜間頻尿が挙げられる。", answer: true, explanation: "" },
              { id: "o26_61", type: "tf", text: "18歳以上を対象とした日本の国民健康調査を用いた横断研究によると、過活動膀胱の有無とフレイルの増加に関連性は無かった。", answer: false, explanation: "過活動膀胱ありではフレイルが増加し、フレイルありでは過活動膀胱が増加する。" },
              { id: "o26_62", type: "tf", text: "夜間頻尿の治療はフレイル、さらには要介護を防ぐうえで非常に重要である。", answer: true, explanation: "" },
              { id: "o26_63", type: "tf", text: "前立腺肥大症と過活動膀胱を合併しているケースは多い。", answer: true, explanation: "" },
              { id: "o26_64", type: "tf", text: "排尿障害を有する患者への投薬治療において、αブロッカー、抗コリン薬、β3作動薬のいずれも、尿閉を起こしやすいため注意が必要である。", answer: false, explanation: "αブロッカーは排尿を促進するため尿閉を起こしやすい薬剤には該当しない。抗コリン薬などで尿閉に注意が必要である。" },
              { id: "o26_65", type: "tf", text: "夜間頻尿診療ガイドライン [第2版] によると、夜間頻尿患者に対して残尿測定は必須だと位置づけられている。", answer: true, explanation: "" },
              { id: "o26_66", type: "tf", text: "ESPENのICUガイドライン(2023年)では、経口・経腸栄養が実施困難・禁忌の場合、3日から7日以内に静脈栄養を実施する事が推奨されている。", answer: true, explanation: "" },
              { id: "o26_67", type: "tf", text: "ICUの研究で、安静時エネルギー消費量(REE)に対して投与エネルギー量が多すぎても少なすぎても予後が不良であり、エネルギー充足率が30%と少なすぎる栄養管理が最も生存率が低い結果であった。", answer: true, explanation: "" },
              { id: "o26_68", type: "tf", text: "アメリカ、日本、共に集中治療領域のガイドラインでは、経腸栄養が不十分な重症患者に対して静脈栄養を追加する事が推奨されている。", answer: false, explanation: "日本版ガイドラインでは静脈栄養を追加すべきではないと推奨されているなど異なる。" },
              { id: "o26_69", type: "tf", text: "低栄養リスクが高く、経腸栄養の認容性が低い腹部手術患者において、術後3日以内の早期SPNは院内感染(8.7%vs18.4%)を有意に低下させた。", answer: true, explanation: "" },
              { id: "o26_70", type: "tf", text: "蘇生会総合病院、土師先生が運用している栄養管理バンドルでは、「補完的早期静脈栄養」や「早期高蛋白投与(1.2g/kg以上)」といった実施項目が盛り込まれている。", answer: true, explanation: "" },
              { id: "o26_71", type: "tf", text: "マスク換気による胃の膨満が術野を妨げるため、特に腹腔鏡、ロボット手術では胃減圧が必要である。", answer: true, explanation: "" },
              { id: "o26_72", type: "tf", text: "消化器外科術後に胃管を留置する事で、胃内容物を体外へ誘導し、嘔吐の軽減、誤嚥の予防、縫合部への負担軽減が期待できる。", answer: true, explanation: "" },
              { id: "o26_73", type: "tf", text: "ERASでは、食道、胃、大腸いずれのガイドラインでも、術後のルーチンな(予防的な)胃管挿入は推奨されていない。", answer: true, explanation: "" },
              { id: "o26_74", type: "tf", text: "ED チューブは、胃内のみの留置を目的としている。", answer: false, explanation: "胃・十二指腸・空腸への留置が可能である。" },
              { id: "o26_75", type: "tf", text: "タムガイド使用時にEDチューブを使用する場合、ファイバー先端は、オリーブ先端まで挿入するのが望ましい。", answer: false, explanation: "オリーブとチューブの境目から1〜2cm離して固定することを推奨している。" },
              { id: "o26_76", type: "tf", text: "J034-2(経鼻栄養・薬剤投与用チューブ挿入術: 180点)の算定には、必ずX線透視による確認が必要であり、タムガイドのみでの確認では算定できない。", answer: false, explanation: "X線が使用できない環境下で、タムガイドを使用して確認した場合でも算定可能。" },
              { id: "o26_77", type: "tf", text: "MET光ガイドカテーテルシステムと併用可能な栄養チューブは、ニューエンテラルフィーディングチューブ(カーディナルヘルス社製) 10Frのみである。", answer: false, explanation: "10Frではなく12Frである。" },
              { id: "o26_78", type: "tf", text: "浜松医療センターの研究：誤嚥性肺炎入院患者で5日以上絶食管理された高齢患者が対象となっている。", answer: true, explanation: "" },
              { id: "o26_79", type: "tf", text: "浜松医療センターの研究：アミノ酸投与群 (AA群)は、栄養状態が悪いにもかかわらず予後が良かった。", answer: true, explanation: "" },
              { id: "o26_80", type: "tf", text: "浜松医療センターの研究：アミノ酸投与群 (AA群)では、入院後5日目で約 0.7g/kg のアミノ酸投与が出来ていた。", answer: true, explanation: "" },
              { id: "o26_81", type: "tf", text: "浜松医療センターの研究：年齢、性別、BMI、アルブミン、肺炎重症度などを調整した多変量解析でも、アミノ酸投与は独立した予後改善因子として有意だった。", answer: true, explanation: "" },
              { id: "o26_82", type: "tf", text: "浜松医療センターの研究：エネルギー摂取量(>10 kcal/kg/day)を含めた解析でも、アミノ酸投与は有意な予後改善因子であった。", answer: true, explanation: "" },
              { id: "o26_83", type: "tf", text: "誤嚥性肺炎リアルワールド第2報：入院後7日以上絶食となっている誤嚥性肺炎入院患者が対象で、アミノ酸の投与量が多いほど、エネルギー投与量と同様に院内死亡率の低下に強く関連していた。", answer: false, explanation: "エネルギー投与量と院内死亡との間に有意な関連はなかった。" },
              { id: "o26_84", type: "tf", text: "誤嚥性肺炎リアルワールド第2報：0.6g/kg/日以上の十分なアミノ酸投与が投与された患者は全体の50%であった。", answer: false, explanation: "全体の10%であった。" },
              { id: "o26_85", type: "tf", text: "高齢者の7〜8割程度に、口腔乾燥を誘発する可能性のある薬剤が処方されている。", answer: true, explanation: "" },
              { id: "o26_86", type: "tf", text: "口腔乾燥症の原因は1つではなく、複数にわたることが多い。", answer: true, explanation: "" },
              { id: "o26_87", type: "tf", text: "口腔乾燥症状緩和のためには、唾液腺マッサージや保湿剤の使用といったセルフケアも有用である。", answer: true, explanation: "" },
              { id: "o26_88", type: "tf", text: "オラネジンは、約50年ぶりの消毒剤として2015年に発売され、スポルディング分類では、高水準消毒薬に分類される。", answer: false, explanation: "低水準消毒薬に該当する。" },
              { id: "o26_89", type: "tf", text: "オラネジンは、日本外科感染症学会が作成・改訂して発表した「消化器外科 SSI 予防のための周術期管理ガイドライン2025」に新たに掲載された。", answer: true, explanation: "" },
              { id: "o26_90", type: "tf", text: "術野消毒に関するクリニカルクエスチョンでは、ポビドンヨードアルコールと併記でオラネジンが記載された。", answer: false, explanation: "ポビドンヨードではなく、アルコール含有クロルヘキシジン。" },
              { id: "o26_91", type: "tf", text: "オラネジンの使用推奨度は、「使用することを提案する」で、これは弱く推奨するを意味している。", answer: true, explanation: "" },
              { id: "o26_92", type: "tf", text: "経腸栄養困難、投与量不十分例への早期補完的静脈栄養(SPN)は、SSI予防に有用か?というクリニカルクエスチョンに対して、早期SPNは、「行うことを提案する」と記載されている。", answer: false, explanation: "早期SPNはSSI予防効果に対する明確な推奨はできないと記載されている。" },
              { id: "o26_93", type: "tf", text: "消化器外科 SSI 予防のための周術期管理ガイドライン 2025では、手術決定時から周術期口腔機能管理を開始することが推奨されている。", answer: true, explanation: "" },
              { id: "o26_94", type: "tf", text: "2025年のガイドラインで、周術期口腔機能管理は弱い推奨を意味する「行うことを提案する」であり、2018年版から推奨の強さは変わっていない。", answer: false, explanation: "2018年は「評価は困難である」であり推奨度は変化している。" },
              { id: "o26_95", type: "tf", text: "周術期口腔機能管理による SSI 予防のメカニズムは、多くのランダム化比較試験 (RCT)によって既に詳細に解明されている。", answer: false, explanation: "関連する文献は後ろ向きの解析であり、詳細は未確定である。" },
              { id: "o26_96", type: "tf", text: "ICD-11(国際疾病分類)に成人低栄養の新コード: 「5B72」が追加された。", answer: true, explanation: "" },
              { id: "o26_97", type: "tf", text: "成人低栄養の新コードが追加される前は、低栄養は主に「飢餓や災害に関連する栄養不足」や「BMI<18.5の成人」に限定されており、疾患や炎症による低栄養を十分に反映できていないという課題があった。", answer: true, explanation: "" },
              { id: "o26_98", type: "tf", text: "「成人低栄養」はGLIM基準による診断がモデルとなっており、低栄養の原因に応じてサブコードが設定される予定である。", answer: true, explanation: "" },
              { id: "o26_99", type: "tf", text: "日本の実態調査によると、GLIM基準に低栄養診断が「未実施」または「データ欠損」が全体の約48%であった。ただし、「未実施・データ欠損群」の30日死亡率は正常栄養群と同等であった。", answer: false, explanation: "評価自体が「未実施」または「データ欠損」の患者も死亡率が高い。" },
              { id: "o26_100", type: "tf", text: "2023年に日本排尿機能学会がインターネットで行った疫学調査によると、20代以上のLUTS (下部尿路症状)の有病率は70%以上と高く、中でも蓄尿症状の有病率が高かった。", answer: true, explanation: "" },
              { id: "o26_101", type: "tf", text: "LUTS(下部尿路症状)治療のために医療機関を受診する女性患者の割合は、2002年と比べて2023年では増加している。", answer: false, explanation: "2002年では9.0%、2023年でも2.5%と、いずれも低い受診率のままである。" },
              { id: "o26_102", type: "tf", text: "過活動膀胱診療ガイドライン [第3版]において、残尿測定を行うことが明記されており、100mL未満の場合は一般医家での診療を行うとされている。", answer: true, explanation: "" },
              { id: "o26_103", type: "tf", text: "診療報酬の D216-2 残尿測定検査では、超音波検査によるもの45点、導尿によるもの55点を月に2回まで算定可能である。", answer: false, explanation: "超音波検査によるものは55点、導尿によるものは45点。" },
              { id: "o26_104", type: "tf", text: "重症患者、ICU患者のICU入室後1日〜2日など早期には十分なエネルギー投与が必要であり、mREE≥100%を目安に投与する。", answer: false, explanation: "早期にはREE≦70%を目安にエネルギー投与を行う。" },
              { id: "o26_105", type: "tf", text: "重症患者に対するエネルギー投与が十分でない状態が継続し、負債累積として積みあがっていくと合併症が増えるというデータがある。", answer: true, explanation: "" },
              { id: "o26_106", type: "tf", text: "ICUの早期経腸栄養は腸管機能に関わらず十分に実施ができる。", answer: false, explanation: "腸管機能により、投与速度・投与量が制限される。" },
              { id: "o26_107", type: "tf", text: "日本版重症患者の栄養療法ガイドライン2024において、重症患者の腸管不耐を評価する方法に胃残量、胃残渣の性状、腹部理学所見などを組み合わせる方法が示されている。", answer: true, explanation: "" },
              { id: "o26_108", type: "tf", text: "消化管がん術後栄養管理法の変遷解析において、「静脈栄養」による栄養管理割合は術後1日目は年々増加しているが、「糖・電解質輸液」による管理割合は術後1日目も3日目も年々減少している。", answer: false, explanation: "「静脈栄養」と「糖・電解質輸液」が逆になっている。" },
              { id: "o26_109", type: "tf", text: "手術部位別の術後栄養管理の解析において、食道手術患者においては他の部位よりも経口摂取による栄養摂取が少なく、経腸栄養のみや経腸栄養と静脈栄養の組み合わせは他の部位よりも多い。", answer: true, explanation: "" },
              { id: "o26_110", type: "tf", text: "手術部位別の術後栄養管理の解析において、術後7日間絶食を要する患者へのアミノ酸投与量中央値は、どの部位の患者でも 0.8g/kg に届いていない。", answer: true, explanation: "" },
              { id: "o26_111", type: "tf", text: "アルコール非含有ポビドンヨードと 1.5%オラネキシジンとの比較を 2報で解析すると、RR: 0.46であり、1.5%オラネキシジンがSSI 発生を有意に予防している。", answer: true, explanation: "" },
              { id: "o26_112", type: "tf", text: "ネットワークアナリシスの結果、アルコール含有クロルヘキシジン、および 1.5%オラネキシジンが、アルコール非含有ポビドンヨードと比較して有意にSSI を減少させていた。", answer: true, explanation: "" },
              { id: "o26_113", type: "tf", text: "オラネジンとクロルヘキシジンアルコールを直接比較したRCTが実施されており、オラネジンが有意にSSI を減少させる結果となった。", answer: false, explanation: "オラネキシジンはクロルヘキシジンアルコールに対して優越性を示さず、SSI予防効果は同等。" },
              { id: "o26_114", type: "tf", text: "令和8年度 (2026年度)の診療報酬改定では、残薬対策に関する要件が医科や在宅医療の複数項目に組み込まれた。", answer: true, explanation: "" },
              { id: "o26_115", type: "tf", text: "経腸栄養剤を開封して飲んで残った液体は、診療報酬上の「残薬」として扱われる。", answer: false, explanation: "残薬は「未開封で残っている医薬品」であり、飲み残しの液体は該当しない。" },
              { id: "o26_116", type: "tf", text: "「調剤時残薬調整加算」は、従来の「重複投薬・相互作用等防止加算」に含まれていた残薬調整部分を分離し、新設された加算である。", answer: true, explanation: "" },
              { id: "o26_117", type: "tf", text: "訪問診療薬剤師同時指導料は、医師と薬剤師が別々の日に訪問して指導した場合に算定できる。", answer: false, explanation: "同時訪問が要件であり、別日では算定不可。" },
              { id: "o26_118", type: "tf", text: "訪問看護の診療報酬の中では、服薬状況 (残薬含む)を確認することが求められる方向性が示されている。", answer: true, explanation: "" },
              { id: "o26_119", type: "tf", text: "地域支援体制加算の実施要件には、新たに残薬対策関連の要件が多数追加された。", answer: true, explanation: "" },
              { id: "o26_120", type: "tf", text: "残薬対策に取り組むことは、薬局が地域支援体制加算を取得・維持する上で大きな影響はない。", answer: false, explanation: "加算取得の必要要件に含まれるため重要である。" },
              { id: "o26_121", type: "tf", text: "胃切除後1年間で10%以上の体重減少があると、累積生存率は有意に低下する事が示されている。", answer: true, explanation: "" },
              { id: "o26_122", type: "tf", text: "胃切除後の体重減少の80%以上は、最初の3か月で起こる事が示されている。", answer: true, explanation: "" },
              { id: "o26_123", type: "tf", text: "術後1か月間で15%を超える体重減少は、TS-1の服薬継続率の低下につながる事が示されている。", answer: true, explanation: "" },
              { id: "o26_124", type: "tf", text: "胃切除後の体重減少に対するONSと通常食を比較した試験では、主要評価項目である「1年後の体重減少」を有意に抑制する結果となった。", answer: false, explanation: "主要評価項目である1年後の体重減少は有意に抑制する事が出来なかった。" },
              { id: "o26_125", type: "tf", text: "胃切除後の試験では、術後3か月間ONSを1日200Kcal 以上服用すれば、術後1年の体重減少を有意に抑制できる事が示された。", answer: true, explanation: "" },
              { id: "o26_126", type: "tf", text: "胃がん手術後の栄養サポートにおいて、イノラスの服薬遵守状況を見た試験では、200kcal/日以上の平均摂取量を達成した患者の割合は66.7%であった。", answer: true, explanation: "" },
              { id: "o26_127", type: "tf", text: "大塚製薬の神経内科におけるこれまでの展開製品の例として、プレタール、イーケプラ、ニュープロパッチ、アジョビなどが挙げられる。", answer: true, explanation: "" },
              { id: "o26_128", type: "tf", text: "神経内科疾患では経静脈栄養での管理を主体として、経腸栄養での管理も行われる。", answer: false, explanation: "消化管が機能していることが多く、経腸栄養主体で管理される。" },
              { id: "o26_129", type: "tf", text: "筋萎縮性側索硬化症(ALS) は黒質ドーパミンが障害される疾患で、10年〜20年の慢性的な経過をたどるのが一般的である。", answer: false, explanation: "上位・下位運動ニューロンが障害される疾患で、急性進行型の疾患である。" },
              { id: "o26_130", type: "tf", text: "ALS診療ガイドライン2023において、“病前体重の10%以上の体重減少”が認められる場合に胃瘻造設を検討する旨が記載されている。", answer: true, explanation: "" },
              { id: "o26_131", type: "tf", text: "GLIM基準の炎症評価のガイダンスにおいて、慢性疾患の代表例として、「がん」「心不全」 「COPD」 「CKD」などがある。", answer: true, explanation: "" },
              { id: "o26_132", type: "tf", text: "がん患者において、GLIM基準による低栄養は、死亡リスクや術後合併症のリスクが約2倍になることが示されている。", answer: true, explanation: "" },
              { id: "o26_133", type: "tf", text: "脳卒中回復期の高齢患者を対象にした観察研究で、体重 1kg を得るために約 9600kcalの上乗せが必要であることが示されている。", answer: true, explanation: "" },
              { id: "o26_134", type: "tf", text: "リハビリテーション栄養のゴール設定として GREAT なゴール設定が必要と言われている。", answer: false, explanation: "GREATではなくSMARTなゴール設定が必要と言われている。" },
              { id: "o26_135", type: "tf", text: "禁食が7日以上続いた高齢者の 26%が新規嚥下障害を発症し、全員に全身サルコペニアを認めたと記載されている。", answer: false, explanation: "7日以上ではなく2日以上である。" },
              { id: "o26_136", type: "tf", text: "誤嚥性肺炎で「とりあえず安静」等の対応により引き起こされる医原性サルコペニアを予防する事が、サルコペニアによる摂食嚥下障害の予防に重要である。", answer: true, explanation: "" },
              { id: "o26_137", type: "tf", text: "調剤基本料とは、薬剤師が患者の服薬状況の把握、薬歴の管理、服薬指導、情報提供など「対人業務」を行った際に算定される調剤報酬である。", answer: false, explanation: "「薬学管理料」の説明である。調剤基本料は処方箋1回の受付ごとに算定する基本的な報酬。" },
              { id: "o26_138", type: "tf", text: "かかりつけ薬剤師が残薬対策を実施した場合の加算、「フォローアップ加算」「訪問加算」が新設された。", answer: true, explanation: "" },
              { id: "o26_139", type: "tf", text: "新設された「調剤時残薬調整加算」は、薬剤師の対応により、残薬が確認された患者の7日以上の調剤日数の変更が行われた場合に算定可能である。", answer: true, explanation: "" },
              { id: "o26_140", type: "tf", text: "「訪問薬剤管理医師同時指導料」は、医師および薬剤師による患家や介護施設への同時訪問に対する評価として新設された。", answer: false, explanation: "単一建物診療患者が1人の場合であり、介護施設への同時訪問では算定できない。" },
              { id: "o26_141", type: "tf", text: "医薬品経腸栄養剤は、必要な栄養を食事により摂取することが困難な患者である場合、医師が必要と判断した理由を処方箋等に記載することで、保険給付の対象となる。", answer: true, explanation: "" }
            ]
          },
          ethics: {
            id: "ethics2026", title: "基礎：倫理・スライドレビュー", type: "bas",
            questions: [
              { id: "et26_1", type: "tf", text: "医師又は薬剤師から他社製品に関する情報等を求められた場合、情報提供する内容は要求内容に沿ったものに限定し、情報提供先は要求者に限定する。", answer: true, explanation: "" },
              { id: "et26_2", type: "tf", text: "医師又は薬剤師から他社製品に関する情報等を求められた場合、当該医師又は薬剤師に対し、求められている具体的な情報を確認する。", answer: true, explanation: "" },
              { id: "et26_3", type: "tf", text: "医師又は薬剤師から他社製品に関する情報等を求められた場合、医療関係者等から求められていないにもかかわらず、求められたかのように装わない。", answer: true, explanation: "" },
              { id: "et26_4", type: "tf", text: "医師又は薬剤師から他社製品に関する情報等を求められた場合、提供する情報は虚偽・誇大な内容であってはならず、科学的・客観的根拠に基づき正確なものでなければならない。", answer: true, explanation: "" },
              { id: "et26_5", type: "tf", text: "医師又は薬剤師から他社製品に関する情報等を求められた場合、他社製品にとって不利となる情報のみを恣意的に選択しない。", answer: true, explanation: "" },
              { id: "et26_6", type: "tf", text: "医師又は薬剤師から他社製品に関する情報等を求められた場合、直接比較することが科学的に適切ではない場合はその旨及びその理由等も提供する。", answer: true, explanation: "" },
              { id: "et26_7", type: "tf", text: "OPF 営業本部所属従業員は、医師又は薬剤師から比較情報について一覧表の提出を求められた場合、社内手続きを経ることなく、全ての製品において情報提供可能である。", answer: false, explanation: "他社の合意が得られていないことから提供できない。薬審資料として要望された場合のみ所定の手続きで提供できる。" },
              { id: "et26_8", type: "tf", text: "OPF 営業本部所属従業員は、自社製品と他社製品との比較情報については、医師又は薬剤師からの求めがない場合にも提供することはできる。", answer: false, explanation: "求めがあった場合のみ提供できる。" },
              { id: "et26_9", type: "tf", text: "OPF 営業本部所属従業員は、医師又は薬剤師から適応外使用に関する情報を求められた場合、その場で情報提供可能である。", answer: false, explanation: "その場で回答せず、別途訪問時に改めて文献等を提供する。" },
              { id: "et26_10", type: "tf", text: "医療用医薬品の販売情報提供活動調査事業の目的は、広告違反行為を早期発見し行政指導等を図り、活動の適正化を図ることが目的である。", answer: true, explanation: "" },
              { id: "et26_11", type: "tf", text: "現在の販売情報提供活動調査事業は、一般報告制度によりモニター医療機関以外の医療機関等(調剤薬局を除く)からも不適切事例を受け付けている。", answer: false, explanation: "医療機関等には調剤薬局を含む。" },
              { id: "et26_12", type: "tf", text: "令和6年度販売情報提供活動調査事業報告において違反が疑われた項目は、「他社製品の誹謗中傷」が最も多く、次いで「事実誤認の恐れのある表現」であった。", answer: false, explanation: "「事実誤認の恐れのある表現を用いた」が最も多かった。" },
              { id: "et26_13", type: "tf", text: "説明の不備を指摘された時に「間違っていました」と謝罪すればよいと意図的に不適切な情報提供を行っている極めて悪質な情報提供も注視している。", answer: true, explanation: "" },
              { id: "et26_14", type: "tf", text: "MRをはじめ製薬企業担当者が個別面談で、エビデンスなく有効性等を説明する等の不適切な販売情報提供活動は全くみられなくなった。", answer: false, explanation: "依然としてみられる。" },
              { id: "et26_15", type: "tf", text: "医療従事者向けのスライド等について、有効性に偏らず安全性も含めた情報提供となっているか等の企業としての確認が不十分と思われる事例があった。", answer: true, explanation: "" },
              { id: "et26_16", type: "tf", text: "他社製品に関する質問に対し情報提供を行うこと自体は問題ないが、他社製品の誹謗中傷やエビデンスのないまま優位性を言及することは不適切である。", answer: true, explanation: "" },
              { id: "et26_17", type: "tf", text: "業務記録入力において、口頭説明した場合は詳細な内容を本文に記載する。", answer: true, explanation: "" },
              { id: "et26_18", type: "tf", text: "業務記録入力において、本文には、ER、ビーフリなど、製品コードや電略で記載してはならない。", answer: true, explanation: "" },
              { id: "et26_19", type: "tf", text: "面談者不明の場合は面談者区分を選択し性別等を直接入力する。その際、本文への入力は不要であり、修正する際元の業務記録は削除しない。", answer: true, explanation: "" },
              { id: "et26_20", type: "tf", text: "面談者名は分かっているが顧客未登録の場合は、アシスタントに登録を依頼し、登録完了後に業務記録を入力する。", answer: false, explanation: "顧客登録完了を待たず、翌稼働日までに面談者名を直接入力し面談者区分を選択する。" },
              { id: "et26_21", type: "tf", text: "MR が医療関係者に提供できる形状見本の個数は医療関係者1名あたり1〜2個である。", answer: false, explanation: "1〜2個提供できるのは製剤見本。形状見本は1個。" },
              { id: "et26_22", type: "tf", text: "MRはMF製品の試用見本を提供できる。", answer: false, explanation: "提供できない。" },
              { id: "et26_23", type: "tf", text: "説明会の業務記録入力において、出席者がすべて顧客未登録で芳名録が未入手の場合は、本文に出席者の職種・人数等を記載する。", answer: true, explanation: "" },
              { id: "et26_24", type: "tf", text: "I-dis から取り寄せた文献は、業務記録に紐づけることが可能である。", answer: true, explanation: "" },
              { id: "et26_25", type: "tf", text: "講演会の業務記録入力において、情報提供があった場合、事業企画申請者は情報提供スライドPDF、プログラム、芳名禄を添付する。", answer: true, explanation: "" },
              { id: "et26_26", type: "tf", text: "情報提供可能な対象は医療従事者のみであり、介護福祉士・介護支援専門員等も含まれる。", answer: false, explanation: "介護職は医療従事者に含まれない。" },
              { id: "et26_27", type: "tf", text: "説明会の業務記録において、デジプロQVを用いなかった場合は、その旨を本文に記載する。", answer: true, explanation: "" },
              { id: "et26_28", type: "tf", text: "オフラベル情報提供をした場合、いつ求めがあったのかを本文に記載の上、提供した文献の紐づけを行う。", answer: true, explanation: "" },
              { id: "et26_29", type: "tf", text: "製品紹介スライドと監修者がいる一般啓発スライドは、スライド枚数の多少を問わず組み合わせることはしてはならない。", answer: true, explanation: "" },
              { id: "et26_30", type: "tf", text: "マイシナリオはデジプロで自動保存されるが、自分で削除してはならない等の注意点がある。", answer: true, explanation: "" },
              { id: "et26_31", type: "tf", text: "切り分けても一緒に紹介できない組み合わせは、カンジダ関連+ヒノーラ関連、ONS関連+イノラス・ラコールNFの2つである。", answer: false, explanation: "ペクチン関連＋ハイネックス関連の組み合わせも同様に不可。" },
              { id: "et26_32", type: "tf", text: "58期下期以降の業務記録研修対象者は、指摘事項未修正の業務記録が1件以上ある者であり、指摘件数の多少は問わない。", answer: true, explanation: "" },
              { id: "et26_33", type: "tf", text: "OPFは日本製薬工業協会に加盟しているので「企業活動と医療機関等の関係の透明性ガイドライン」に則り情報公開をしている。", answer: false, explanation: "製薬協には加盟しておらず、独自に指針を定めている。" },
              { id: "et26_34", type: "tf", text: "OPFの定める透明性GL指針には医薬代理店・医療機器代理店への支払情報等も公開するとしている。", answer: false, explanation: "支払いは公開対象にはならない。" },
              { id: "et26_35", type: "tf", text: "2023年より透明性GL指針のB-4に「学会ホームページ・抄録集への広告費」「展示ブース出展料」「スポンサー料」が追加された。", answer: true, explanation: "" },
              { id: "et26_36", type: "tf", text: "全ての広告・展示・スポンサー料が公開対象になったので、スマート申請が承認された後、コンカーにて事前経費申請をする。", answer: false, explanation: "全てが対象になったわけではない。またスマート申請が承認されればコンカーでの事前経費申請は不要。" },
              { id: "et26_37", type: "tf", text: "病院薬剤師会より会報への広告申込をしたので、公開項目でB-4を選択した。", answer: false, explanation: "機関誌(人の会合がない等)は透明性GL公開対象外。" },
              { id: "et26_38", type: "tf", text: "学会にランチョンセミナーを申し込み、演者に依頼し、お弁当を用意した。この場合の公開区分はB-4のみである。", answer: false, explanation: "講師謝金C-1、弁当・移動費D-1なども公開区分になる。" },
              { id: "et26_39", type: "tf", text: "講演会場から慰労会場までタクシー移動した際のタクシー代は D-1 講演会等会合費で公開する。", answer: false, explanation: "飲食の為の移動は交際費となり、E-1接遇等費用での公開になる。" },
              { id: "et26_40", type: "tf", text: "講演会スライドにおいて、調査研究等の利益相反に関する記載は、日本医師会等の方針による利益相反を明確にしていれば省略出来る。", answer: false, explanation: "省略は出来ない。別途必要である。" },
              { id: "et26_41", type: "tf", text: "講演会スライドにおいて、自社医薬品の承認外情報の記載は控えるが、他社医薬品は記載しても差し支えない。", answer: false, explanation: "自社他社問わず記載せず、講演しない。" },
              { id: "et26_42", type: "tf", text: "講演会スライドにおいて、自社医薬品の有効性を強調する表現は記載しないが、安全性を強調・保証する表現は記載しても差し支えない。", answer: false, explanation: "安全性を強調・保証する表現も記載せず、講演しない。" },
              { id: "et26_43", type: "tf", text: "講演会スライドにおいて、副次的にもたらされた結果のデータを紹介する場合は「参考情報」の記載が必要である。", answer: true, explanation: "" },
              { id: "et26_44", type: "tf", text: "講演会スライドにおいて、1例報告は記載しないが、「副作用」の注意喚起や希少疾病等への使用を紹介する必要がある場合は記載できる。", answer: true, explanation: "" },
              { id: "et26_45", type: "tf", text: "講演会スライドにおいて、許諾を取得していないアニメ等は使用できないが、写真は許諾を取得していなくても使用できる。", answer: false, explanation: "許諾を取得していない写真は記載しない。" },
              { id: "et26_46", type: "tf", text: "講演会スライドにおいて、演者が所属する医療機関の担当MRは、演者より講演日の1週間前までを目途に発表スライドを入手する。", answer: false, explanation: "講演日の2週間前までを目途に入手する。" },
              { id: "et26_47", type: "tf", text: "講演会スライドにおいて、自社食品に関して、効能・効果などがあるかのような誤認を与える表現はしない。", answer: true, explanation: "" },
              { id: "et26_48", type: "tf", text: "講演会スライドにおいて、演者の先生が自社医療用医薬品の特徴を紹介する場合は、禁忌などのDI情報も必要である。", answer: true, explanation: "" },
              { id: "et26_49", type: "tf", text: "講演会スライドにおいて、引用先の記載に改変がある場合は、著者の許諾は得られていなくても演者に許諾を得れば良い。", answer: false, explanation: "改変は著者の許諾が必要となるので「より作成」へ変更する。" }
